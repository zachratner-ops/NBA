<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Draft</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;}

.topbar{background:#1a1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-nav{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.topbar-nav a{color:#aaa;font-size:13px;text-decoration:none;white-space:nowrap;}
.topbar-nav a:hover{color:#fff;}
.comm-toggle{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid #444;color:#aaa;background:transparent;cursor:pointer;}
.comm-toggle.active{background:#f9a825;color:#1a1a1a;border-color:#f9a825;}

.main{max-width:1400px;margin:0 auto;padding:20px;}
.main-narrow{max-width:600px;margin:0 auto;padding:40px 20px;}

.card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:16px;}
.btn{background:#1a1a1a;color:#fff;border:none;font-size:13px;font-weight:600;padding:8px 16px;border-radius:7px;cursor:pointer;transition:background .15s;}
.btn:hover{background:#333;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-sm{font-size:12px;padding:5px 11px;border-radius:5px;}
.btn-outline{background:transparent;color:#1a1a1a;border:1px solid #ccc;}
.btn-outline:hover{background:#f0f0ee;}
.btn-green{background:#2e7d32;color:#fff;border:none;}
.btn-green:hover{background:#1b5e20;}
.btn-red{background:#c62828;color:#fff;border:none;}
.btn-red:hover{background:#b71c1c;}
.btn-amber{background:#e65100;color:#fff;border:none;}
.btn-amber:hover{background:#bf360c;}

.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#666;margin-bottom:6px;}
.form-group input{width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;color:#1a1a1a;}
.form-group input:focus{outline:none;border-color:#1a1a1a;}
.owner-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.owner-check{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f5f5f3;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;}
.owner-check input{width:16px;height:16px;cursor:pointer;}

/* Draft layout */
.draft-layout{display:grid;grid-template-columns:200px 1fr 340px;gap:12px;}
@media(max-width:900px){.draft-layout{grid-template-columns:1fr;}}
@media(min-width:901px){
  .draft-screen{display:flex;flex-direction:column;height:calc(100dvh - 41px);padding:12px 20px 0;overflow:hidden;}
  .draft-screen .header-bar{flex-shrink:0;}
  .draft-screen .draft-layout{flex:1;min-height:0;margin-bottom:8px;}
  .draft-screen .card.draft-col{display:flex;flex-direction:column;min-height:0;}
  .draft-screen #pick-order-list{flex:1;min-height:0;max-height:none;overflow-y:auto;}
  .draft-screen .team-grid-wrap{flex:1;min-height:0;overflow-y:auto;}
  .draft-screen .roster-grid-wrap{flex:1;min-height:0;overflow-y:auto;}
}

.pick-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;margin-bottom:3px;font-size:12px;}
.pick-item.current{background:#fff3cd;font-weight:700;border:1.5px solid #ffc107;}
.pick-item.done{opacity:0.35;text-decoration:line-through;}
.pick-item.upcoming{background:#f5f5f3;}
.pick-num{font-size:10px;color:#aaa;width:24px;flex-shrink:0;}
#pick-order-list{max-height:350px;overflow-y:auto;}

/* Team grid */
.pool-search{width:100%;border:1px solid #ddd;border-radius:7px;padding:8px 12px;font-size:13px;margin-bottom:10px;}
.pool-search:focus{outline:none;border-color:#1a1a1a;}
.group-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.group-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;cursor:pointer;border:1.5px solid transparent;background:#f5f5f3;color:#666;transition:background .1s;}
.group-pill.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.group-section{margin-bottom:16px;}
.group-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #f0f0f0;}
.group-teams{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.team-card{padding:8px 10px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:border-color .1s,background .1s;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;background:#f5f5f3;}
.team-card:hover{border-color:#bbb;}
.team-card.selected{border-color:#2e7d32;background:#e8f5e9;}
.team-card.picked{cursor:default;opacity:0.45;}
.team-card.picked:hover{border-color:transparent;}
.team-flag{flex-shrink:0;line-height:1;display:inline-flex;align-items:center;}
.team-flag img{width:20px;height:15px;border-radius:2px;display:block;}
.team-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.owner-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Roster */
.roster-grid{display:grid;grid-template-columns:1fr;gap:6px;}
.roster-col{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;overflow:hidden;}
.owner-header{font-size:11px;font-weight:700;padding:6px 10px;color:#fff;text-align:center;}
.roster-team{display:flex;align-items:center;gap:6px;padding:4px 10px;border-bottom:0.5px solid #f0f0f0;font-size:11px;}
.roster-team:last-child{border-bottom:none;}
.roster-team.empty{color:#ccc;font-style:italic;}

/* Complete */
.complete-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.complete-col{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;overflow:hidden;}
.complete-team-row{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:0.5px solid #f0f0f0;font-size:12px;}
.complete-team-row:last-child{border-bottom:none;}
.complete-banner{background:#2e7d32;color:#fff;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px;}

/* Order preview */
.order-preview{background:#f5f5f3;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;line-height:2;}
.owner-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#f5f5f3;border-radius:8px;margin-bottom:6px;}

/* Mobile tabs */
.draft-tabs{display:none;gap:0;margin-bottom:12px;border-radius:8px;overflow:hidden;border:1px solid #ddd;}
.draft-tab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;background:#f5f5f3;border:none;cursor:pointer;color:#888;}
.draft-tab.active{background:#1a1a1a;color:#fff;}
@media(max-width:900px){
  .draft-tabs{display:flex;}
  .draft-col{display:none!important;}
  .draft-col.active{display:block!important;}
  .team-grid-wrap{max-height:calc(100dvh - 200px);overflow-y:auto;}
  #pick-order-list{max-height:260px;}
  .roster-grid{grid-template-columns:1fr 1fr;}
}

.header-bar{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:12px 20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:41px;z-index:40;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:10px;}

/* Password gate */
.pw-gate{display:none;position:fixed;inset:0;background:#1a1a1a;z-index:9999;align-items:center;justify-content:center;}
.pw-gate.show{display:flex;}
.pw-box{text-align:center;padding:40px 20px;max-width:340px;width:100%;}
.pw-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:6px;}
.pw-sub{font-size:14px;color:#666;margin-bottom:32px;}
.pw-input{width:100%;background:#2a2a2a;border:1px solid #333;border-radius:10px;padding:13px 16px;font-size:16px;color:#fff;font-family:inherit;text-align:center;letter-spacing:.08em;}
.pw-input:focus{outline:none;border-color:#555;}
.pw-input::placeholder{color:#555;letter-spacing:0;}
.pw-btn{margin-top:12px;width:100%;background:#fff;color:#1a1a1a;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;}
.pw-btn:hover{background:#ddd;}
.pw-error{font-size:12px;color:#e53935;margin-top:10px;min-height:16px;}

/* Modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:13px;color:#888;margin-bottom:18px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

/* Feedback */
.fb-link{font-size:12px;color:#aaa;text-decoration:none;white-space:nowrap;border:0.5px solid #444;border-radius:5px;padding:4px 10px;}
.fb-link:hover{color:#fff;border-color:#888;}
.fb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.fb-overlay.open{display:flex;}
.fb-modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:420px;position:relative;}
.fb-modal h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.fb-modal p{font-size:13px;color:#888;margin-bottom:20px;}
.fb-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;color:#aaa;cursor:pointer;}
.fb-field{margin-bottom:14px;}
.fb-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:5px;}
.fb-field input,.fb-field textarea,.fb-field select{width:100%;border:1px solid #ddd;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;}
.fb-field textarea{height:90px;resize:vertical;}
.fb-submit{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}

.topbar-hide-mobile{display:none;}
@media(min-width:600px){.topbar-hide-mobile{display:inline;}}

/* ── Live tracker styles ────────────────────────────────────────── */
.tracker-wrap{max-width:1200px;margin:0 auto;padding:20px;}
.lb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.lb-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;overflow:hidden;}
.lb-stripe{height:4px;}
.lb-body{padding:14px 16px;}
.lb-rank{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.lb-name{font-size:15px;font-weight:700;margin-bottom:6px;}
.lb-net{font-size:26px;font-weight:800;letter-spacing:-.02em;}
.lb-net.pos{color:#2e7d32;} .lb-net.neg{color:#c62828;} .lb-net.zero{color:#1a1a1a;}
.lb-breakdown{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:#888;margin-top:4px;border-top:1px solid #f0f0f0;padding-top:4px;}
.lb-breakdown span{white-space:nowrap;}
.lb-sub2{font-size:11px;color:#aaa;margin-top:4px;}
.tiepot-card{background:#1a1a1a;color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap;}
.tiepot-total{font-size:32px;font-weight:800;color:#f9a825;}
.tiepot-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:2px;}
.tiepot-sub{font-size:12px;color:#888;margin-top:2px;}
.tiepot-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;}
.tiepot-name{font-weight:700;width:56px;}
.tiepot-bar-wrap{flex:1;height:6px;background:#2a2a2a;border-radius:3px;overflow:hidden;}
.tiepot-bar{height:6px;border-radius:3px;}
.tiepot-count{font-size:12px;font-weight:700;width:20px;text-align:right;}
.tiepot-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:4px;}
.tiepot-most{background:#f9a825;color:#1a1a1a;} .tiepot-least{background:#1565c0;color:#fff;}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px;}
.teams-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;overflow:hidden;}
.teams-card-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.teams-card-name{font-size:14px;font-weight:700;}
.teams-card-net{font-size:13px;font-weight:700;}
.teams-card-net.pos{color:#2e7d32;} .teams-card-net.neg{color:#c62828;}
.team-row{display:flex;align-items:center;gap:8px;padding:6px 14px;border-top:0.5px solid #f5f5f3;font-size:12px;}
.team-name-txt{flex:1;}
.team-goals{font-size:11px;font-weight:700;color:#2e7d32;}
.team-group{font-size:10px;color:#bbb;}
.match-table-wrap{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;overflow:hidden;margin-bottom:24px;}
.match-table{width:100%;border-collapse:collapse;font-size:12px;}
.match-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#aaa;padding:8px 12px;border-bottom:0.5px solid #e0e0e0;text-align:left;white-space:nowrap;}
.match-table th.c,.match-table td.c{text-align:center;}
.match-table td{padding:7px 12px;border-bottom:0.5px solid #f5f5f3;vertical-align:middle;}
.match-table tr:last-child td{border-bottom:none;}
.match-table tr.tie-row td{background:#fffdf0;}
.score-cell{font-size:14px;font-weight:800;text-align:center;white-space:nowrap;}
.owner-chip{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.money-pos{color:#2e7d32;font-weight:700;} .money-neg{color:#c62828;font-weight:700;} .money-tie{color:#e65100;font-weight:700;}
.stage-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#f5f5f3;color:#888;}
.pk-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;background:#fff3cd;color:#856404;}
.tracker-tabs{display:flex;gap:0;border-bottom:1px solid #e8e8e8;margin-bottom:20px;}
.tracker-tab{padding:8px 22px;font-size:13px;font-weight:700;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tracker-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;}
.comm-panel{background:#1a1a1a;border-radius:12px;padding:14px 16px;margin-bottom:20px;}
.comm-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:10px;}
.comm-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.refresh-btn{background:#1a1a1a;color:#fff;border:none;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.refresh-btn:hover{background:#333;} .refresh-btn.spinning svg{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.updated-txt{font-size:11px;color:#aaa;}
/* Mobile match cards */
.match-cards{display:none;}
.match-card{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;padding:11px 13px;margin-bottom:8px;}
.match-card.tie-card{background:#fffdf0;border-color:#ffe082;}
.match-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:10px;color:#aaa;}
.match-card-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.match-card-team{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;min-width:0;}
.match-card-team.away{flex-direction:row-reverse;text-align:right;}
.match-card-team span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.match-card-score{font-size:18px;font-weight:800;text-align:center;white-space:nowrap;flex-shrink:0;}
.match-card-footer{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;margin-top:8px;padding-top:6px;border-top:0.5px solid #f0f0f0;}

@media(max-width:600px){
  .match-table-wrap{display:none;}
  .match-cards{display:block;}
  .lb-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="pw-gate" id="pw-gate">
  <div class="pw-box">
    <div class="pw-title">World Cup 2026</div>
    <div class="pw-sub">Enter the password to continue</div>
    <input class="pw-input" id="pw-input" type="password" placeholder="password" onkeydown="if(event.key==='Enter')pwCheck()">
    <button class="pw-btn" onclick="pwCheck()">Enter →</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<div class="modal-bg" id="comm-pw-modal" style="display:none;">
  <div class="modal" style="max-width:360px;">
    <h3>Commissioner Mode</h3>
    <div class="modal-sub">Enter the commissioner password</div>
    <input type="password" id="comm-pw-input" placeholder="password" style="width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;margin-bottom:12px;" onkeydown="if(event.key==='Enter')checkCommPw()">
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green" onclick="checkCommPw()">Enter</button>
      <button class="btn btn-outline" onclick="document.getElementById('comm-pw-modal').style.display='none'">Cancel</button>
    </div>
    <div id="comm-pw-error" style="font-size:12px;color:#e53935;margin-top:8px;min-height:16px;"></div>
  </div>
</div>

<div class="modal-bg" id="reset-modal" style="display:none;">
  <div class="modal">
    <h3>Reset Draft?</h3>
    <p style="color:#888;font-size:13px;margin-bottom:20px;">Wipes all picks and returns to setup. Cannot be undone.</p>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-red" onclick="doReset()">Yes, Reset</button>
      <button class="btn btn-outline" onclick="document.getElementById('reset-modal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<div class="fb-overlay" id="fb-overlay" onclick="fbClose(event)">
  <div class="fb-modal">
    <button class="fb-close" onclick="closeFeedback()">×</button>
    <h2>Suggest a feature</h2>
    <p>Got an idea? Send it in.</p>
    <div id="fb-form-wrap">
      <form id="fb-form" onsubmit="fbSubmit(event)">
        <div class="fb-field"><label>Your name</label><input type="text" name="name" placeholder="First name" required></div>
        <div class="fb-field"><label>Type</label><select name="type"><option>Feature idea</option><option>Bug / something broken</option><option>Other</option></select></div>
        <div class="fb-field"><label>Request</label><textarea name="message" placeholder="Describe your idea…" required></textarea></div>
        <button class="fb-submit" type="submit" id="fb-submit-btn">Send →</button>
      </form>
    </div>
  </div>
</div>

<!-- Match modal (tracker) -->
<div class="modal-bg" id="match-modal" style="display:none;">
  <div class="modal">
    <h3>Add / Edit Match</h3>
    <div class="form-group"><label>Match ID (unique, no spaces)</label><input type="text" id="m-id" placeholder="e.g. grpA_1" style="width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label>Home Team</label><select id="m-home" style="width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:13px;font-family:inherit;"><option value="">— Select —</option></select></div>
      <div class="form-group"><label>Away Team</label><select id="m-away" style="width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:13px;font-family:inherit;"><option value="">— Select —</option></select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label>Home Score</label><input type="number" id="m-hscore" min="0" value="0" style="width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;"></div>
      <div class="form-group"><label>Away Score</label><input type="number" id="m-ascore" min="0" value="0" style="width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label>Stage</label>

};
function flagImg(code) {

  return `<img src="https://flagcdn.com/20x15/${code}.png" width="20" height="15" style="border-radius:2px;vertical-align:middle;display:inline-block;">`;
}
const PW_COMM = 'golf';

const fbApp = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(fbApp);
const params = new URLSearchParams(location.search);
const SLUG = params.get('slug');

if (!SLUG) {
  document.getElementById('screen').innerHTML = `
    <div class="main-narrow" style="padding-top:80px;">
      <div class="card" style="text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">⚽</div>
        <h2 style="font-size:20px;font-weight:700;margin-bottom:6px;">WC2026 Draft</h2>
        <p style="font-size:13px;color:#888;margin-bottom:24px;">Enter a draft slug to continue.</p>

            onkeydown="if(event.key==='Enter')goToSlug()">
          <button class="btn btn-green" onclick="goToSlug()">Go →</button>

        <div id="slug-error" style="font-size:12px;color:#c62828;margin-top:8px;min-height:16px;"></div>

    location.href = location.pathname + '?slug=' + val;
  };

}

let draft = null;
let ws = null;
let selectedTeam = null;
let searchQuery = '';
let activeGroup = null; // null = all groups
let previewOrder = null;
let isComm = false;
let wcLiveData = null;   // tracker: wc26_live Firebase data
let trackerTab = 'leaderboard'; // tracker tab state
let trackerRefreshing = false;
let autoRefreshInterval = null;
const WC_GROUPS_MAP = {
  'Mexico':'A','South Africa':'A','South Korea':'A','Czechia':'A',
  'Canada':'B','Bosnia-Herzegovina':'B','Qatar':'B','Switzerland':'B',
  'Brazil':'C','Morocco':'C','Haiti':'C','Scotland':'C',
  'United States':'D','Paraguay':'D','Australia':'D','Türkiye':'D',
  'Germany':'E','Curaçao':'E','Ivory Coast':'E','Ecuador':'E',
  'Netherlands':'F','Japan':'F','Sweden':'F','Tunisia':'F',
  'Belgium':'G','Egypt':'G','Iran':'G','New Zealand':'G',
  'Spain':'H','Cape Verde':'H','Saudi Arabia':'H','Uruguay':'H',
  'France':'I','Senegal':'I','Iraq':'I','Norway':'I',
  'Argentina':'J','Algeria':'J','Austria':'J','Jordan':'J',
  'Portugal':'K','Congo DR':'K','Uzbekistan':'K','Colombia':'K',
  'England':'L','Croatia':'L','Ghana':'L','Panama':'L'
};

const draftRef = () => ref(db, `wc/${SLUG}/draft`);

const STATUS_RANK = { setup:0, lobby:1, drafting:2, complete:3, finalized:4 };

onValue(draftRef(), snap => {
  try {
    const newDraft = snap.val() || { status: 'setup', name: '', owners: ALL_OWNERS };
    const curRank = STATUS_RANK[draft?.status] ?? -1;
    const newRank = STATUS_RANK[newDraft?.status] ?? 0;
    // Never let a stale Firebase read downgrade state we've already set locally
    if (newRank >= curRank) {
      draft = newDraft;
      renderScreen();
    }
  } catch(e) {
    console.error('[draftRef onValue]', e);
  }
});

onValue(ref(db, 'wc26_live'), snap => {
  wcLiveData = snap.exists() ? snap.val() : null;
  if (draft?.status === 'finalized') renderScreen();
});

function connectWS() {
  if (ws) return;
  const url = PROXY.replace('https://','wss://').replace('http://','ws://') + '?slug=' + SLUG + '&type=wc';
  ws = new WebSocket(url);
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'state') pushDraftToFirebase(msg.draft);
  };
  ws.onclose = () => { ws = null; if (draft?.status === 'drafting') setTimeout(connectWS, 2000); };
  ws.onerror = () => ws?.close();
}

async function pushDraftToFirebase(d) {
  if (!d) return;
  await set(draftRef(), { ...d, undoStack: [], redoStack: [] });
}

async function proxyApi(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(`${PROXY}/wc/${SLUG}${path}`, opts).then(r => r.json());
}

function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function color(o) { return ALL_COLORS[o] || '#555'; }
function owners() { return draft?.owners || ALL_OWNERS; }

// ── Password gate ──────────────────────────────────────────────────
const stored = sessionStorage.getItem('wc_pw');
if (stored !== PW_MAIN) document.getElementById('pw-gate').classList.add('show');

window.pwCheck = function() {
  const val = document.getElementById('pw-input').value.trim().toLowerCase();
  if (val === PW_MAIN) {
    sessionStorage.setItem('wc_pw', val);
    document.getElementById('pw-gate').classList.remove('show');
  } else {
    document.getElementById('pw-error').textContent = 'Wrong password.';
    document.getElementById('pw-input').value = '';
    setTimeout(() => { document.getElementById('pw-error').textContent = ''; }, 2000);
  }
};

window.toggleCommMode = function() {
  if (isComm) {
    isComm = false;
    document.getElementById('comm-toggle').classList.remove('active');
    renderScreen();
  } else {
    document.getElementById('comm-pw-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('comm-pw-input').focus(), 50);
  }
};
window.checkCommPw = function() {
  const val = document.getElementById('comm-pw-input').value.trim().toLowerCase();
  if (val === PW_COMM) {
    isComm = true;
    document.getElementById('comm-toggle').classList.add('active');
    document.getElementById('comm-pw-modal').style.display = 'none';
    document.getElementById('comm-pw-input').value = '';
    document.getElementById('comm-pw-error').textContent = '';
    renderScreen();
  } else {
    document.getElementById('comm-pw-error').textContent = 'Wrong password.';
    document.getElementById('comm-pw-input').value = '';
    setTimeout(() => { document.getElementById('comm-pw-error').textContent = ''; }, 2000);
  }
};

// ── Render router ──────────────────────────────────────────────────
function renderScreen() {
  if (!draft) return;
  document.getElementById('tb-title').textContent = '⚽ ' + (draft.name || 'WC2026 Draft');
  const status = draft.status || 'setup';
  if (status === 'setup') renderSetup();
  else if (status === 'lobby') renderLobby();
  else if (status === 'drafting') renderDraft();
  else if (status === 'complete') renderComplete();
  else if (status === 'finalized') renderTracker();
}

// ── SETUP ──────────────────────────────────────────────────────────
function renderSetup() {
  document.getElementById('screen').innerHTML = `
    <div class="main-narrow">
      <div class="card">
        <h2 style="font-size:22px;font-weight:700;margin-bottom:20px;">Commissioner Setup</h2>
        <div class="form-group"><label>Draft name</label>
          <input type="text" id="s-name" placeholder="e.g. WC2026 Pool" value="${draft?.name||''}"></div>
        <div class="form-group"><label>Participants</label>
          <div class="owner-check-grid">${ALL_OWNERS.map(o => `
            <label class="owner-check">
              <input type="checkbox" id="p-${o}" value="${o}" ${(draft?.owners||ALL_OWNERS).includes(o)?'checked':''}>
              <span style="color:${color(o)};font-weight:700;">${o}</span>
            </label>`).join('')}</div>
        </div>
        <button class="btn btn-green" onclick="submitSetup()">Open Lobby →</button>
      </div>
    </div>`;
}

window.submitSetup = async function() {
  const nameEl = document.getElementById('s-name');
  if (!nameEl?.value.trim()) { alert('Enter a draft name.'); return; }
  const selectedOwners = ALL_OWNERS.filter(o => document.getElementById('p-' + o)?.checked);
  if (selectedOwners.length < 2) { alert('Select at least 2 participants.'); return; }
  connectWS();
  await proxyApi('/setup', 'POST', { name: nameEl.value.trim(), owners: selectedOwners });
};

// ── LOBBY ──────────────────────────────────────────────────────────
function renderLobby() {
  const ownerList = owners();
  const canStart = !!previewOrder;
  const snakePreview = previewOrder ? (() => {
    const fwd = previewOrder, rev = [...previewOrder].reverse();
    return [fwd, rev, fwd].flatMap(r => r).slice(0, 10)
      .map((o, i) => `<span style="color:${color(o)};font-weight:600;font-size:11px;">${i+1}. ${o}</span>`).join(' → ');
  })() : '';

  document.getElementById('screen').innerHTML = `
    <div class="main-narrow">
      <div class="card">
        <h2 style="font-size:22px;font-weight:700;margin-bottom:6px;">${draft.name}</h2>
        <p style="color:#888;font-size:13px;margin-bottom:18px;">Share: <code style="background:#f5f5f3;padding:2px 6px;border-radius:4px;font-size:11px;">${location.href}</code></p>
        <div style="margin-bottom:16px;">${ownerList.map(o =>
          `<div class="owner-item"><div style="width:8px;height:8px;border-radius:50%;background:${color(o)}"></div>
           <span style="color:${color(o)};font-weight:700;">${o}</span></div>`).join('')}</div>
        <div style="font-size:12px;color:#888;margin-bottom:8px;">48 teams · ${ownerList.length} participants · snake draft</div>
        <button class="btn btn-outline" style="width:100%;margin-bottom:6px;" onclick="genOrder()">${previewOrder?'Re-randomize':'Randomize'} Pick Order</button>
        ${previewOrder ? `<div class="order-preview">${previewOrder.map((o,i)=>`<span style="color:${color(o)};font-weight:700;">${i+1}. ${o}</span>`).join('  ')}</div>` : ''}
        ${snakePreview ? `<div style="font-size:11px;color:#888;margin-top:6px;margin-bottom:4px;">Snake preview: ${snakePreview} →…</div>` : ''}
        <button class="btn btn-green" style="width:100%;padding:12px;margin-top:16px;" onclick="startDraft()" ${canStart?'':'disabled'}>${canStart?'Start Draft →':'Randomize pick order first'}</button>
        <button class="btn btn-outline btn-sm" style="margin-top:16px;color:#c62828;border-color:#eee;" onclick="document.getElementById('reset-modal').style.display='flex'">Reset to Setup</button>
      </div>
    </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
window.genOrder = function() { previewOrder = shuffleArr(owners()); renderLobby(); };
window.startDraft = async function() {
  if (!previewOrder) return;
  connectWS();
  await proxyApi('/start', 'POST', { pickOrder: previewOrder });
};

// ── DRAFT ──────────────────────────────────────────────────────────
function renderDraft() {
  if (!ws) connectWS();
  const pickOrderScroll = document.getElementById('pick-order-list')?.scrollTop || 0;
  const teamScroll = document.querySelector('.team-grid-wrap')?.scrollTop || 0;

  const cur = getCur();
  const seq = draft.pickSequence || [];
  const globalIdx = draft.currentPickIndex;
  const isMobile = window.innerWidth <= 900;

  // Build team lookup: name → owner
  const teamOwnerMap = {};
  Object.entries(draft.picks || {}).forEach(([owner, teams]) => {
    (teams || []).forEach(t => { teamOwnerMap[t.name] = owner; });
  });

  // Pick order list
  const pickOrderHtml = seq
    .map((p, i) => ({ p, i }))
    .filter(({ i }) => isMobile ? i >= globalIdx : i >= Math.max(0, globalIdx - 2))
    .map(({ p, i }) => {
      const done = i < globalIdx, current = i === globalIdx;
      return `<div class="pick-item ${done?'done':current?'current':'upcoming'}">
        <span class="pick-num">${i+1}</span>
        <span style="color:${done?'#aaa':color(p.owner)};font-weight:${current?'700':'500'}">${p.owner}</span>
        <span style="font-size:10px;color:#ccc;margin-left:auto;">R${p.round}</span>
      </div>`;
    }).join('');

  // Team grid
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  const allTeams = draft.teams || [];
  // Reconstruct full team list (available + picked) for display
  const allTeamNames = new Set([...allTeams.map(t => t.name), ...Object.values(teamOwnerMap).length > 0 ? Object.keys(teamOwnerMap) : []]);

  // Build group sections
  // We need the original WC_TEAMS to know groups for picked teams too
  const WC_GROUPS = {
    A:['Mexico','South Africa','South Korea','Czechia'],
    B:['Canada','Bosnia-Herzegovina','Qatar','Switzerland'],
    C:['Brazil','Morocco','Haiti','Scotland'],
    D:['United States','Paraguay','Australia','Türkiye'],
    E:['Germany','Curaçao','Ivory Coast','Ecuador'],
    F:['Netherlands','Japan','Sweden','Tunisia'],
    G:['Belgium','Egypt','Iran','New Zealand'],
    H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],
    I:['France','Senegal','Iraq','Norway'],
    J:['Argentina','Algeria','Austria','Jordan'],
    K:['Portugal','Congo DR','Uzbekistan','Colombia'],
    L:['England','Croatia','Ghana','Panama']
  };

  const q = searchQuery.toLowerCase();
  const groupPillsHtml = `<div class="group-pills">
    <span class="group-pill ${!activeGroup?'active':''}" onclick="setActiveGroup(null)">All</span>
    ${groups.map(g => `<span class="group-pill ${activeGroup===g?'active':''}" onclick="setActiveGroup('${g}')">Group ${g}</span>`).join('')}
  </div>`;

  const groupHtml = groups.filter(g => !activeGroup || g === activeGroup).map(g => {
    const teamsInGroup = WC_GROUPS[g].filter(name => !q || name.toLowerCase().includes(q));
    if (!teamsInGroup.length) return '';
    return `<div class="group-section">
      <div class="group-label">Group ${g}</div>
      <div class="group-teams">
        ${teamsInGroup.map(name => {
          const owner = teamOwnerMap[name];
          const isPicked = !!owner;
          const isSelected = selectedTeam?.name === name;
          const ownerColor = owner ? color(owner) : '';
          return `<div class="team-card ${isPicked?'picked':''} ${isSelected?'selected':''}"
            onclick="${isPicked?'':'window.selectTeam(this.dataset.name)'}"
            data-name="${name.replace(/"/g,'&quot;')}"
            style="${isPicked?`border-color:${ownerColor};background:${ownerColor}18;`:''}" >
            <span class="team-flag">${flagImg(WC_FLAGS[name])}</span>
            <span class="team-name">${name}</span>
            ${isPicked?`<span style="font-size:9px;font-weight:700;color:${ownerColor};flex-shrink:0;">${owner}</span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  // Rosters (compact)
  const rosterHtml = owners().map(o => {
    const picks = (draft.picks || {})[o] || [];
    const maxShow = 5;
    return `<div class="roster-col">
      <div class="owner-header" style="background:${color(o)}">${o} <span style="font-weight:400;opacity:.8;">(${picks.length})</span></div>
      ${picks.slice(0, maxShow).map(t => `
        <div class="roster-team">
          <span class="team-flag">${flagImg(WC_FLAGS[t.name])}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.name}</span>
        </div>`).join('')}
      ${picks.length > maxShow ? `<div style="font-size:11px;color:#aaa;padding:4px 10px;">+${picks.length-maxShow} more</div>` : ''}
      ${picks.length === 0 ? `<div class="roster-team empty">No picks yet</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('screen').innerHTML = `
    <div class="main draft-screen">
      <div class="header-bar">
        <div>
          <div style="font-size:11px;color:#888;">${cur?`Round ${cur.round} · Pick ${globalIdx+1} of ${seq.length}`:''}</div>
          <div style="font-size:17px;font-weight:700;color:${cur?color(cur.owner):'#2e7d32'}">${cur?`${cur.owner} is on the clock`:'Draft complete!'}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button class="btn btn-sm btn-outline" onclick="doUndo()" ${globalIdx>0||draft.status==='complete'?'':'disabled'} style="color:#1a1a1a;border-color:#ccc;">↩ Undo</button>
          <button class="btn btn-sm btn-outline" onclick="doRedo()" style="color:#1a1a1a;border-color:#ccc;">↪ Redo</button>
          ${cur && selectedTeam ? `<button class="btn btn-sm btn-green" onclick="confirmPick()">Pick ${selectedTeam.name}</button>` : `<button class="btn btn-sm btn-green" disabled>Select a team</button>`}
          ${isComm ? `<button class="btn btn-sm btn-outline" onclick="doSeed()" style="color:#e65100;border-color:#e65100;">⚡ Seed</button><button class="btn btn-sm btn-red" onclick="document.getElementById('reset-modal').style.display='flex'">Reset</button>` : ''}
        </div>
      </div>
      <div class="draft-tabs">
        <button class="draft-tab active" onclick="switchTab(0,this)">Order</button>
        <button class="draft-tab" onclick="switchTab(1,this)">Teams</button>
        <button class="draft-tab" onclick="switchTab(2,this)">Rosters</button>
      </div>
      <div class="draft-layout">
        <div class="card draft-col active">
          <div class="section-hdr">Pick Order</div>
          <div id="pick-order-list">${pickOrderHtml}</div>
        </div>
        <div class="card draft-col active" style="padding:12px;">
          <input class="pool-search" id="search-input" placeholder="Search teams…" value="${searchQuery}" oninput="onSearch(this.value)">
          <div class="team-grid-wrap">${groupPillsHtml}${groupHtml}</div>
        </div>
        <div class="card draft-col active" style="padding:10px;">
          <div class="section-hdr">Rosters (${Object.values(draft.picks||{}).reduce((s,a)=>s+(a?.length||0),0)}/48 picked)</div>
          <div class="roster-grid-wrap"><div class="roster-grid">${rosterHtml}</div></div>
        </div>
      </div>
    </div>`;

  // Restore scrolls
  if (pickOrderScroll) { const el = document.getElementById('pick-order-list'); if (el) el.scrollTop = pickOrderScroll; }
  if (teamScroll) { const el = document.querySelector('.team-grid-wrap'); if (el) el.scrollTop = teamScroll; }
}

function getCur() {
  if (!draft) return null;
  return (draft.pickSequence || [])[draft.currentPickIndex] || null;
}

window.selectTeam = function(name) {
  if (!name) return;
  const teams = draft.teams || [];
  const t = teams.find(x => x.name === name);
  if (!t) return;
  selectedTeam = selectedTeam?.name === name ? null : t;
  // Update UI in place
  document.querySelectorAll('.team-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.name === selectedTeam?.name);
  });
  // Update pick button
  const pickBtn = document.querySelector('.btn-green:not([disabled])');
  if (pickBtn && pickBtn.onclick?.toString().includes('confirmPick')) {
    pickBtn.textContent = selectedTeam ? `Pick ${selectedTeam.name}` : 'Select a team';
    pickBtn.disabled = !selectedTeam;
  }
  // Re-render header to update button
  renderHeaderButtons();
};

  const cur = getCur();

// ── Financial computation ──────────────────────────────────────────
function computeFinancials(matches, teamOwners, participants) {
  const n = participants.length;
  const net = {}, netGoals = {}, netMatch = {}, tiePotPaid = {};
  const goalsByOwner = {}, goalsByTeam = {}, tieCount = {}, gamesPlayed = {};
  let tiePotTotal = 0;
  participants.forEach(p => {
    net[p]=0; netGoals[p]=0; netMatch[p]=0; tiePotPaid[p]=0;
    goalsByOwner[p]=0; tieCount[p]=0; gamesPlayed[p]=0;
  });
  Object.values(matches||{}).filter(m=>m.status==='final').forEach(m => {
    const ho = teamOwners[m.homeTeam], ao = teamOwners[m.awayTeam];
    const hs = m.homeScore||0, as = m.awayScore||0;
    if (ho!==undefined) gamesPlayed[ho]++;
    if (ao!==undefined) gamesPlayed[ao]++;
    if (ho!==undefined && hs>0) {
      goalsByTeam[m.homeTeam]=(goalsByTeam[m.homeTeam]||0)+hs;
      const e=hs*(n-1); net[ho]+=e; netGoals[ho]+=e; goalsByOwner[ho]+=hs;
      participants.forEach(p=>{if(p!==ho){net[p]-=hs;netGoals[p]-=hs;}});
    }
    if (ao!==undefined && as>0) {
      goalsByTeam[m.awayTeam]=(goalsByTeam[m.awayTeam]||0)+as;
      const e=as*(n-1); net[ao]+=e; netGoals[ao]+=e; goalsByOwner[ao]+=as;
      participants.forEach(p=>{if(p!==ao){net[p]-=as;netGoals[p]-=as;}});
    }
    const isTie=(m.stage==='group'&&hs===as)||(m.stage!=='group'&&m.isPenaltyShootout);
    if (isTie) {
      if (ho!==undefined){net[ho]-=10;netMatch[ho]-=10;tiePotPaid[ho]+=10;tieCount[ho]++;tiePotTotal+=10;}
      if (ao!==undefined&&ao!==ho){net[ao]-=10;netMatch[ao]-=10;tiePotPaid[ao]+=10;tieCount[ao]++;tiePotTotal+=10;}
      else if (ao!==undefined&&ao===ho){net[ho]-=20;netMatch[ho]-=20;tiePotPaid[ho]+=20;tieCount[ho]+=2;tiePotTotal+=20;}
    } else if (ho!==undefined&&ao!==undefined) {
      const wo=hs>as?ho:ao, lo=hs>as?ao:ho;
      if (wo!==lo){net[wo]+=10;netMatch[wo]+=10;net[lo]-=10;netMatch[lo]-=10;}
    }
  });
  return {net,netGoals,netMatch,tiePotPaid,goalsByOwner,goalsByTeam,tieCount,tiePotTotal,gamesPlayed};
}
function fmtMoney(n){return n===0?'$0':(n>0?'+$':'-$')+Math.abs(n).toLocaleString();}

// ── TRACKER (shown when finalized) ────────────────────────────────
function renderTracker() {
  document.getElementById('tb-title').textContent = '⚽ ' + (draft?.name || 'WC2026');
  const el = document.getElementById('screen');
  if (!wcLiveData) {
    el.innerHTML = `<div class="tracker-wrap"><div style="text-align:center;padding:60px 20px;color:#888;">
      <div style="font-size:32px;margin-bottom:12px;">⚽</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:6px;">Waiting for match data</div>
      <div style="font-size:13px;color:#aaa;">Scores will appear here once matches are played.</div>
      ${isComm?`<div style="margin-top:20px;"><button class="btn btn-sm btn-outline" onclick="seedMatches()" style="color:#e65100;border-color:#e65100;">⚡ Seed Matches</button></div>`:''}
    </div></div>`;
    return;
  }
  const matches = wcLiveData.matches || {};
  const teamOwners = wcLiveData.teamOwners || {};
  const config = wcLiveData.config || {};
  const participants = config.participants || draft?.owners || Object.keys(ALL_COLORS);
  const updatedStr = wcLiveData.updated || null;
  const fin = computeFinancials(matches, teamOwners, participants);
  const ranked = [...participants].sort((a,b)=>(fin.net[b]||0)-(fin.net[a]||0));
  const updatedAgo = updatedStr ? (() => {
    const m=Math.floor((Date.now()-new Date(updatedStr))/60000);
    return m<1?'just now':m<60?`${m}m ago`:`${Math.floor(m/60)}h ago`;
  })() : null;

  // Tie pot tiebreakers
  const tieVals = participants.map(p=>fin.tieCount[p]||0);
  const maxTies = Math.max(...tieVals,0), minTies = Math.min(...tieVals);
  let mostTied = participants.filter(p=>fin.tieCount[p]===maxTies&&maxTies>0);
  if (mostTied.length>1){const mg=Math.min(...mostTied.map(p=>fin.gamesPlayed[p]||0));const tb=mostTied.filter(p=>(fin.gamesPlayed[p]||0)===mg);if(tb.length<mostTied.length)mostTied=tb;}
  let leastTied = fin.tiePotTotal>0?participants.filter(p=>fin.tieCount[p]===minTies):[];
  if (leastTied.length>1){const mg=Math.max(...leastTied.map(p=>fin.gamesPlayed[p]||0));const tb=leastTied.filter(p=>(fin.gamesPlayed[p]||0)===mg);if(tb.length<leastTied.length)leastTied=tb;}

  // Commissioner panel
  const commHtml = isComm ? `<div class="comm-panel"><div class="comm-label">Commissioner Controls</div><div class="comm-actions">
    <button class="refresh-btn" id="refresh-btn" onclick="refreshScores()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>Refresh Scores
    </button>
    <button class="btn btn-sm btn-amber" onclick="openMatchModal()">+ Add / Edit Match</button>
    <button class="btn btn-sm btn-outline" onclick="loadSchedule()" style="color:#1565c0;border-color:#1565c0;">📅 Load Schedule</button>
    <button class="btn btn-sm btn-outline" onclick="seedMatches()" style="color:#e65100;border-color:#e65100;">⚡ Seed Matches</button>
    ${updatedAgo?`<span class="updated-txt">Updated ${updatedAgo}</span>`:''}
  </div></div>` : '';

  // Leaderboard
  const gFmt = v=>v>0?`+$${v}`:v<0?`-$${Math.abs(v)}`:'$0';
  const lbHtml = `<div class="lb-grid">${ranked.map((p,i)=>{
    const n=fin.net[p]||0,cls=n>0?'pos':n<0?'neg':'zero';
    const isMost=mostTied.includes(p)&&maxTies>0,isLeast=leastTied.includes(p)&&fin.tiePotTotal>0;
    return `<div class="lb-card"><div class="lb-stripe" style="background:${color(p)}"></div><div class="lb-body">
      <div class="lb-rank">#${i+1}</div>
      <div class="lb-name" style="color:${color(p)}">${p}</div>
      <div class="lb-net ${cls}">${fmtMoney(n)}</div>
      <div class="lb-breakdown"><span>Goals ${gFmt(fin.netGoals[p]||0)}</span><span>W/L ${gFmt(fin.netMatch[p]||0)}</span><span>Pot −$${fin.tiePotPaid[p]||0}</span></div>
      <div class="lb-sub2">${fin.tieCount[p]||0} ties${isMost?' <span class="tiepot-badge tiepot-most">MOST</span>':''}${isLeast?' <span class="tiepot-badge tiepot-least">FEWEST</span>':''}</div>
    </div></div>`;
  }).join('')}</div>`;

  // Tie pot
  const tiepotHtml = fin.tiePotTotal>0?`<div class="tiepot-card"><div>
    <div class="tiepot-label">Raiders/Chargers/Izzy Birth Night Memorial Tie Side-Pot</div>
    <div class="tiepot-total">$${fin.tiePotTotal}</div>
    <div class="tiepot-sub">Split 50/50: most ties & fewest ties</div>
    ${mostTied.length?`<div style="margin-top:8px;font-size:12px;"><span class="tiepot-badge tiepot-most">MOST</span> ${mostTied.join(', ')} (${maxTies})</div>`:''}
    ${leastTied.length?`<div style="margin-top:4px;font-size:12px;"><span class="tiepot-badge tiepot-least">FEWEST</span> ${leastTied.join(', ')} (${minTies})</div>`:''}
  </div><div style="flex:1;min-width:200px;">
    <div class="tiepot-label" style="margin-bottom:8px;">Tie Counts</div>
    ${[...participants].sort((a,b)=>(fin.tieCount[b]||0)-(fin.tieCount[a]||0)).map(p=>{
      const tc=fin.tieCount[p]||0,pct=maxTies>0?(tc/maxTies)*100:0;
      return `<div class="tiepot-row"><span class="tiepot-name" style="color:${color(p)}">${p}</span>
        <div class="tiepot-bar-wrap"><div class="tiepot-bar" style="width:${pct}%;background:${color(p)}"></div></div>
        <span class="tiepot-count">${tc}</span>
        ${mostTied.includes(p)&&maxTies>0?'<span class="tiepot-badge tiepot-most">M</span>':leastTied.includes(p)&&fin.tiePotTotal>0?'<span class="tiepot-badge tiepot-least">L</span>':''}
      </div>`;
    }).join('')}
  </div></div>` : '';

  // Match table
  const matchList=Object.values(matches).sort((a,b)=>new Date(a.date)-new Date(b.date)).filter(m=>m.status==='final'||m.status==='live');
  const matchRows=matchList.map(m=>{
    const ho=teamOwners[m.homeTeam],ao=teamOwners[m.awayTeam];
    const hs=m.homeScore??'?',as=m.awayScore??'?';
    const isTie=(m.stage==='group'&&m.homeScore===m.awayScore)||(m.stage!=='group'&&m.isPenaltyShootout);
    const stageLbl={group:'Group',r32:'R32',r16:'R16',qf:'QF',sf:'SF',final:'Final'}[m.stage]||m.stage;
    const grpLbl=m.group?` ${m.group}`:'';
    let mm='',gm='';
    if(m.status==='final'){
      if(isTie)mm=`<span class="money-tie">TIE −$10 ea</span>`;
      else if(ho&&ao&&ho!==ao){const wo=(m.homeScore||0)>(m.awayScore||0)?ho:ao;mm=`<span class="money-pos">${wo} +$10</span>`;}
      const tg=(m.homeScore||0)+(m.awayScore||0);if(tg>0)gm=`<span style="color:#555;">${tg}g</span>`;
    }
    return `<tr class="${isTie?'tie-row':''}">
      <td style="font-size:11px;color:#aaa;">${m.date?new Date(m.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—'}</td>
      <td><div style="display:flex;align-items:center;gap:4px;">${flagImg(WC_FLAGS[m.homeTeam])}<span style="font-weight:${!isTie&&(m.homeScore||0)>(m.awayScore||0)?700:400}">${m.homeTeam}</span>${ho?`<span class="owner-chip" style="background:${color(ho)}22;color:${color(ho)}">${ho}</span>`:''}</div></td>
      <td class="score-cell">${m.status==='live'?`<span style="color:#e65100;font-weight:700;">${hs}–${as}</span>`:m.status==='final'?`${hs}–${as}`:'—'}</td>
      <td><div style="display:flex;align-items:center;gap:4px;">${flagImg(WC_FLAGS[m.awayTeam])}<span style="font-weight:${!isTie&&(m.awayScore||0)>(m.homeScore||0)?700:400}">${m.awayTeam}</span>${ao?`<span class="owner-chip" style="background:${color(ao)}22;color:${color(ao)}">${ao}</span>`:''}</div></td>
      <td><span class="stage-badge">${stageLbl}${grpLbl}</span>${m.isPenaltyShootout?' <span class="pk-badge">PK</span>':''}</td>
      <td>${mm}</td><td>${gm}</td>
      ${isComm?`<td><button class="btn btn-sm btn-outline" onclick="editMatch('${m.id}')" style="font-size:10px;padding:2px 6px;">Edit</button></td>`:''}
    </tr>`;
  }).join('');
  // Upcoming fixtures (scheduled only, next 10)
  const upcomingList=Object.values(matches).filter(m=>m.status==='scheduled').sort((a,b)=>new Date(a.date)-new Date(b.date));
  const upcomingRows=upcomingList.map(m=>{
    const ho=teamOwners[m.homeTeam],ao=teamOwners[m.awayTeam];
    const stageLbl={group:'Group',r32:'R32',r16:'R16',qf:'QF',sf:'SF',final:'Final'}[m.stage]||m.stage;
    const grpLbl=m.group?` ${m.group}`:'';
    const dateObj=m.date?new Date(m.date):null;
    const dateLbl=dateObj?dateObj.toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
    const timeLbl=dateObj?dateObj.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'}):'';
    return `<tr>
      <td style="font-size:11px;color:#aaa;white-space:nowrap;">${dateLbl}<div style="font-size:10px;color:#bbb;">${timeLbl}</div></td>
      <td><div style="display:flex;align-items:center;gap:4px;">${flagImg(WC_FLAGS[m.homeTeam])}<span>${m.homeTeam}</span>${ho?`<span class="owner-chip" style="background:${color(ho)}22;color:${color(ho)}">${ho}</span>`:''}</div></td>
      <td class="c" style="font-size:11px;color:#bbb;font-weight:600;">vs</td>
      <td><div style="display:flex;align-items:center;gap:4px;">${flagImg(WC_FLAGS[m.awayTeam])}<span>${m.awayTeam}</span>${ao?`<span class="owner-chip" style="background:${color(ao)}22;color:${color(ao)}">${ao}</span>`:''}</div></td>
      <td><span class="stage-badge">${stageLbl}${grpLbl}</span></td>
      ${isComm?`<td><button class="btn btn-sm btn-outline" onclick="editMatch('${m.id}')" style="font-size:10px;padding:2px 6px;">Edit</button></td>`:''}
    </tr>`;
  }).join('');
  const upcomingHtml=upcomingList.length===0?'':`
    <div style="margin-top:20px;">
      <div class="match-table-wrap">
        <div style="padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;border-bottom:0.5px solid #e0e0e0;">Upcoming Fixtures</div>
        <table class="match-table"><thead><tr><th>Date</th><th>Home</th><th class="c"></th><th>Away</th><th>Stage</th>${isComm?'<th></th>':''}</tr></thead>
        <tbody>${upcomingRows}</tbody></table>
      </div>
      <div class="match-cards">
        ${upcomingList.map(m=>{
          const ho=teamOwners[m.homeTeam],ao=teamOwners[m.awayTeam];
          const stageLbl={group:'Group',r32:'R32',r16:'R16',qf:'QF',sf:'SF',final:'Final'}[m.stage]||m.stage;
          const grpLbl=m.group?` ${m.group}`:'';
          const dateObj=m.date?new Date(m.date):null;
          const dateLbl=dateObj?dateObj.toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
          const timeLbl=dateObj?dateObj.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'';
          return `<div class="match-card">
            <div class="match-card-top">
              <span>${dateLbl}${timeLbl?' · '+timeLbl:''}</span>
              <span class="stage-badge">${stageLbl}${grpLbl}</span>
            </div>
            <div class="match-card-teams">
              <div class="match-card-team">${flagImg(WC_FLAGS[m.homeTeam])}<span>${m.homeTeam}</span>${ho?`<span style="font-size:10px;font-weight:700;color:${color(ho)}">${ho}</span>`:''}</div>
              <div class="match-card-score" style="font-size:14px;color:#bbb;">vs</div>
              <div class="match-card-team away">${flagImg(WC_FLAGS[m.awayTeam])}<span>${m.awayTeam}</span>${ao?`<span style="font-size:10px;font-weight:700;color:${color(ao)}">${ao}</span>`:''}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  const matchTableHtml=`<div class="match-table-wrap">${matchList.length===0?'<div style="text-align:center;padding:40px;color:#aaa;">No matches played yet</div>':`
    <table class="match-table"><thead><tr><th>Date</th><th>Home</th><th class="c">Score</th><th>Away</th><th>Stage</th><th>Match $</th><th>Goals</th>${isComm?'<th></th>':''}</tr></thead>
    <tbody>${matchRows}</tbody></table>`}</div>
  <div class="match-cards">${matchList.length===0?'<div style="text-align:center;padding:40px;color:#aaa;">No matches played yet</div>':
    matchList.map(m=>{
      const ho=teamOwners[m.homeTeam],ao=teamOwners[m.awayTeam];
      const hs=m.homeScore??'?',as=m.awayScore??'?';
      const isTie=(m.stage==='group'&&m.homeScore===m.awayScore)||(m.stage!=='group'&&m.isPenaltyShootout);
      const stageLbl={group:'Group',r32:'R32',r16:'R16',qf:'QF',sf:'SF',final:'Final'}[m.stage]||m.stage;
      const grpLbl=m.group?` ${m.group}`:'';
      const homeWin=!isTie&&(m.homeScore||0)>(m.awayScore||0);
      const awayWin=!isTie&&(m.awayScore||0)>(m.homeScore||0);
      let footer='';
      if(m.status==='final'){
        if(isTie)footer+=`<span class="money-tie">TIE — −$10 ea</span>`;
        else if(ho&&ao&&ho!==ao){const wo=homeWin?ho:ao;footer+=`<span class="money-pos">${wo} +$10</span>`;}
        const tg=(m.homeScore||0)+(m.awayScore||0);if(tg>0)footer+=`<span style="color:#555;">${tg} goals</span>`;

          <span>${m.date?new Date(m.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</span>
          <span class="stage-badge">${stageLbl}${grpLbl}</span>
        </div>
        <div class="match-card-teams">
          <div class="match-card-team">
            ${flagImg(WC_FLAGS[m.homeTeam])}
            <span style="font-weight:${homeWin?700:400}">${m.homeTeam}</span>
            ${ho?`<span style="font-size:10px;font-weight:700;color:${color(ho)}">${ho}</span>`:''}

      <div class="teams-card-name" style="color:${color(p)}">${p}</div>
      <div class="teams-card-net ${cls}">${fmtMoney(mn)}</div>
    </div>${myTeams.length===0?'<div class="team-row" style="color:#aaa;font-style:italic;">No teams</div>':
      myTeams.map(nm=>`<div class="team-row"><span class="team-flag">${flagImg(WC_FLAGS[nm])}</span><span class="team-name-txt">${nm}</span>${fin.goalsByTeam[nm]?`<span class="team-goals">⚽ ${fin.goalsByTeam[nm]}</span>`:''}<span class="team-group">Grp ${WC_GROUPS_MAP[nm]||'?'}</span></div>`).join('')}
    </div>`;
  }).join('')}</div>`;

  const tabsHtml=`<div class="tracker-tabs">
    <div class="tracker-tab ${trackerTab==='leaderboard'?'active':''}" onclick="switchTrackerTab('leaderboard')">Leaderboard</div>
    <div class="tracker-tab ${trackerTab==='matches'?'active':''}" onclick="switchTrackerTab('matches')">Matches</div>

  let content='';
  if(trackerTab==='leaderboard')content=lbHtml+(fin.tiePotTotal>0?tiepotHtml:'');
  else if(trackerTab==='matches')content=matchTableHtml+upcomingHtml;
  else if(trackerTab==='teams')content=teamsHtml;
  else if(trackerTab==='rules')content=rulesHtml();

  const refreshBarHtml=`<div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:16px;">
    ${updatedAgo?`<span style="font-size:11px;color:#aaa;">Updated ${updatedAgo}</span>`:''}
    <button class="refresh-btn" onclick="refreshScores()" style="background:#f5f5f3;color:#666;border:0.5px solid #ddd;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>Refresh
    </button>
  </div>`;

  el.innerHTML=`<div class="tracker-wrap">${commHtml}${tabsHtml}${refreshBarHtml}${content}</div>`;

  // Auto-refresh every 3 minutes
  if(!autoRefreshInterval){
    autoRefreshInterval=setInterval(function(){window.refreshScores();},3*60*1000);
  }
}

// ── Tracker: match modal ───────────────────────────────────────────
window.openMatchModal = function(matchId) {
  const m = matchId && wcLiveData?.matches?.[matchId];
  ['m-home','m-away'].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML='<option value="">— Select —</option>'+Object.keys(WC_FLAGS).map(t=>`<option value="${t}"${m&&(id==='m-home'?m.homeTeam:m.awayTeam)===t?' selected':''}>${t}</option>`).join('');
  });
  document.getElementById('m-id').value=m?m.id:'';
  document.getElementById('m-hscore').value=m?.homeScore??0;
  document.getElementById('m-ascore').value=m?.awayScore??0;
  document.getElementById('m-stage').value=m?.stage||'group';
  document.getElementById('m-status').value=m?.status||'final';
  document.getElementById('m-pk').checked=m?.isPenaltyShootout||false;
  document.getElementById('match-error').textContent='';
  document.getElementById('match-modal').style.display='flex';
};
window.editMatch = function(id){openMatchModal(id);};
window.submitMatch = async function() {
  const id=document.getElementById('m-id').value.trim();
  const homeTeam=document.getElementById('m-home').value;
  const awayTeam=document.getElementById('m-away').value;
  if(!id){document.getElementById('match-error').textContent='Enter a match ID.';return;}
  if(!homeTeam||!awayTeam){document.getElementById('match-error').textContent='Select both teams.';return;}
  if(homeTeam===awayTeam){document.getElementById('match-error').textContent='Home and away must be different.';return;}
  const match={id,homeTeam,awayTeam,
    homeScore:parseInt(document.getElementById('m-hscore').value,10),
    awayScore:parseInt(document.getElementById('m-ascore').value,10),
    stage:document.getElementById('m-stage').value,
    status:document.getElementById('m-status').value,
    isPenaltyShootout:document.getElementById('m-pk').checked,
    date:new Date().toISOString()};
  try {
    await set(ref(db,'wc26_live/matches/'+id),match);
    document.getElementById('match-modal').style.display='none';
    showToast('✓ Match saved');
  } catch(e){document.getElementById('match-error').textContent=e.message;}
};
window.refreshScores = async function() {
  if(trackerRefreshing)return; trackerRefreshing=true;
  document.querySelectorAll('.refresh-btn').forEach(b=>b.classList.add('spinning'));
  try{await fetch(`${PROXY}/wc/matches/refresh`,{method:'POST'});}catch(e){console.error(e);}
  finally{trackerRefreshing=false;document.querySelectorAll('.refresh-btn').forEach(b=>b.classList.remove('spinning'));}
};
window.loadSchedule = async function() {
  if(!confirm('Fetch the full WC2026 schedule from ESPN and load into Firebase? This will take ~15 seconds.'))return;
  showToast('Loading schedule…', 20000);
  try {
    const r = await fetch(`${PROXY}/wc/schedule/load`, {method:'POST'});
    const data = await r.json();
    if(data.ok) showToast(`✓ ${data.total} matches loaded (${data.byStatus.scheduled} scheduled, ${data.byStatus.final} final)`);
    else showToast('Error: ' + (data.error || 'unknown'));
  } catch(e) {
    showToast('Error loading schedule');
    console.error(e);
  }
};
window.seedMatches = async function() {
  if(!confirm('Generate 72 random group stage match results and overwrite Firebase? This is for testing only.'))return;
  const SG={A:['Mexico','South Africa','South Korea','Czechia'],B:['Canada','Bosnia-Herzegovina','Qatar','Switzerland'],C:['Brazil','Morocco','Haiti','Scotland'],D:['United States','Paraguay','Australia','Türkiye'],E:['Germany','Curaçao','Ivory Coast','Ecuador'],F:['Netherlands','Japan','Sweden','Tunisia'],G:['Belgium','Egypt','Iran','New Zealand'],H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],I:['France','Senegal','Iraq','Norway'],J:['Argentina','Algeria','Austria','Jordan'],K:['Portugal','Congo DR','Uzbekistan','Colombia'],L:['England','Croatia','Ghana','Panama']};
  function rg(){const r=Math.random();return r<.2?0:r<.5?1:r<.75?2:r<.9?3:4;}
  const ms={};let id=9000;const bd=new Date('2026-06-11T18:00:00Z');
  Object.entries(SG).forEach(([g,ts])=>{for(let i=0;i<ts.length;i++)for(let j=i+1;j<ts.length;j++){const d=new Date(bd);d.setDate(d.getDate()+(id-9000));ms['seed_'+id]={id:'seed_'+id,date:d.toISOString(),name:ts[i]+' vs '+ts[j],stage:'group',group:g,homeTeam:ts[i],awayTeam:ts[j],homeScore:rg(),awayScore:rg(),status:'final',isPenaltyShootout:false};id++;}});
  try{await set(ref(db,'wc26_live/matches'),ms);await set(ref(db,'wc26_live/updated'),new Date().toISOString());showToast('⚡ '+Object.keys(ms).length+' matches seeded');}
  catch(e){alert('Firebase error: '+e.message);}
};

function renderComplete() {
  const isFinalized = draft.status === 'finalized';
  const commHtml = isComm ? `
    <div style="background:#1a1a1a;border-radius:12px;padding:14px 16px;margin-bottom:16px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:10px;">Commissioner Controls</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <button class="btn btn-green" onclick="finalizeDraft()" ${isFinalized?'disabled':''}>
          ${isFinalized?'✓ Pushed to Firebase':'Push to Firebase →'}
        </button>
        <button class="btn btn-sm btn-outline" style="color:#c62828;border-color:#555;" onclick="document.getElementById('reset-modal').style.display='flex'">Reset Draft</button>
      </div>
      ${isFinalized?'<div style="font-size:11px;color:#2e7d32;margin-top:8px;">Draft assignments are live in Firebase. Open the live tracker to start tracking matches.</div>':''}
    </div>` : '';

  const colsHtml = owners().map(o => {
    const picks = (draft.picks || {})[o] || [];
    return `<div class="complete-col">
      <div class="owner-header" style="background:${color(o)}">${o} — ${picks.length} teams</div>
      ${picks.map(t => `
        <div class="complete-team-row">
          <span class="team-flag">${flagImg(WC_FLAGS[t.name])}</span>
          <span>${t.name}</span>
          <span style="font-size:10px;color:#aaa;margin-left:auto;">Group ${t.group}</span>
        </div>`).join('')}
    </div>`;
  }).join('');

  document.getElementById('screen').innerHTML = `
    <div class="main">
      <div class="complete-banner">
        <div style="font-size:22px;font-weight:800;">Draft Complete! ⚽</div>
        <div style="margin-top:6px;opacity:.85;">All 48 teams drafted.${isFinalized?' Assignments pushed to Firebase.':' Commissioner: push to Firebase to start tracking.'}</div>
      </div>
      ${commHtml}
      <div class="complete-grid">${colsHtml}</div>
    </div>`;
}

window.finalizeDraft = async function() {
  if (!confirm('Push draft assignments to Firebase? This starts the live tracker.')) return;
  try {
    const teamOwners = {};
    Object.entries(draft.picks || {}).forEach(([owner, teams]) => {
      (teams || []).forEach(t => { teamOwners[t.name] = owner; });
    });
    await set(ref(db, 'wc26_live/teamOwners'), teamOwners);
    await set(ref(db, 'wc26_live/config'), {
      participants: draft.owners,
      draftName: draft.name,
      finalizedAt: new Date().toISOString()
    });
    // Mark draft as finalized in Firebase
    await set(draftRef(), { ...draft, status: 'finalized', undoStack: [], redoStack: [] });
    showToast('✓ Draft pushed to Firebase! Open the live tracker.');
  } catch(e) {
    alert('Firebase error: ' + e.message);
  }
};
