<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;}

.topbar{background:#1a1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-nav{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.topbar-nav a{color:#aaa;font-size:13px;text-decoration:none;white-space:nowrap;}
.topbar-nav a:hover{color:#fff;}
.comm-toggle{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid #444;color:#aaa;background:transparent;cursor:pointer;}
.comm-toggle.active{background:#f9a825;color:#1a1a1a;border-color:#f9a825;}
.topbar-hide-mobile{display:none;}
@media(min-width:600px){.topbar-hide-mobile{display:inline;}}

.main{max-width:1200px;margin:0 auto;padding:20px;}

.btn{background:#1a1a1a;color:#fff;border:none;font-size:13px;font-weight:600;padding:8px 16px;border-radius:7px;cursor:pointer;transition:background .15s;}
.btn:hover{background:#333;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-sm{font-size:12px;padding:5px 11px;border-radius:5px;}
.btn-outline{background:transparent;color:#1a1a1a;border:1px solid #ccc;}
.btn-outline:hover{background:#f0f0ee;}
.btn-green{background:#2e7d32;color:#fff;border:none;}
.btn-green:hover{background:#1b5e20;}
.btn-red{background:#c62828;color:#fff;border:none;}
.btn-red:hover{background:#b71c1c;}
.btn-amber{background:#e65100;color:#fff;border:none;}
.btn-amber:hover{background:#bf360c;}

/* Leaderboard cards */
.lb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.lb-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;overflow:hidden;}
.lb-stripe{height:4px;}
.lb-body{padding:14px 16px;}
.lb-rank{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.lb-name{font-size:15px;font-weight:700;margin-bottom:6px;}
.lb-net{font-size:26px;font-weight:800;letter-spacing:-.02em;}
.lb-net.pos{color:#2e7d32;}
.lb-net.neg{color:#c62828;}
.lb-net.zero{color:#1a1a1a;}
.lb-sub{font-size:11px;color:#aaa;margin-top:4px;}
.lb-breakdown{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:#888;margin-top:4px;border-top:1px solid #f0f0f0;padding-top:4px;}
.lb-breakdown span{white-space:nowrap;}

/* Section headers */
.section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:12px;}

/* Ties side-pot */
.tiepot-card{background:#1a1a1a;color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap;}
.tiepot-total{font-size:32px;font-weight:800;color:#f9a825;}
.tiepot-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:2px;}
.tiepot-sub{font-size:12px;color:#888;margin-top:2px;}
.tiepot-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;}
.tiepot-name{font-weight:700;width:56px;}
.tiepot-bar-wrap{flex:1;height:6px;background:#2a2a2a;border-radius:3px;overflow:hidden;}
.tiepot-bar{height:6px;border-radius:3px;transition:width .3s;}
.tiepot-count{font-size:12px;font-weight:700;width:20px;text-align:right;}
.tiepot-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:4px;}
.tiepot-most{background:#f9a825;color:#1a1a1a;}
.tiepot-least{background:#1565c0;color:#fff;}

/* Team grid */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px;}
.teams-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;overflow:hidden;}
.teams-card-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.teams-card-name{font-size:14px;font-weight:700;}
.teams-card-net{font-size:13px;font-weight:700;}
.teams-card-net.pos{color:#2e7d32;}
.teams-card-net.neg{color:#c62828;}
.team-row{display:flex;align-items:center;gap:8px;padding:6px 14px;border-top:0.5px solid #f5f5f3;font-size:12px;}
.team-flag{flex-shrink:0;display:inline-flex;align-items:center;}
.team-flag img{width:20px;height:15px;border-radius:2px;display:block;}
.team-name-txt{flex:1;}
.team-goals{font-size:11px;font-weight:700;color:#2e7d32;}
.team-group{font-size:10px;color:#bbb;}

/* Match table */
.match-table-wrap{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;overflow:hidden;margin-bottom:24px;}
.match-table{width:100%;border-collapse:collapse;font-size:12px;}
.match-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#aaa;padding:8px 12px;border-bottom:0.5px solid #e0e0e0;text-align:left;white-space:nowrap;}
.match-table th.r{text-align:right;}
.match-table th.c{text-align:center;}
.match-table td{padding:7px 12px;border-bottom:0.5px solid #f5f5f3;vertical-align:middle;}
.match-table td.c{text-align:center;}
.match-table td.r{text-align:right;}
.match-table tr:last-child td{border-bottom:none;}
.match-table tr.tie-row td{background:#fffdf0;}
.score-cell{font-size:14px;font-weight:800;text-align:center;white-space:nowrap;letter-spacing:.02em;}
.owner-chip{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.money-pos{color:#2e7d32;font-weight:700;}
.money-neg{color:#c62828;font-weight:700;}
.money-tie{color:#e65100;font-weight:700;}
.stage-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#f5f5f3;color:#888;white-space:nowrap;}
.pk-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;background:#fff3cd;color:#856404;white-space:nowrap;}
.status-live{color:#e65100;font-weight:700;}
.status-sched{color:#bbb;}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid #e8e8e8;margin-bottom:20px;}
.tab{padding:8px 22px;font-size:13px;font-weight:700;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.01em;}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;}

/* Commissioner panel */
.comm-panel{background:#1a1a1a;border-radius:12px;padding:14px 16px;margin-bottom:20px;}
.comm-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:10px;}
.comm-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

/* Manual match modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px;}
.fb-field{margin-bottom:14px;}
.fb-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:5px;}
.fb-field input,.fb-field select{width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;color:#1a1a1a;}
.fb-field input:focus,.fb-field select:focus{outline:none;border-color:#1a1a1a;}

/* Password gate */
.pw-gate{display:none;position:fixed;inset:0;background:#1a1a1a;z-index:9999;align-items:center;justify-content:center;}
.pw-gate.show{display:flex;}
.pw-box{text-align:center;padding:40px 20px;max-width:340px;width:100%;}
.pw-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:6px;}
.pw-sub{font-size:14px;color:#666;margin-bottom:32px;}
.pw-input{width:100%;background:#2a2a2a;border:1px solid #333;border-radius:10px;padding:13px 16px;font-size:16px;color:#fff;font-family:inherit;text-align:center;letter-spacing:.08em;}
.pw-input:focus{outline:none;border-color:#555;}
.pw-input::placeholder{color:#555;letter-spacing:0;}
.pw-btn{margin-top:12px;width:100%;background:#fff;color:#1a1a1a;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;}
.pw-btn:hover{background:#ddd;}
.pw-error{font-size:12px;color:#e53935;margin-top:10px;min-height:16px;}

/* Feedback */
.fb-link{font-size:12px;color:#aaa;text-decoration:none;white-space:nowrap;border:0.5px solid #444;border-radius:5px;padding:4px 10px;}
.fb-link:hover{color:#fff;border-color:#888;}
.fb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.fb-overlay.open{display:flex;}
.fb-modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:420px;position:relative;}
.fb-modal h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.fb-modal p{font-size:13px;color:#888;margin-bottom:20px;}
.fb-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;color:#aaa;cursor:pointer;}
.fb-submit{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}

.refresh-btn{background:#1a1a1a;color:#fff;border:none;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.refresh-btn:hover{background:#333;}
.refresh-btn.spinning svg{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.updated-txt{font-size:11px;color:#aaa;}

.empty-state{text-align:center;padding:40px;color:#888;}

@media(max-width:600px){
  .match-table th:nth-child(5),.match-table td:nth-child(5),
  .match-table th:nth-child(6),.match-table td:nth-child(6){display:none;}
  .tiepot-card{gap:12px;}
  .lb-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="pw-gate" id="pw-gate">
  <div class="pw-box">
    <div class="pw-title">World Cup 2026</div>
    <div class="pw-sub">Enter the password to continue</div>
    <input class="pw-input" id="pw-input" type="password" placeholder="password" onkeydown="if(event.key==='Enter')pwCheck()">
    <button class="pw-btn" onclick="pwCheck()">Enter →</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<div class="modal-bg" id="comm-pw-modal" style="display:none;">
  <div class="modal" style="max-width:360px;">
    <h3>Commissioner Mode</h3>
    <div style="font-size:13px;color:#888;margin-bottom:16px;">Enter the commissioner password</div>
    <input type="password" id="comm-pw-input" placeholder="password" style="width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;margin-bottom:12px;" onkeydown="if(event.key==='Enter')checkCommPw()">
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green" onclick="checkCommPw()">Enter</button>
      <button class="btn btn-outline" onclick="document.getElementById('comm-pw-modal').style.display='none'">Cancel</button>
    </div>
    <div id="comm-pw-error" style="font-size:12px;color:#e53935;margin-top:8px;min-height:16px;"></div>
  </div>
</div>

<!-- Manual match entry modal -->
<div class="modal-bg" id="match-modal" style="display:none;">
  <div class="modal">
    <h3>Add / Edit Match</h3>
    <div class="fb-field"><label>Match ID (unique, no spaces)</label><input type="text" id="m-id" placeholder="e.g. grpA_1"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="fb-field"><label>Home Team</label>
        <select id="m-home"><option value="">— Select —</option></select>
      </div>
      <div class="fb-field"><label>Away Team</label>
        <select id="m-away"><option value="">— Select —</option></select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="fb-field"><label>Home Score</label><input type="number" id="m-hscore" min="0" value="0"></div>
      <div class="fb-field"><label>Away Score</label><input type="number" id="m-ascore" min="0" value="0"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="fb-field"><label>Stage</label>
        <select id="m-stage">
          <option value="group">Group Stage</option>
          <option value="r32">Round of 32</option>
          <option value="r16">Round of 16</option>
          <option value="qf">Quarterfinal</option>
          <option value="sf">Semifinal</option>
          <option value="final">Final</option>
        </select>
      </div>
      <div class="fb-field"><label>Status</label>
        <select id="m-status">
          <option value="final">Final</option>
          <option value="live">Live</option>
          <option value="scheduled">Scheduled</option>
        </select>
      </div>
    </div>
    <div class="fb-field">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="m-pk" style="width:16px;height:16px;">
        <span>Went to Penalty Shootout (triggers tie side-pot)</span>
      </label>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-green" onclick="submitMatch()">Save Match</button>
      <button class="btn btn-outline" onclick="document.getElementById('match-modal').style.display='none'">Cancel</button>
    </div>
    <div id="match-error" style="font-size:12px;color:#e53935;margin-top:8px;min-height:16px;"></div>
  </div>
</div>

<div class="fb-overlay" id="fb-overlay" onclick="fbClose(event)">
  <div class="fb-modal">
    <button class="fb-close" onclick="closeFeedback()">×</button>
    <h2>Suggest a feature</h2>
    <p>Got an idea? Send it in.</p>
    <div id="fb-form-wrap">
      <form id="fb-form" onsubmit="fbSubmit(event)">
        <div class="fb-field"><label>Your name</label><input type="text" name="name" placeholder="First name" required></div>
        <div class="fb-field"><label>Type</label><select name="type"><option>Feature idea</option><option>Bug / something broken</option><option>Other</option></select></div>
        <div class="fb-field"><label>Request</label><textarea name="message" placeholder="Describe your idea…" required style="width:100%;border:1px solid #ddd;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;height:90px;resize:vertical;"></textarea></div>
        <button class="fb-submit" type="submit" id="fb-submit-btn">Send →</button>
      </form>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-title">⚽ World Cup 2026</div>
  <div class="topbar-nav">
    <button class="comm-toggle" id="comm-toggle" onclick="toggleCommMode()">⚙ Comm</button>
    <a href="index.html">🏠 Home</a>
    <a href="wc-draft.html" class="topbar-hide-mobile">Draft</a>
    <a class="fb-link topbar-hide-mobile" href="#" onclick="event.preventDefault();openFeedback()">💡 Suggest</a>
  </div>
</div>

<div class="main" id="main-content">
  <div class="empty-state">Loading…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const PROXY = location.hostname === 'localhost' ? location.origin : 'https://nba-production-4b6c.up.railway.app';
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyArXeMh4hCEyo2DqXfig3yD03R6oCPZIyk",
  authDomain: "giesener-bets.firebaseapp.com",
  databaseURL: "https://giesener-bets-default-rtdb.firebaseio.com",
  projectId: "giesener-bets",
  storageBucket: "giesener-bets.firebasestorage.app",
  messagingSenderId: "728665249382",
  appId: "1:728665249382:web:ec1635941b04d3aba7ffa7"
};

const ALL_COLORS = { Mark:'#7B1FA2',Marc:'#F9A825',Jared:'#2E7D32',Andrew:'#E65100',Zach:'#1565C0',Ben:'#C62828',Matt:'#AD1457',Max:'#558B2F',Mike:'#00838F',Adam:'#4E342E' };
const PW_MAIN = 'rudy';
const PW_COMM = 'golf';
const FORMSPREE_ID = 'mnjlwlgy';

const WC_FLAGS = {
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Czechia':'cz',
  'Canada':'ca','Bosnia-Herzegovina':'ba','Qatar':'qa','Switzerland':'ch',
  'Brazil':'br','Morocco':'ma','Haiti':'ht','Scotland':'gb-sct',
  'United States':'us','Paraguay':'py','Australia':'au','Türkiye':'tr',

  'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',

  'Portugal':'pt','Congo DR':'cd','Uzbekistan':'uz','Colombia':'co',

};

  return `<img src="https://flagcdn.com/20x15/${code}.png" width="20" height="15" style="border-radius:2px;vertical-align:middle;display:inline-block;">`;
}
const WC_GROUPS = {
  'Mexico':'A','South Africa':'A','South Korea':'A','Czechia':'A',
  'Canada':'B','Bosnia-Herzegovina':'B','Qatar':'B','Switzerland':'B',
  'Brazil':'C','Morocco':'C','Haiti':'C','Scotland':'C',

  'England':'L','Croatia':'L','Ghana':'L','Panama':'L'
};
const ALL_TEAMS = Object.keys(WC_FLAGS);

const fbApp = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(fbApp);

let wcData = null; // { matches, teamOwners, config, updated }
let isComm = false;
let activeTab = 'leaderboard'; // 'leaderboard' | 'matches' | 'teams'
let refreshing = false;

// ── Password gate ──────────────────────────────────────────────────
const stored = sessionStorage.getItem('wc_pw');
if (stored !== PW_MAIN) document.getElementById('pw-gate').classList.add('show');

window.pwCheck = function() {
  const val = document.getElementById('pw-input').value.trim().toLowerCase();
  if (val === PW_MAIN) {
    sessionStorage.setItem('wc_pw', val);
    document.getElementById('pw-gate').classList.remove('show');
  } else {
    document.getElementById('pw-error').textContent = 'Wrong password.';
    document.getElementById('pw-input').value = '';
    setTimeout(() => { document.getElementById('pw-error').textContent = ''; }, 2000);
  }
};

window.toggleCommMode = function() {
  if (isComm) {
    isComm = false;
    document.getElementById('comm-toggle').classList.remove('active');
    render();
  } else {
    document.getElementById('comm-pw-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('comm-pw-input').focus(), 50);
  }
};
window.checkCommPw = function() {
  const val = document.getElementById('comm-pw-input').value.trim().toLowerCase();
  if (val === PW_COMM) {
    isComm = true;
    document.getElementById('comm-toggle').classList.add('active');
    document.getElementById('comm-pw-modal').style.display = 'none';
    document.getElementById('comm-pw-input').value = '';
    document.getElementById('comm-pw-error').textContent = '';
    render();
  } else {
    document.getElementById('comm-pw-error').textContent = 'Wrong password.';
    document.getElementById('comm-pw-input').value = '';
    setTimeout(() => { document.getElementById('comm-pw-error').textContent = ''; }, 2000);
  }
};

// ── Firebase listener ──────────────────────────────────────────────
onValue(ref(db, 'wc26_live'), snap => {
  wcData = snap.exists() ? snap.val() : null;
  render();
});

// ── Financial computation ──────────────────────────────────────────
function computeFinancials(matches, teamOwners, participants) {
  const n = participants.length;
  const net = {}, netGoals = {}, netMatch = {}, tiePotPaid = {};
  const goalsByOwner = {}, goalsByTeam = {}, tieCount = {}, gamesPlayed = {};
  let tiePotTotal = 0;
  participants.forEach(p => {
    net[p] = 0; netGoals[p] = 0; netMatch[p] = 0; tiePotPaid[p] = 0;
    goalsByOwner[p] = 0; tieCount[p] = 0; gamesPlayed[p] = 0;
  });

  const finalMatches = Object.values(matches || {}).filter(m => m.status === 'final');
  finalMatches.forEach(m => {
    const homeOwner = teamOwners[m.homeTeam];
    const awayOwner = teamOwners[m.awayTeam];
    const hs = m.homeScore || 0;
    const as = m.awayScore || 0;

    // Track games played per participant (per team, so same-owner counts 2)
    if (homeOwner !== undefined) gamesPlayed[homeOwner] = (gamesPlayed[homeOwner] || 0) + 1;
    if (awayOwner !== undefined) gamesPlayed[awayOwner] = (gamesPlayed[awayOwner] || 0) + 1;

    // Goals: each goal earns owner $1 from every other participant
    if (homeOwner !== undefined && hs > 0) {
      goalsByTeam[m.homeTeam] = (goalsByTeam[m.homeTeam] || 0) + hs;
      const earned = hs * (n - 1);
      net[homeOwner] += earned; netGoals[homeOwner] += earned;
      goalsByOwner[homeOwner] += hs;
      participants.forEach(p => { if (p !== homeOwner) { net[p] -= hs; netGoals[p] -= hs; } });
    }
    if (awayOwner !== undefined && as > 0) {
      goalsByTeam[m.awayTeam] = (goalsByTeam[m.awayTeam] || 0) + as;
      const earned = as * (n - 1);
      net[awayOwner] += earned; netGoals[awayOwner] += earned;
      goalsByOwner[awayOwner] += as;
      participants.forEach(p => { if (p !== awayOwner) { net[p] -= as; netGoals[p] -= as; } });
    }

    // Match bet: draw (group) or PK (knockout) → both pay $10 into side-pot
    const isDraw = hs === as;
    const isTieEvent = (m.stage === 'group' && isDraw) || (m.stage !== 'group' && m.isPenaltyShootout);

    if (isTieEvent) {
      if (homeOwner !== undefined) {
        net[homeOwner] -= 10; netMatch[homeOwner] -= 10; tiePotPaid[homeOwner] += 10;
        tieCount[homeOwner] += 1; tiePotTotal += 10;
      }
      if (awayOwner !== undefined && awayOwner !== homeOwner) {
        net[awayOwner] -= 10; netMatch[awayOwner] -= 10; tiePotPaid[awayOwner] += 10;
        tieCount[awayOwner] += 1; tiePotTotal += 10;
      } else if (awayOwner !== undefined && awayOwner === homeOwner) {
        // Same owner both teams — pays $10 per team, tie counts for both teams
        net[homeOwner] -= 20; netMatch[homeOwner] -= 20; tiePotPaid[homeOwner] += 20;
        tieCount[homeOwner] += 2; tiePotTotal += 20;
      }
    } else {
      // Match winner collects $10
      if (homeOwner !== undefined && awayOwner !== undefined) {
        const winOwner = hs > as ? homeOwner : awayOwner;
        const loseOwner = hs > as ? awayOwner : homeOwner;
        if (winOwner !== loseOwner) {
          net[winOwner] += 10; netMatch[winOwner] += 10;
          net[loseOwner] -= 10; netMatch[loseOwner] -= 10;
        }
        // Same owner: no transfer
      }
    }
  });

  return { net, netGoals, netMatch, tiePotPaid, goalsByOwner, goalsByTeam, tieCount, tiePotTotal, gamesPlayed };
}

function fmtMoney(n) {
  if (n === 0) return '$0';
  return (n > 0 ? '+$' : '-$') + Math.abs(n).toLocaleString();
}

// ── Main render ────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('main-content');
  if (!wcData) {
    el.innerHTML = `<div class="empty-state">
      <div style="font-size:32px;margin-bottom:12px;">⚽</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:6px;">No data yet</div>
      <div style="font-size:13px;color:#aaa;">Complete the draft and push assignments to Firebase to get started.</div>
      <div style="margin-top:20px;"><a href="wc-draft.html" class="btn btn-green">Open Draft →</a></div>
    </div>`;
    return;
  }

  const matches = wcData.matches || {};
  const teamOwners = wcData.teamOwners || {};
  const config = wcData.config || {};
  const participants = config.participants || Object.values(ALL_COLORS).map((_, i) => Object.keys(ALL_COLORS)[i]);
  const updatedStr = wcData.updated || null;

  const fin = computeFinancials(matches, teamOwners, participants);

  // Sort participants by net descending
  const ranked = [...participants].sort((a, b) => (fin.net[b] || 0) - (fin.net[a] || 0));

  const updatedAgo = updatedStr ? (() => {
    const mins = Math.floor((Date.now() - new Date(updatedStr)) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    return `${Math.floor(mins/60)}h ago`;
  })() : null;

  // Tie pot projections with tiebreakers (per spec)
  const tieValues = participants.map(p => fin.tieCount[p] || 0);
  const maxTies = Math.max(...tieValues, 0);
  const minTies = Math.min(...tieValues);

  // Most ties: tiebreaker = fewest gamesPlayed; if still tied → split
  let mostTied = participants.filter(p => fin.tieCount[p] === maxTies && maxTies > 0);
  if (mostTied.length > 1) {
    const minGP = Math.min(...mostTied.map(p => fin.gamesPlayed[p] || 0));
    const tb = mostTied.filter(p => (fin.gamesPlayed[p] || 0) === minGP);
    if (tb.length < mostTied.length) mostTied = tb;
  }

  // Fewest ties: tiebreaker = most gamesPlayed; if still tied → split
  let leastTied = fin.tiePotTotal > 0 ? participants.filter(p => fin.tieCount[p] === minTies) : [];
  if (leastTied.length > 1) {
    const maxGP = Math.max(...leastTied.map(p => fin.gamesPlayed[p] || 0));
    const tb = leastTied.filter(p => (fin.gamesPlayed[p] || 0) === maxGP);
    if (tb.length < leastTied.length) leastTied = tb;
  }

  // Commissioner panel
  const commHtml = isComm ? `
    <div class="comm-panel">
      <div class="comm-label">Commissioner Controls</div>
      <div class="comm-actions">
        <button class="refresh-btn" id="refresh-btn" onclick="refreshScores()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          Refresh Scores
        </button>
        <button class="btn btn-sm btn-amber" onclick="openMatchModal()">+ Add / Edit Match</button>
        <button class="btn btn-sm btn-outline" onclick="seedMatches()" style="color:#e65100;border-color:#e65100;">⚡ Seed Matches</button>
        ${updatedAgo ? `<span class="updated-txt">Updated ${updatedAgo}</span>` : ''}
      </div>
    </div>` : '';

  // Leaderboard cards
  const lbHtml = `<div class="lb-grid">
    ${ranked.map((p, i) => {
      const n = fin.net[p] || 0;
      const cls = n > 0 ? 'pos' : n < 0 ? 'neg' : 'zero';
      const isMost = mostTied.includes(p) && maxTies > 0;
      const isLeast = leastTied.includes(p) && fin.tiePotTotal > 0;
      const gFmt = v => v > 0 ? `+$${v}` : v < 0 ? `-$${Math.abs(v)}` : '$0';
      return `<div class="lb-card">
        <div class="lb-stripe" style="background:${ALL_COLORS[p]||'#555'}"></div>
        <div class="lb-body">
          <div class="lb-rank">#${i+1}</div>
          <div class="lb-name" style="color:${ALL_COLORS[p]||'#1a1a1a'}">${p}</div>
          <div class="lb-net ${cls}">${fmtMoney(n)}</div>
          <div class="lb-breakdown">
            <span>Goals ${gFmt(fin.netGoals[p]||0)}</span>
            <span>W/L ${gFmt(fin.netMatch[p]||0)}</span>
            <span>Pot −$${fin.tiePotPaid[p]||0}</span>
          </div>
          <div class="lb-sub">${fin.tieCount[p]||0} ties${isMost ? ' <span class="tiepot-badge tiepot-most">MOST</span>' : ''}${isLeast ? ' <span class="tiepot-badge tiepot-least">FEWEST</span>' : ''}</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;

  // Tie side-pot
  const tiepotHtml = fin.tiePotTotal > 0 ? `
    <div class="tiepot-card">
      <div>
        <div class="tiepot-label">Raiders/Chargers/Izzy Birth Night Memorial Tie Side-Pot</div>
        <div class="tiepot-total">$${fin.tiePotTotal}</div>
        <div class="tiepot-sub">Split 50/50: most ties & fewest ties</div>
        ${mostTied.length ? `<div style="margin-top:8px;font-size:12px;"><span class="tiepot-badge tiepot-most">MOST</span> ${mostTied.join(', ')} (${maxTies})</div>` : ''}
        ${leastTied.length ? `<div style="margin-top:4px;font-size:12px;"><span class="tiepot-badge tiepot-least">FEWEST</span> ${leastTied.join(', ')} (${minTies})</div>` : ''}
      </div>
      <div style="flex:1;min-width:200px;">
        <div class="tiepot-label" style="margin-bottom:8px;">Tie Counts</div>
        ${[...participants].sort((a,b)=>(fin.tieCount[b]||0)-(fin.tieCount[a]||0)).map(p => {
          const tc = fin.tieCount[p] || 0;
          const pct = maxTies > 0 ? (tc / maxTies) * 100 : 0;
          const isMost = mostTied.includes(p) && maxTies > 0;
          const isLeast = leastTied.includes(p) && fin.tiePotTotal > 0;
          return `<div class="tiepot-row">
            <span class="tiepot-name" style="color:${ALL_COLORS[p]||'#fff'}">${p}</span>
            <div class="tiepot-bar-wrap"><div class="tiepot-bar" style="width:${pct}%;background:${ALL_COLORS[p]||'#555'}"></div></div>
            <span class="tiepot-count">${tc}</span>
            ${isMost ? '<span class="tiepot-badge tiepot-most">M</span>' : isLeast ? '<span class="tiepot-badge tiepot-least">L</span>' : ''}
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  // Match table
  const matchList = Object.values(matches).sort((a, b) => new Date(a.date) - new Date(b.date));
  const finalMatchList = matchList.filter(m => m.status === 'final' || m.status === 'live');

  const matchRows = finalMatchList.map(m => {
    const homeOwner = teamOwners[m.homeTeam];
    const awayOwner = teamOwners[m.awayTeam];
    const hs = m.homeScore ?? '?';
    const as = m.awayScore ?? '?';
    const isDraw = m.homeScore === m.awayScore;
    const isTieEvent = (m.stage === 'group' && isDraw) || (m.stage !== 'group' && m.isPenaltyShootout);
    const stageLbl = { group:'Group', r32:'R32', r16:'R16', qf:'QF', sf:'SF', final:'Final' }[m.stage] || m.stage;
    const groupLbl = m.group ? ` ${m.group}` : '';

    let matchMoney = '', goalMoney = '';
    if (m.status === 'final') {
      if (isTieEvent) {
        matchMoney = `<span class="money-tie">TIE −$10 ea</span>`;
      } else if (homeOwner && awayOwner && homeOwner !== awayOwner) {
        const winOwner = (m.homeScore || 0) > (m.awayScore || 0) ? homeOwner : awayOwner;
        matchMoney = `<span class="money-pos">${winOwner} +$10</span>`;
      }
      const totalGoals = (m.homeScore || 0) + (m.awayScore || 0);
      if (totalGoals > 0) goalMoney = `<span style="color:#555;">${totalGoals}g</span>`;
    }

    const isLive = m.status === 'live';
    return `<tr class="${isTieEvent?'tie-row':''}">
      <td style="font-size:11px;color:#aaa;">${m.date ? new Date(m.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:4px;">
          ${flagImg(WC_FLAGS[m.homeTeam])}
          <span style="font-weight:${!isTieEvent&&(m.homeScore||0)>(m.awayScore||0)?'700':'400'}">${m.homeTeam}</span>
          ${homeOwner ? `<span class="owner-chip" style="background:${ALL_COLORS[homeOwner]||'#eee'}22;color:${ALL_COLORS[homeOwner]||'#555'}">${homeOwner}</span>` : ''}
        </div>
      </td>
      <td class="score-cell">${isLive?`<span class="status-live">${hs}–${as}</span>`:m.status==='final'?`${hs}–${as}`:'—'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:4px;">
          ${flagImg(WC_FLAGS[m.awayTeam])}
          <span style="font-weight:${!isTieEvent&&(m.awayScore||0)>(m.homeScore||0)?'700':'400'}">${m.awayTeam}</span>
          ${awayOwner ? `<span class="owner-chip" style="background:${ALL_COLORS[awayOwner]||'#eee'}22;color:${ALL_COLORS[awayOwner]||'#555'}">${awayOwner}</span>` : ''}
        </div>
      </td>
      <td><span class="stage-badge">${stageLbl}${groupLbl}</span>${m.isPenaltyShootout?` <span class="pk-badge">PK</span>`:''}</td>
      <td>${matchMoney}</td>
      <td>${goalMoney}</td>
      ${isComm ? `<td><button class="btn btn-sm btn-outline" onclick="editMatch('${m.id}')" style="font-size:10px;padding:2px 6px;">Edit</button></td>` : ''}
    </tr>`;
  }).join('');

  const matchTableHtml = `
    <div class="match-table-wrap">
      ${finalMatchList.length === 0 ? `<div class="empty-state">No matches played yet</div>` : `
      <table class="match-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Home</th>
            <th class="c">Score</th>
            <th>Away</th>
            <th>Stage</th>
            <th>Match $</th>
            <th>Goals</th>
            ${isComm ? '<th></th>' : ''}
          </tr>
        </thead>
        <tbody>${matchRows}</tbody>
      </table>`}
    </div>`;

  // Teams grid
  const teamsHtml = `<div class="teams-grid">
    ${participants.map(p => {
      const myTeams = Object.entries(teamOwners).filter(([, owner]) => owner === p).map(([name]) => name);
      const myNet = fin.net[p] || 0;
      const cls = myNet > 0 ? 'pos' : myNet < 0 ? 'neg' : '';
      return `<div class="teams-card">
        <div class="teams-card-header" style="border-bottom:3px solid ${ALL_COLORS[p]||'#eee'}">
          <div class="teams-card-name" style="color:${ALL_COLORS[p]||'#1a1a1a'}">${p}</div>
          <div class="teams-card-net ${cls}">${fmtMoney(myNet)}</div>
        </div>
        ${myTeams.length === 0 ? `<div class="team-row" style="color:#aaa;font-style:italic;">No teams assigned</div>` :
          myTeams.map(name => `
            <div class="team-row">
              <span class="team-flag">${flagImg(WC_FLAGS[name])}</span>
              <span class="team-name-txt">${name}</span>
              ${fin.goalsByTeam[name] ? `<span class="team-goals">⚽ ${fin.goalsByTeam[name]}</span>` : ''}
              <span class="team-group">Grp ${WC_GROUPS[name]||'?'}</span>
            </div>`).join('')}
      </div>`;
    }).join('')}
  </div>`;

  // Tabs
  const tabsHtml = `<div class="tabs">
    <div class="tab ${activeTab==='leaderboard'?'active':''}" onclick="switchTab('leaderboard')">Leaderboard</div>
    <div class="tab ${activeTab==='matches'?'active':''}" onclick="switchTab('matches')">Matches</div>
    <div class="tab ${activeTab==='teams'?'active':''}" onclick="switchTab('teams')">Teams</div>
  </div>`;

  let tabContent = '';
  if (activeTab === 'leaderboard') tabContent = lbHtml + (fin.tiePotTotal > 0 ? tiepotHtml : '');
  else if (activeTab === 'matches') tabContent = matchTableHtml;
  else if (activeTab === 'teams') tabContent = teamsHtml;

  el.innerHTML = commHtml + tabsHtml + tabContent;
}

window.switchTab = function(tab) {
  activeTab = tab;
  render();
};

// ── Seed matches (testing) ─────────────────────────────────────────
window.seedMatches = async function() {
  if (!confirm('Generate 72 random group stage match results and overwrite Firebase? This is for testing only.')) return;
  const SEED_GROUPS = {
    A:['Mexico','South Africa','South Korea','Czechia'],
    B:['Canada','Bosnia-Herzegovina','Qatar','Switzerland'],
    C:['Brazil','Morocco','Haiti','Scotland'],
    D:['United States','Paraguay','Australia','Türkiye'],
    E:['Germany','Curaçao','Ivory Coast','Ecuador'],
    F:['Netherlands','Japan','Sweden','Tunisia'],
    G:['Belgium','Egypt','Iran','New Zealand'],
    H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],
    I:['France','Senegal','Iraq','Norway'],
    J:['Argentina','Algeria','Austria','Jordan'],
    K:['Portugal','Congo DR','Uzbekistan','Colombia'],
    L:['England','Croatia','Ghana','Panama']
  };
  function randGoals() {
    const r = Math.random();
    if (r < 0.20) return 0;
    if (r < 0.50) return 1;
    if (r < 0.75) return 2;
    if (r < 0.90) return 3;
    return 4;
  }
  const matches = {};
  let id = 9000;
  const baseDate = new Date('2026-06-11T18:00:00Z');
  Object.entries(SEED_GROUPS).forEach(([group, teams]) => {
    for (let i = 0; i < teams.length; i++) {
      for (let j = i + 1; j < teams.length; j++) {
        const d = new Date(baseDate);
        d.setDate(d.getDate() + (id - 9000));
        matches['seed_' + id] = {
          id: 'seed_' + id, date: d.toISOString(),
          name: teams[i] + ' vs ' + teams[j],
          stage: 'group', group,
          homeTeam: teams[i], awayTeam: teams[j],
          homeScore: randGoals(), awayScore: randGoals(),
          status: 'final', isPenaltyShootout: false
        };
        id++;
      }
    }
  });
  try {
    await set(ref(db, 'wc26_live/matches'), matches);
    await set(ref(db, 'wc26_live/updated'), new Date().toISOString());
    showToast('⚡ ' + Object.keys(matches).length + ' matches seeded');
  } catch(e) { alert('Firebase error: ' + e.message); }
};

// ── Score refresh ──────────────────────────────────────────────────
window.refreshScores = async function() {
  if (refreshing) return;
  refreshing = true;
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.classList.add('spinning');
  try {
    await fetch(`${PROXY}/wc/matches/refresh`, { method: 'POST' });
  } catch(e) { console.error('refresh error', e); }
  finally {
    refreshing = false;
    if (btn) btn.classList.remove('spinning');
  }
};

// ── Manual match modal ─────────────────────────────────────────────
const ALL_TEAM_NAMES = Object.keys(WC_FLAGS);

window.openMatchModal = function(matchId) {
  const modal = document.getElementById('match-modal');
  const m = matchId && wcData?.matches?.[matchId];

  // Populate team selects
  ['m-home','m-away'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="">— Select —</option>' +
      ALL_TEAM_NAMES.map(t => `<option value="${t}" ${m && (id==='m-home'?m.homeTeam:m.awayTeam)===t?'selected':''}>${t}</option>`).join('');
  });

  document.getElementById('m-id').value = m ? m.id : '';
  document.getElementById('m-hscore').value = m?.homeScore ?? 0;
  document.getElementById('m-ascore').value = m?.awayScore ?? 0;
  document.getElementById('m-stage').value = m?.stage || 'group';
  document.getElementById('m-status').value = m?.status || 'final';
  document.getElementById('m-pk').checked = m?.isPenaltyShootout || false;
  document.getElementById('match-error').textContent = '';
  modal.style.display = 'flex';
};

window.editMatch = function(id) { openMatchModal(id); };

window.submitMatch = async function() {
  const id = document.getElementById('m-id').value.trim();
  const homeTeam = document.getElementById('m-home').value;
  const awayTeam = document.getElementById('m-away').value;
  const homeScore = parseInt(document.getElementById('m-hscore').value, 10);
  const awayScore = parseInt(document.getElementById('m-ascore').value, 10);
  const stage = document.getElementById('m-stage').value;
  const status = document.getElementById('m-status').value;
  const isPK = document.getElementById('m-pk').checked;

  if (!id) { document.getElementById('match-error').textContent = 'Enter a match ID.'; return; }
  if (!homeTeam || !awayTeam) { document.getElementById('match-error').textContent = 'Select both teams.'; return; }
  if (homeTeam === awayTeam) { document.getElementById('match-error').textContent = 'Home and away must be different.'; return; }

  const match = { id, homeTeam, awayTeam, homeScore, awayScore, stage, status, isPenaltyShootout: isPK, date: new Date().toISOString() };
  try {
    const r = await fetch(`${PROXY}/wc/matches/manual`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(match)
    });
    const json = await r.json();
    if (json.error) { document.getElementById('match-error').textContent = json.error; return; }
    document.getElementById('match-modal').style.display = 'none';
  } catch(e) {
    document.getElementById('match-error').textContent = e.message;
  }
};

// ── Feedback ───────────────────────────────────────────────────────
window.openFeedback = function() { document.getElementById('fb-overlay').classList.add('open'); };
window.closeFeedback = function() { document.getElementById('fb-overlay').classList.remove('open'); };
window.fbClose = function(e) { if (e.target === document.getElementById('fb-overlay')) closeFeedback(); };
window.fbSubmit = async function(e) {
  e.preventDefault();
  const btn = document.getElementById('fb-submit-btn');
  btn.disabled = true; btn.textContent = 'Sending…';
  const data = Object.fromEntries(new FormData(e.target));
  await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
  document.getElementById('fb-form-wrap').innerHTML = '<p style="text-align:center;padding:20px 0;color:#2e7d32;font-weight:700;">Sent! Thanks.</p>';
};
