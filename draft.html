<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Draft Room v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;}
.topbar{background:#1a1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:16px;font-weight:600;}
.topbar-sub{font-size:12px;color:#888;margin-top:2px;}
.main{max-width:1400px;margin:0 auto;padding:20px;}
.btn{background:#1a1a1a;color:#fff;border:none;font-size:13px;font-weight:600;padding:8px 16px;border-radius:7px;cursor:pointer;}
.btn:hover{background:#333;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-sm{font-size:12px;padding:5px 10px;border-radius:5px;}
.btn-outline{background:transparent;color:#1a1a1a;border:1px solid #ccc;}
.btn-outline:hover{background:#f0f0ee;}
.btn-green{background:#2e7d32;color:#fff;border:none;}
.btn-green:hover{background:#1b5e20;}
.btn-red{background:#c62828;color:#fff;border:none;}
.btn-red:hover{background:#b71c1c;}
.card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:16px;}
.setup{max-width:600px;margin:40px auto;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.form-group input,.form-group textarea{width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;}
.form-group textarea{height:160px;resize:vertical;font-size:12px;}
.lobby{max-width:500px;margin:40px auto;}
.owner-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f5f5f3;border-radius:8px;margin-bottom:6px;}
.draft-layout{display:grid;grid-template-columns:240px 1fr 240px;gap:16px;}
.pick-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;margin-bottom:4px;font-size:13px;}
.pick-item.current{background:#fff3cd;font-weight:700;border:1.5px solid #ffc107;}
.pick-item.done{opacity:0.4;text-decoration:line-through;}
.pick-item.upcoming{background:#f5f5f3;}
.pick-num{font-size:10px;color:#888;width:20px;flex-shrink:0;}
.player-card{background:#f5f5f3;border-radius:8px;padding:10px;cursor:pointer;border:1.5px solid transparent;transition:border-color .1s,background .1s;margin-bottom:6px;}
.player-card:hover{border-color:#999;}
.player-card.selected{border-color:#2e7d32;background:#e8f5e9;}
.player-name{font-size:13px;font-weight:600;}
.odds-row{display:flex;gap:5px;margin-top:4px;}
.dk{background:#000;color:#fff;font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;}
.fd{background:#1565c0;color:#fff;font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;}
.owner-header{font-size:12px;font-weight:700;padding:7px 10px;color:#fff;text-align:center;}
.roster-slot{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:0.5px solid #eee;font-size:11px;}
.roster-slot.empty{color:#bbb;font-style:italic;}
.slot-label{font-size:9px;color:#888;width:14px;flex-shrink:0;}
.alt-divider{border-top:2px solid #eee;}
.timer-bar{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.timer-val{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;}
.timer-val.warn{color:#e65100;}
.timer-val.danger{color:#c62828;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:12px;}
.autopick-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#f5f5f3;border-radius:7px;margin-bottom:6px;}
.roster-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:16px;}
.roster-col{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;overflow:hidden;}
.section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:10px;}
.pool-list{max-height:480px;overflow-y:auto;}
.ap-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#f5f5f3;border-radius:7px;margin-bottom:5px;font-size:13px;}
.order-preview{background:#f5f5f3;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;line-height:1.8;}
.complete-banner{background:#2e7d32;color:#fff;border-radius:12px;padding:20px;text-align:center;margin-bottom:20px;}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title" id="tb-title">Golf Draft Room</div>
    <div class="topbar-sub" id="tb-sub"></div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-sm btn-outline" id="undo-btn" style="color:#fff;border-color:#555;" onclick="doUndo()" disabled>Undo</button>
    <button class="btn btn-sm btn-outline" id="redo-btn" style="color:#fff;border-color:#555;" onclick="doRedo()" disabled>Redo</button>
    <button class="btn btn-sm btn-red" onclick="confirmReset()">Reset</button>
  </div>
</div>

<!-- Static draft shell (hidden until drafting) -->
<div id="draft-shell" style="display:none;">
  <div class="main">
    <div class="timer-bar">
      <div>
        <div style="font-size:12px;color:#666;" id="round-label"></div>
        <div style="font-size:18px;font-weight:700;" id="clock-label"></div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:12px;color:#666;">Time remaining</div>
        <div class="timer-val" id="timer-display">2:00:00</div>
      </div>
    </div>
    <div class="draft-layout">
      <!-- Pick order -->
      <div>
        <div class="card">
          <div class="section-hdr">Pick Order</div>
          <div style="max-height:500px;overflow-y:auto;" id="pick-order-list"></div>
        </div>
      </div>
      <!-- Player pool -->
      <div>
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <div class="section-hdr" style="margin-bottom:0;" id="avail-label">Available</div>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-sm btn-outline" onclick="importOdds()">Odds</button>
              <button class="btn btn-sm btn-green" id="pick-btn" onclick="confirmPick()" disabled>Pick...</button>
            </div>
          </div>
          <input type="text" id="search-input" placeholder="Search players..."
            style="width:100%;border:1px solid #ddd;border-radius:7px;padding:8px 12px;font-size:13px;margin-bottom:10px;"
            oninput="onSearch(this.value)">
          <div class="pool-list" id="pool-list"></div>
        </div>
      </div>
      <!-- Bad golfer list -->
      <div>
        <div class="card">
          <div class="section-hdr">Bad Golfer List</div>
          <p style="font-size:11px;color:#888;margin-bottom:10px;">Assign if timer expires</p>
          <div style="max-height:500px;overflow-y:auto;" id="ap-list"></div>
        </div>
      </div>
    </div>
    <div class="roster-grid" id="roster-grid"></div>
  </div>
</div>

<!-- Dynamic content for non-draft screens -->
<div class="main" id="main-content"></div>

<!-- Reset modal -->
<div class="modal-bg" id="reset-modal" style="display:none;">
  <div class="modal">
    <h3>Reset Draft?</h3>
    <p style="color:#666;font-size:13px;margin-bottom:20px;">Wipes all picks and returns to setup.</p>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-red" onclick="doReset()">Yes, Reset</button>
      <button class="btn btn-outline" onclick="document.getElementById('reset-modal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<!-- Autopick modal -->
<div class="modal-bg" id="autopick-modal" style="display:none;">
  <div class="modal">
    <h3>Timer expired — assign pick for <span id="ap-owner"></span></h3>
    <div id="ap-modal-list"></div>
    <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="document.getElementById('autopick-modal').style.display='none'">Cancel</button>
  </div>
</div>

<!-- Odds review modal -->
<div class="modal-bg" id="odds-modal" style="display:none;">
  <div class="modal" style="max-width:500px;">
    <h3>Odds Import</h3>
    <div id="odds-content"></div>
  </div>
</div>

<script>
const PROXY = 'https://nba-production-4b6c.up.railway.app';
const OWNERS = ['Mark','Marc','Jared','Andrew','Zach','Ben','Matt'];
const COLORS = {Mark:'#7B1FA2',Marc:'#F9A825',Jared:'#2E7D32',Andrew:'#E65100',Zach:'#1565C0',Ben:'#C62828',Matt:'#AD1457'};

const params = new URLSearchParams(location.search);
const SLUG = params.get('slug') || 'pga-2026';

let state = null;
let ws = null;
let timerInterval = null;
let selectedPlayer = null;
let searchQuery = '';
let previewOrder = null;
let previewAltOrder = null;

// ── WebSocket ─────────────────────────────────────────────────────
function connect() {
  const url = PROXY.replace('https://','wss://').replace('http://','ws://') + '?slug=' + SLUG;
  ws = new WebSocket(url);
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'state') { state = msg.draft; update(); }
  };
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onerror = () => ws.close();
}

async function api(path, method='GET', body=null) {
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  return fetch(`${PROXY}/golf/${SLUG}${path}`, opts).then(r => r.json());
}

// ── Master update — decides what to show ──────────────────────────
function update() {
  if (!state) return;
  document.getElementById('tb-title').textContent = state.name || 'Golf Draft Room';
  document.getElementById('tb-sub').textContent = 'slug: ' + SLUG;
  document.getElementById('undo-btn').disabled = !state.undoStack?.length;
  document.getElementById('redo-btn').disabled = !state.redoStack?.length;

  const shell = document.getElementById('draft-shell');
  const main = document.getElementById('main-content');

  if (state.status === 'drafting') {
    shell.style.display = 'block';
    main.style.display = 'none';
    updateDraft();
  } else {
    shell.style.display = 'none';
    main.style.display = 'block';
    if (state.status === 'setup') renderSetup();
    else if (state.status === 'lobby') renderLobby();
    else if (state.status === 'complete') renderComplete();
  }
}

// ── Draft: targeted DOM updates (never rebuilds search/input) ─────
function updateDraft() {
  const cur = getCur();
  const isAlt = state.currentPhase === 'alternate';
  const seq = state.pickSequence || [];
  const altSeq = state.altSequence || [];
  const allPicks = [...seq, ...altSeq];
  const globalIdx = isAlt ? seq.length + state.currentPickIndex : state.currentPickIndex;

  // On-clock + round
  document.getElementById('round-label').textContent = isAlt ? 'ALTERNATE ROUND' : `Round ${cur?.round||''} of 4`;
  const cl = document.getElementById('clock-label');
  cl.textContent = cur ? `${cur.owner} is on the clock` : 'Draft complete!';
  cl.style.color = cur ? COLORS[cur.owner] : '#2e7d32';

  // Pick order
  document.getElementById('pick-order-list').innerHTML = allPicks.map((p,i) => {
    const done = i < globalIdx, current = i === globalIdx, isA = i >= seq.length;
    return `<div class="pick-item ${done?'done':current?'current':'upcoming'}">
      <span class="pick-num">${i+1}</span>
      <span style="color:${COLORS[p.owner]};font-weight:${current?'700':'500'}">${p.owner}</span>
      ${isA?'<span style="font-size:9px;background:#fff3cd;color:#856404;padding:1px 4px;border-radius:3px;margin-left:auto;">ALT</span>':''}
    </div>`;
  }).join('');

  // Pool — only refresh if selected player was picked (no longer in field)
  const stillInField = selectedPlayer && state.field?.some(p => p.name === selectedPlayer.name);
  if (!stillInField && selectedPlayer) {
    selectedPlayer = null;
  }
  updatePickBtn();
  renderPool();

  // Autopick list
  document.getElementById('ap-list').innerHTML = (state.autopickList||[]).map(p =>
    `<div class="ap-item"><span>${p.name}</span>${cur?`<button class="btn btn-sm btn-red" onclick="assignAP('${p.name.replace(/'/g,"\\'")}')">Assign</button>`:''}</div>`
  ).join('') || '<div style="color:#aaa;font-size:12px;">No list set</div>';

  // Available count
  document.getElementById('avail-label').textContent = `Available (${state.field?.length||0})`;

  // Rosters
  document.getElementById('roster-grid').innerHTML = OWNERS.map(o => {
    const picks = state.picks[o] || {golfers:[],alternate:null};
    return `<div class="roster-col">
      <div class="owner-header" style="background:${COLORS[o]}">${o}</div>
      ${Array(4).fill(0).map((_,i) => {
        const g = picks.golfers[i];
        return `<div class="roster-slot ${g?'':'empty'}"><span class="slot-label">${i+1}</span><span>${g?g.name:'—'}</span></div>`;
      }).join('')}
      <div class="alt-divider">
        <div class="roster-slot ${picks.alternate?'':'empty'}">
          <span class="slot-label" style="color:#856404;">A</span>
          <span>${picks.alternate?picks.alternate.name:'—'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Start timer if not running
  if (!timerInterval) startTimer();
}

function renderPool() {
  const q = searchQuery.toLowerCase();
  const pool = (state.field||[]).filter(p => !q || p.name.toLowerCase().includes(q));
  document.getElementById('pool-list').innerHTML = pool.map(p =>
    `<div class="player-card ${selectedPlayer?.name===p.name?'selected':''}"
      onclick="selectPlayer(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="player-name">${p.name}</div>
      ${(p.odds_dk||p.odds_fd)?`<div class="odds-row">
        ${p.odds_dk?`<span class="dk">DK ${p.odds_dk}</span>`:''}
        ${p.odds_fd?`<span class="fd">FD ${p.odds_fd}</span>`:''}
      </div>`:''}
    </div>`
  ).join('');
}

function updatePickBtn() {
  const btn = document.getElementById('pick-btn');
  if (!btn) return;
  btn.disabled = !selectedPlayer;
  btn.textContent = selectedPlayer ? `Pick ${selectedPlayer.name}` : 'Pick...';
}

function onSearch(val) {
  searchQuery = val;
  renderPool();
}

function selectPlayer(p) {
  selectedPlayer = p;
  updatePickBtn();
  renderPool();
}

async function confirmPick() {
  if (!selectedPlayer) return;
  const cur = getCur();
  if (!cur) return;
  const g = selectedPlayer;
  // Clear immediately — don't wait for server response
  selectedPlayer = null;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  updatePickBtn();
  renderPool();
  await api('/pick', 'POST', { owner: cur.owner, golfer: g });
}

function getCur() {
  if (!state) return null;
  const seq = state.currentPhase === 'main' ? state.pickSequence : state.altSequence;
  return seq?.[state.currentPickIndex];
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (state?.status !== 'drafting') { clearInterval(timerInterval); timerInterval = null; return; }
    const el = document.getElementById('timer-display');
    if (!el) { clearInterval(timerInterval); timerInterval = null; return; }
    const secs = getTimerSecs();
    el.textContent = formatTime(secs);
    el.className = 'timer-val' + (secs<300?' danger':secs<900?' warn':'');
    if (secs===0) { clearInterval(timerInterval); timerInterval=null; showAutopick(); }
  }, 1000);
}

function getTimerSecs() {
  if (!state?.timerStart) return state?.timerDuration||7200;
  const elapsed = Math.floor((Date.now()-state.timerStart)/1000);
  const et = new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  if (et.getHours()<8||et.getHours()>=21) return state.timerDuration;
  return Math.max(0, state.timerDuration-elapsed);
}

function formatTime(s) {
  return `${Math.floor(s/3600)}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function showAutopick() {
  const cur = getCur();
  if (!cur) return;
  document.getElementById('ap-owner').textContent = cur.owner;
  document.getElementById('ap-modal-list').innerHTML = (state.autopickList||[]).map(p =>
    `<div class="autopick-item"><span>${p.name}</span>
    <button class="btn btn-sm btn-red" onclick="apModalPick('${p.name.replace(/'/g,"\\'")}')">Assign</button></div>`
  ).join('') || '<div style="color:#aaa;">No list set</div>';
  document.getElementById('autopick-modal').style.display = 'flex';
}

async function apModalPick(name) {
  const cur = getCur();
  if (!cur) return;
  document.getElementById('autopick-modal').style.display = 'none';
  await api('/pick', 'POST', { owner:cur.owner, golfer:{name}, isAutopick:true });
}

async function assignAP(name) {
  const cur = getCur();
  if (!cur) return;
  if (!confirm(`Assign "${name}" to ${cur.owner}?`)) return;
  await api('/pick', 'POST', { owner:cur.owner, golfer:{name}, isAutopick:true });
}

// ── Setup ─────────────────────────────────────────────────────────
function renderSetup() {
  document.getElementById('main-content').innerHTML = `
    <div class="setup">
      <div class="card">
        <h2 style="font-size:22px;font-weight:700;margin-bottom:20px;">Commissioner Setup</h2>
        <div class="form-group"><label>Tournament name</label>
          <input type="text" id="s-name" placeholder="e.g. 2026 PGA Championship"></div>
        <div class="form-group"><label>Player field (one name per line)</label>
          <textarea id="s-field" placeholder="Scottie Scheffler&#10;Rory McIlroy&#10;..."></textarea></div>
        <div class="form-group"><label>Bad golfer / autopick list (one per line)</label>
          <textarea id="s-auto" style="height:100px;" placeholder="John Daly&#10;Happy Gilmore&#10;..."></textarea></div>
        <button class="btn" onclick="submitSetup()">Open Lobby</button>
      </div>
    </div>`;
}

async function submitSetup() {
  const name = document.getElementById('s-name').value.trim();
  const field = document.getElementById('s-field').value.trim().split('\n').filter(Boolean).map(l=>({name:l.trim()}));
  const autopickList = document.getElementById('s-auto').value.trim().split('\n').filter(Boolean).map(l=>({name:l.trim()}));
  await api('/setup','POST',{name,field,autopickList});
}

// ── Lobby ─────────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function renderLobby() {
  const mainPrev = previewOrder ? previewOrder.map((o,i)=>`<span style="color:${COLORS[o]};font-weight:600;">${i+1}. ${o}</span>`).join('  ') : '';
  const altPrev = previewAltOrder ? previewAltOrder.map((o,i)=>`<span style="color:${COLORS[o]};font-weight:600;">${i+1}. ${o}</span>`).join('  ') : '';
  document.getElementById('main-content').innerHTML = `
    <div class="lobby">
      <div class="card">
        <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;">${state.name||'Golf Draft'}</h2>
        <p style="color:#666;font-size:13px;margin-bottom:20px;">Share link: <code style="background:#f5f5f3;padding:2px 6px;border-radius:4px;font-size:11px;">${location.href}</code></p>
        <div style="margin-bottom:16px;">
          ${OWNERS.map(o=>`<div class="owner-item"><div style="width:8px;height:8px;border-radius:50%;background:${COLORS[o]}"></div><span style="color:${COLORS[o]};font-weight:700;">${o}</span></div>`).join('')}
        </div>
        <button class="btn btn-outline" style="width:100%;margin-bottom:6px;" onclick="genMain()">
          ${previewOrder?'Re-randomize Main Order':'Randomize Main Order'}
        </button>
        ${mainPrev?`<div class="order-preview">${mainPrev}</div>`:''}
        <button class="btn btn-outline" style="width:100%;margin-top:12px;margin-bottom:6px;" onclick="genAlt()">
          ${previewAltOrder?'Re-randomize Alternate Order':'Randomize Alternate Order'}
        </button>
        ${altPrev?`<div class="order-preview">${altPrev}</div>`:''}
        <button class="btn btn-green" style="width:100%;padding:12px;margin-top:16px;" onclick="startDraft()" ${!previewOrder||!previewAltOrder?'disabled':''}>
          ${!previewOrder||!previewAltOrder?'Randomize both orders first':'Start Draft'}
        </button>
        <button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="importOdds()">Import DK + FD Odds</button>
      </div>
    </div>`;
}

function genMain() { previewOrder=shuffle(OWNERS); renderLobby(); }
function genAlt() { previewAltOrder=shuffle(OWNERS); renderLobby(); }
async function startDraft() {
  if(!previewOrder||!previewAltOrder) return;
  await api('/start','POST',{pickOrder:previewOrder,altOrder:previewAltOrder});
}

// ── Complete ──────────────────────────────────────────────────────
function renderComplete() {
  document.getElementById('main-content').innerHTML = `
    <div class="complete-banner"><h2 style="font-size:22px;font-weight:700;">Draft Complete!</h2><p style="margin-top:6px;opacity:.85;">All picks locked.</p></div>
    <div class="roster-grid">${OWNERS.map(o=>{
      const picks=state.picks[o]||{golfers:[],alternate:null};
      return `<div class="roster-col">
        <div class="owner-header" style="background:${COLORS[o]}">${o}</div>
        ${picks.golfers.map((g,i)=>`<div class="roster-slot"><span class="slot-label">${i+1}</span><span>${g.name}</span></div>`).join('')}
        <div class="alt-divider"><div class="roster-slot ${picks.alternate?'':'empty'}">
          <span class="slot-label" style="color:#856404;">A</span><span>${picks.alternate?picks.alternate.name:'—'}</span>
        </div></div>
      </div>`;
    }).join('')}</div>`;
}

// ── Odds ──────────────────────────────────────────────────────────
async function importOdds() {
  document.getElementById('odds-content').innerHTML = '<p style="color:#666;">Fetching odds...</p>';
  document.getElementById('odds-modal').style.display = 'flex';
  try {
    const r = await fetch(`${PROXY}/golf/${SLUG}/odds`,{method:'POST',headers:{'Content-Type':'application/json'}});
    const data = await r.json();
    if(data.error){ document.getElementById('odds-content').innerHTML=`<p style="color:#c62828;">${data.error}</p><button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="document.getElementById('odds-modal').style.display='none'">Close</button>`; return; }
    const unmatchedHtml = data.unmatched?.length ? data.unmatched.map(p=>`
      <div style="margin-bottom:10px;">
        <div style="font-weight:600;font-size:13px;margin-bottom:4px;">${p.name}</div>
        <div style="display:flex;gap:6px;">
          <select id="sel-${p.name.replace(/\s/g,'_')}" style="flex:1;border:1px solid #ddd;border-radius:5px;padding:4px 8px;font-size:12px;">
            <option value="">-- no match --</option>
            ${(data.availableOdds||[]).map(o=>`<option value="${o.name}">${o.name} (DK:${o.dk||'—'} FD:${o.fd||'—'})</option>`).join('')}
          </select>
          <button class="btn btn-sm btn-green" onclick="applyOdds('${p.name.replace(/'/g,"\\'")}','${p.name.replace(/\s/g,'_')}')">Apply</button>
        </div>
      </div>`).join('') : '';
    document.getElementById('odds-content').innerHTML = `
      <p style="margin-bottom:12px;"><span style="color:#2e7d32;font-weight:600;">${data.matched} matched</span>${data.unmatched?.length?` &bull; <span style="color:#c62828;font-weight:600;">${data.unmatched.length} unmatched</span>`:''}</p>
      ${unmatchedHtml}
      <button class="btn btn-outline btn-sm" style="margin-top:12px;width:100%;" onclick="document.getElementById('odds-modal').style.display='none'">Done</button>`;
  } catch(e) {
    document.getElementById('odds-content').innerHTML=`<p style="color:#c62828;">Error: ${e.message}</p><button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="document.getElementById('odds-modal').style.display='none'">Close</button>`;
  }
}

async function applyOdds(fieldName, selId) {
  const sel = document.getElementById('sel-'+selId);
  if (!sel?.value) return;
  await fetch(`${PROXY}/golf/${SLUG}/odds/manual`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fieldName,oddsName:sel.value})});
  sel.closest('div').style.opacity='0.4';
}

// ── Reset / Undo / Redo ───────────────────────────────────────────
function confirmReset() { document.getElementById('reset-modal').style.display='flex'; }
async function doReset() {
  document.getElementById('reset-modal').style.display='none';
  clearInterval(timerInterval); timerInterval=null;
  await fetch(`${PROXY}/golf/${SLUG}/reset`,{method:'POST',headers:{'Content-Type':'application/json'}});
}
async function doUndo() { await api('/undo','POST'); }
async function doRedo() { await api('/redo','POST'); }

connect();
</script>
