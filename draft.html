<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Draft Room v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;}
.topbar{background:#1a1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:16px;font-weight:600;}
.topbar-sub{font-size:12px;color:#888;margin-top:2px;}
.main{max-width:1400px;margin:0 auto;padding:20px;}
.btn{background:#1a1a1a;color:#fff;border:none;font-size:13px;font-weight:600;padding:8px 16px;border-radius:7px;cursor:pointer;}
.btn:hover{background:#333;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-sm{font-size:12px;padding:5px 10px;border-radius:5px;}
.btn-outline{background:transparent;color:#1a1a1a;border:1px solid #ccc;}
.btn-outline:hover{background:#f0f0ee;}
.btn-green{background:#2e7d32;color:#fff;}
.btn-green:hover{background:#1b5e20;}
.btn-red{background:#c62828;color:#fff;}
.btn-red:hover{background:#b71c1c;}
.btn-amber{background:#e65100;color:#fff;}
.btn-amber:hover{background:#bf360c;}
.card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:16px;}
.setup{max-width:600px;margin:40px auto;}
.setup h2{font-size:22px;font-weight:700;margin-bottom:20px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.form-group input,.form-group textarea,.form-group select{width:100%;border:1px solid #ddd;border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;}
.form-group textarea{height:160px;resize:vertical;font-size:12px;}
.lobby{max-width:500px;margin:40px auto;text-align:center;}
.lobby h2{font-size:24px;font-weight:700;margin-bottom:8px;}
.lobby-sub{color:#666;margin-bottom:24px;}
.owner-list{text-align:left;margin-bottom:24px;}
.owner-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f5f5f3;border-radius:8px;margin-bottom:6px;font-weight:500;}
.owner-dot{width:8px;height:8px;border-radius:50%;background:#ccc;}
.owner-dot.ready{background:#2e7d32;}
.draft-grid{display:grid;grid-template-columns:240px 1fr 240px;gap:16px;}
.pick-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;margin-bottom:4px;font-size:13px;}
.pick-item.current{background:#fff3cd;font-weight:700;border:1.5px solid #ffc107;}
.pick-item.done{opacity:0.45;text-decoration:line-through;}
.pick-item.upcoming{background:#f5f5f3;}
.pick-num{font-size:10px;color:#888;width:20px;flex-shrink:0;}
.pool-search{width:100%;border:1px solid #ddd;border-radius:7px;padding:8px 12px;font-size:13px;margin-bottom:10px;}
.pool-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:460px;overflow-y:auto;}
.player-card{background:#f5f5f3;border-radius:8px;padding:10px;cursor:pointer;border:1.5px solid transparent;transition:all .12s;}
.player-card:hover{border-color:#1a1a1a;background:#eee;}
.player-card.selected{border-color:#2e7d32;background:#e8f5e9;}
.player-name{font-size:13px;font-weight:600;}
.player-odds{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.odds-badge{font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px;}
.odds-dk{background:#000;color:#fff;}
.odds-fd{background:#1565c0;color:#fff;}
.owner-header{font-size:13px;font-weight:700;padding:8px 10px;border-radius:7px 7px 0 0;color:#fff;text-align:center;}
.roster-slot{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:0.5px solid #eee;font-size:12px;}
.roster-slot.empty{color:#aaa;font-style:italic;}
.slot-label{font-size:10px;color:#888;width:16px;flex-shrink:0;}
.slot-name{flex:1;}
.alt-section{border-top:2px solid #eee;}
.timer-bar{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.timer-label{font-size:12px;color:#666;}
.timer-val{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;}
.timer-val.warn{color:#e65100;}
.timer-val.danger{color:#c62828;}
.on-clock{font-size:18px;font-weight:700;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:12px;}
.autopick-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#f5f5f3;border-radius:7px;margin-bottom:6px;}
.complete-banner{background:#2e7d32;color:#fff;border-radius:12px;padding:20px;text-align:center;margin-bottom:20px;}
.complete-banner h2{font-size:22px;font-weight:700;}
.roster-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:16px;}
.roster-col{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;overflow:hidden;}
.section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:10px;}
.autopick-pool-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#f5f5f3;border-radius:7px;margin-bottom:5px;font-size:13px;}
.order-preview{background:#f5f5f3;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:12px;line-height:1.8;}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title" id="topbar-title">Golf Draft Room</div>
    <div class="topbar-sub" id="topbar-sub">Loading...</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn btn-sm btn-outline" id="undo-btn" style="color:#fff;border-color:#555;" onclick="doUndo()" disabled>Undo</button>
    <button class="btn btn-sm btn-outline" id="redo-btn" style="color:#fff;border-color:#555;" onclick="doRedo()" disabled>Redo</button>
    <button class="btn btn-sm btn-red" onclick="confirmReset()">Reset Draft</button>
  </div>
</div>

<div class="main" id="main-content">
  <div style="text-align:center;padding:60px;color:#888;">Connecting...</div>
</div>

<!-- Autopick modal (timer expired) -->
<div class="modal-overlay" id="autopick-modal" style="display:none;">
  <div class="modal">
    <h3>Autopick for <span id="autopick-owner"></span></h3>
    <p style="font-size:13px;color:#666;margin-bottom:14px;">Timer expired. Assign a golfer from the bad list:</p>
    <div id="autopick-list"></div>
    <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="closeAutopick()">Cancel</button>
  </div>
</div>

<!-- Odds review modal -->
<div class="modal-overlay" id="odds-review-modal" style="display:none;">
  <div class="modal" style="max-width:500px;">
    <h3>Odds Import Results</h3>
    <div id="odds-review-content"></div>
  </div>
</div>

<!-- Reset confirm modal -->
<div class="modal-overlay" id="reset-modal" style="display:none;">
  <div class="modal">
    <h3>Reset Draft?</h3>
    <p style="font-size:13px;color:#666;margin-bottom:20px;">This will wipe all picks and return to setup. This cannot be undone.</p>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-red" onclick="doReset()">Yes, Reset</button>
      <button class="btn btn-outline" onclick="document.getElementById('reset-modal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<script>
const PROXY = 'https://nba-production-4b6c.up.railway.app';
const OWNERS = ['Mark','Marc','Jared','Andrew','Zach','Ben','Matt'];
const OWNER_COLORS = {
  Mark:'#7B1FA2', Marc:'#F9A825', Jared:'#2E7D32', Andrew:'#E65100',
  Zach:'#1565C0', Ben:'#C62828', Matt:'#AD1457'
};

const params = new URLSearchParams(location.search);
const SLUG = params.get('slug') || 'pga-2026';

let state = null;
let ws = null;
let timerInterval = null;
let selectedPlayer = null;
let searchQuery = '';
let previewOrder = null;   // randomized main order (before start)
let previewAltOrder = null; // randomized alt order (before start)

// ── WebSocket ─────────────────────────────────────────────────────
function connect() {
  const wsUrl = PROXY.replace('https://','wss://').replace('http://','ws://');
  ws = new WebSocket(`${wsUrl}?slug=${SLUG}`);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'state') { state = msg.draft; render(); }
  };
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onerror = () => ws.close();
}

async function api(path, method='GET', body=null) {
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${PROXY}/golf/${SLUG}${path}`, opts);
  return r.json();
}

// ── Reset ─────────────────────────────────────────────────────────
function confirmReset() { document.getElementById('reset-modal').style.display='flex'; }
async function doReset() {
  document.getElementById('reset-modal').style.display='none';
  await fetch(`${PROXY}/golf/${SLUG}/reset`, { method:'POST', headers:{'Content-Type':'application/json'} });
}

// ── Setup ─────────────────────────────────────────────────────────
function renderSetup() {
  document.getElementById('main-content').innerHTML = `
    <div class="setup">
      <div class="card">
        <h2>Commissioner Setup</h2>
        <p style="color:#666;font-size:13px;margin-bottom:20px;">Configure the draft for this Major.</p>
        <div class="form-group">
          <label>Tournament name</label>
          <input type="text" id="setup-name" placeholder="e.g. 2026 PGA Championship" value="${state?.name||''}">
        </div>
        <div class="form-group">
          <label>Player field (one name per line)</label>
          <textarea id="setup-field" placeholder="Scottie Scheffler&#10;Rory McIlroy&#10;Jon Rahm&#10;..."></textarea>
        </div>
        <div class="form-group">
          <label>Autopick / bad golfer list (one per line)</label>
          <textarea id="setup-autopick" style="height:100px;" placeholder="John Daly&#10;Happy Gilmore&#10;..."></textarea>
        </div>
        <button class="btn" onclick="submitSetup()">Open Lobby</button>
      </div>
    </div>`;
}

async function submitSetup() {
  const name = document.getElementById('setup-name').value.trim();
  const fieldRaw = document.getElementById('setup-field').value.trim().split('\n').filter(Boolean);
  const autopickRaw = document.getElementById('setup-autopick').value.trim().split('\n').filter(Boolean);
  const field = fieldRaw.map(line => ({ name: line.trim() }));
  const autopickList = autopickRaw.map(line => ({ name: line.trim() }));
  await api('/setup', 'POST', { name, field, autopickList });
}

// ── Lobby ─────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function generateMainPreview() {
  previewOrder = shuffle(OWNERS);
  renderLobby();
}

function generateAltPreview() {
  previewAltOrder = shuffle(OWNERS);
  renderLobby();
}

function renderLobby() {
  const mainPreviewHtml = previewOrder
    ? `<div class="order-preview"><strong>Main draft order (snake):</strong><br>${previewOrder.map((o,i) => `<span style="color:${OWNER_COLORS[o]};font-weight:600;">${i+1}. ${o}</span>`).join(' &nbsp;')}</div>`
    : '';
  const altPreviewHtml = previewAltOrder
    ? `<div class="order-preview" style="margin-top:8px;"><strong>Alternate round order:</strong><br>${previewAltOrder.map((o,i) => `<span style="color:${OWNER_COLORS[o]};font-weight:600;">${i+1}. ${o}</span>`).join(' &nbsp;')}</div>`
    : '';

  document.getElementById('main-content').innerHTML = `
    <div class="lobby">
      <div class="card">
        <h2>${state.name || 'Golf Draft'}</h2>
        <p class="lobby-sub">Share this link with everyone:<br>
          <code style="font-size:11px;background:#f5f5f3;padding:4px 8px;border-radius:4px;word-break:break-all;">${location.href}</code>
        </p>
        <div class="owner-list">
          ${OWNERS.map(o => `
            <div class="owner-item">
              <div class="owner-dot ready"></div>
              <span style="color:${OWNER_COLORS[o]};font-weight:700;">${o}</span>
            </div>`).join('')}
        </div>

        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <button class="btn btn-outline" style="flex:1;" onclick="generateMainPreview()">
            ${previewOrder ? 'Re-randomize Main Order' : 'Randomize Main Order'}
          </button>
        </div>
        ${mainPreviewHtml}

        <div style="display:flex;gap:8px;margin-top:12px;margin-bottom:8px;">
          <button class="btn btn-outline" style="flex:1;" onclick="generateAltPreview()">
            ${previewAltOrder ? 'Re-randomize Alternate Order' : 'Randomize Alternate Order'}
          </button>
        </div>
        ${altPreviewHtml}

        <button class="btn btn-green" onclick="startDraft()"
          style="width:100%;padding:12px;margin-top:16px;"
          ${!previewOrder || !previewAltOrder ? 'disabled' : ''}>
          ${!previewOrder || !previewAltOrder ? 'Randomize both orders first' : 'Start Draft'}
        </button>
        <button class="btn btn-outline" onclick="importOdds()" style="width:100%;margin-top:8px;">
          Import DK + FD Odds
        </button>
      </div>
    </div>`;
}

async function startDraft() {
  if (!previewOrder || !previewAltOrder) return;
  await api('/start', 'POST', { pickOrder: previewOrder, altOrder: previewAltOrder });
}

// ── Draft room ────────────────────────────────────────────────────
function getCurrentPick() {
  if (!state) return null;
  const seq = state.currentPhase === 'main' ? state.pickSequence : state.altSequence;
  return seq?.[state.currentPickIndex];
}

function getTimerSeconds() {
  if (!state?.timerStart) return state?.timerDuration || 7200;
  const elapsed = Math.floor((Date.now() - state.timerStart) / 1000);
  const et = new Date(new Date().toLocaleString('en-US', {timeZone:'America/New_York'}));
  const hour = et.getHours();
  if (hour < 8 || hour >= 21) return state.timerDuration;
  return Math.max(0, state.timerDuration - elapsed);
}

function formatTimer(secs) {
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = secs%60;
  return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function renderDraft() {
  const cur = getCurrentPick();
  const isAlt = state.currentPhase === 'alternate';
  const pool = (state.field || []).filter(p =>
    !searchQuery || p.name.toLowerCase().includes(searchQuery.toLowerCase())
  );

  const seq = state.pickSequence || [];
  const altSeq = state.altSequence || [];
  const allPicks = [...seq, ...altSeq];
  const globalIdx = state.currentPhase === 'main'
    ? state.currentPickIndex
    : seq.length + state.currentPickIndex;

  const pickListHtml = allPicks.map((pick, i) => {
    const isDone = i < globalIdx;
    const isCurrent = i === globalIdx;
    const isAltPick = i >= seq.length;
    return `<div class="pick-item ${isDone?'done':isCurrent?'current':'upcoming'}">
      <span class="pick-num">${i+1}</span>
      <span style="color:${OWNER_COLORS[pick.owner]};font-weight:${isCurrent?'700':'500'}">${pick.owner}</span>
      ${isAltPick ? '<span style="font-size:9px;background:#fff3cd;color:#856404;padding:1px 4px;border-radius:3px;margin-left:auto;">ALT</span>' : ''}
    </div>`;
  }).join('');

  const rosterCols = OWNERS.map(o => {
    const picks = state.picks[o] || { golfers:[], alternate:null };
    const slots = Array(4).fill(null).map((_,i) => picks.golfers[i] || null);
    return `<div class="roster-col">
      <div class="owner-header" style="background:${OWNER_COLORS[o]}">${o}</div>
      ${slots.map((g,i) => `
        <div class="roster-slot ${g?'':'empty'}">
          <span class="slot-label">${i+1}</span>
          <span class="slot-name">${g ? g.name : '—'}</span>
        </div>`).join('')}
      <div class="alt-section">
        <div class="roster-slot ${picks.alternate?'':'empty'}">
          <span class="slot-label" style="color:#856404;">A</span>
          <span class="slot-name">${picks.alternate ? picks.alternate.name : '—'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Autopick bad list panel (right side)
  const autopickHtml = (state.autopickList || []).map(p => `
    <div class="autopick-pool-item">
      <span>${p.name}</span>
      ${cur ? `<button class="btn btn-sm btn-red" onclick="assignAutopick('${p.name.replace(/'/g,"\\'")}')">Assign</button>` : ''}
    </div>`).join('') || '<div style="color:#aaa;font-size:12px;">No bad golfer list set</div>';

  document.getElementById('main-content').innerHTML = `
    <div class="timer-bar">
      <div>
        <div class="timer-label">${isAlt ? 'ALTERNATE ROUND' : `ROUND ${cur?.round||''} OF 4`}</div>
        <div class="on-clock" style="color:${cur ? OWNER_COLORS[cur.owner] : '#2e7d32'}">
          ${cur ? `${cur.owner} is on the clock` : 'Draft complete!'}
        </div>
      </div>
      <div style="text-align:right;">
        <div class="timer-label">Time remaining</div>
        <div class="timer-val" id="timer-display">2:00:00</div>
      </div>
    </div>

    <div class="draft-grid">
      <!-- Left: Pick order -->
      <div>
        <div class="card">
          <div class="section-hdr">Pick Order</div>
          <div style="max-height:520px;overflow-y:auto;">${pickListHtml}</div>
        </div>
      </div>

      <!-- Center: Player pool -->
      <div>
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <div class="section-hdr" style="margin-bottom:0;">Available (${state.field?.length||0})</div>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-sm btn-outline" onclick="importOdds()">Refresh Odds</button>
              ${cur ? `<button class="btn btn-sm btn-green" onclick="confirmPick()" ${!selectedPlayer?'disabled':''}>
                Pick ${selectedPlayer?.name||'...'}
              </button>` : ''}
            </div>
          </div>
          <input class="pool-search" placeholder="Search players..." oninput="searchQuery=this.value;renderDraft();" value="${searchQuery}">
          <div class="pool-grid">
            ${pool.map(p => `
              <div class="player-card ${selectedPlayer?.name===p.name?'selected':''}" onclick="selectPlayer(${JSON.stringify(p).replace(/"/g,'&quot;')})">
                <div class="player-name">${p.name}</div>
                ${(p.odds_dk||p.odds_fd) ? `<div class="player-odds">
                  ${p.odds_dk ? `<span class="odds-badge odds-dk">DK ${p.odds_dk}</span>` : ''}
                  ${p.odds_fd ? `<span class="odds-badge odds-fd">FD ${p.odds_fd}</span>` : ''}
                </div>` : ''}
              </div>`).join('')}
          </div>
        </div>
      </div>

      <!-- Right: Bad golfer autopick list -->
      <div>
        <div class="card">
          <div class="section-hdr">Bad Golfer List</div>
          <p style="font-size:11px;color:#888;margin-bottom:10px;">Assign to current pick if timer expires</p>
          <div style="max-height:520px;overflow-y:auto;">${autopickHtml}</div>
        </div>
      </div>
    </div>

    <!-- Rosters -->
    <div class="roster-grid">${rosterCols}</div>
  `;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const secs = getTimerSeconds();
    const el = document.getElementById('timer-display');
    if (!el) return;
    el.textContent = formatTimer(secs);
    el.className = 'timer-val' + (secs < 300?' danger':secs < 900?' warn':'');
    if (secs === 0) { clearInterval(timerInterval); showAutopick(); }
  }, 1000);
}

async function importOdds() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Fetching odds...';
  try {
    const r = await fetch(`${PROXY}/golf/${SLUG}/odds`, { method:'POST', headers:{'Content-Type':'application/json'} });
    const data = await r.json();
    if (data.error) { alert('Odds error: ' + data.error); }
    else { showOddsReview(data); }
  } catch(e) {
    alert('Failed to fetch odds: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = 'Import DK + FD Odds';
}

function showOddsReview(data) {
  const { matched, unmatched, availableOdds } = data;
  const unmatchedHtml = unmatched && unmatched.length
    ? unmatched.map(p => `
      <div class="autopick-item" style="flex-direction:column;align-items:flex-start;gap:6px;">
        <span style="font-weight:600;">${p.name}</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <select id="odds-select-${p.name.replace(/\s/g,'_')}" style="flex:1;border:1px solid #ddd;border-radius:5px;padding:4px 8px;font-size:12px;">
            <option value="">-- no match --</option>
            ${(availableOdds||[]).map(o => `<option value="${o.name}">${o.name} (DK: ${o.dk||'—'} / FD: ${o.fd||'—'})</option>`).join('')}
          </select>
          <button class="btn btn-sm btn-green" onclick="applyManualOdds('${p.name.replace(/'/g,"\\'")}', '${p.name.replace(/\s/g,'_')}')">Apply</button>
        </div>
      </div>`).join('')
    : '<div style="color:#2e7d32;font-size:13px;">All players matched!</div>';

  document.getElementById('odds-review-content').innerHTML = `
    <div style="margin-bottom:12px;">
      <span style="color:#2e7d32;font-weight:600;">${matched} matched</span>
      ${unmatched?.length ? `&nbsp;&bull;&nbsp;<span style="color:#c62828;font-weight:600;">${unmatched.length} unmatched</span>` : ''}
    </div>
    ${unmatched?.length ? '<div style="font-size:12px;color:#666;margin-bottom:10px;">Select the correct player from the odds list for each unmatched name:</div>' : ''}
    ${unmatchedHtml}
    <button class="btn btn-outline btn-sm" style="margin-top:14px;width:100%;" onclick="document.getElementById('odds-review-modal').style.display=\'none\'">Done</button>
  `;
  document.getElementById('odds-review-modal').style.display = 'flex';
}

async function applyManualOdds(fieldName, selectId) {
  const sel = document.getElementById(`odds-select-${selectId}`);
  if (!sel || !sel.value) return;
  await fetch(`${PROXY}/golf/${SLUG}/odds/manual`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ fieldName, oddsName: sel.value })
  });
  sel.closest('.autopick-item').style.opacity = '0.4';
}

function selectPlayer(p) { selectedPlayer = p; renderDraft(); }

async function confirmPick() {
  if (!selectedPlayer) return;
  const cur = getCurrentPick();
  if (!cur) return;
  await api('/pick', 'POST', { owner: cur.owner, golfer: selectedPlayer });
  selectedPlayer = null;
}

async function assignAutopick(name) {
  const cur = getCurrentPick();
  if (!cur) return;
  if (!confirm(`Assign "${name}" to ${cur.owner}?`)) return;
  await api('/pick', 'POST', { owner: cur.owner, golfer: { name }, isAutopick: true });
}

function showAutopick() {
  const cur = getCurrentPick();
  if (!cur || !state) return;
  document.getElementById('autopick-owner').textContent = cur.owner;
  document.getElementById('autopick-list').innerHTML = (state.autopickList||[]).map(p => `
    <div class="autopick-item">
      <span>${p.name}</span>
      <button class="btn btn-sm btn-red" onclick="autopick('${p.name.replace(/'/g,"\\'")}')">Assign</button>
    </div>`).join('') || '<div style="color:#aaa;">No bad golfer list set</div>';
  document.getElementById('autopick-modal').style.display = 'flex';
}

async function autopick(name) {
  const cur = getCurrentPick();
  if (!cur) return;
  await api('/pick', 'POST', { owner: cur.owner, golfer: { name }, isAutopick: true });
  closeAutopick();
}
function closeAutopick() { document.getElementById('autopick-modal').style.display='none'; }

async function doUndo() { await api('/undo', 'POST'); }
async function doRedo() { await api('/redo', 'POST'); }

// ── Complete ──────────────────────────────────────────────────────
function renderComplete() {
  const rosterCols = OWNERS.map(o => {
    const picks = state.picks[o] || { golfers:[], alternate:null };
    return `<div class="roster-col">
      <div class="owner-header" style="background:${OWNER_COLORS[o]}">${o}</div>
      ${picks.golfers.map((g,i) => `
        <div class="roster-slot">
          <span class="slot-label">${i+1}</span>
          <span class="slot-name">${g.name}</span>
        </div>`).join('')}
      <div class="alt-section">
        <div class="roster-slot ${picks.alternate?'':'empty'}">
          <span class="slot-label" style="color:#856404;">A</span>
          <span class="slot-name">${picks.alternate?picks.alternate.name:'—'}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('main-content').innerHTML = `
    <div class="complete-banner">
      <h2>Draft Complete!</h2>
      <p style="margin-top:6px;opacity:.85;">All picks locked in. Good luck!</p>
    </div>
    <div class="roster-grid">${rosterCols}</div>`;
}

// ── Main render ───────────────────────────────────────────────────
function render() {
  if (!state) return;
  document.getElementById('topbar-title').textContent = state.name || 'Golf Draft Room';
  document.getElementById('topbar-sub').textContent = `slug: ${SLUG}`;
  const undoBtn = document.getElementById('undo-btn');
  const redoBtn = document.getElementById('redo-btn');
  if (undoBtn) undoBtn.disabled = !state.undoStack?.length;
  if (redoBtn) redoBtn.disabled = !state.redoStack?.length;
  if (state.status === 'setup') renderSetup();
  else if (state.status === 'lobby') renderLobby();
  else if (state.status === 'drafting') renderDraft();
  else if (state.status === 'complete') renderComplete();
}

connect();
</script>
</body>
</html>
