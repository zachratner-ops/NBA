<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Playoff History</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;}
.topbar{background:#1a1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:16px;font-weight:600;}
.topbar-nav a{color:#aaa;font-size:13px;text-decoration:none;}
.topbar-nav a:hover{color:#fff;}
.main{max-width:1100px;margin:0 auto;padding:28px 20px;}
.page-title{font-size:28px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:14px;color:#888;margin-bottom:20px;}

/* Tabs */
.tab-row{display:flex;gap:4px;margin-bottom:24px;background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;padding:4px;width:fit-content;}
.tab-btn{font-size:13px;font-weight:600;padding:7px 18px;border-radius:7px;border:none;background:transparent;color:#888;cursor:pointer;}
.tab-btn.active{background:#1a1a1a;color:#fff;}

/* Jump nav */
.jump-nav{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:14px 18px;margin-bottom:28px;}
.jump-nav-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:10px;}
.jump-years{display:flex;flex-wrap:wrap;gap:6px;}
.jump-year{font-size:13px;font-weight:600;padding:4px 12px;background:#f5f5f3;border-radius:20px;color:#1a1a1a;text-decoration:none;border:0.5px solid #e0e0e0;}
.jump-year:hover{background:#eee;}

/* All-time */
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:12px;margin-top:28px;}
.section-label:first-of-type{margin-top:0;}
.alltime{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:8px;}
.at-card{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;padding:14px;text-align:center;}
.at-card.top{border:2px solid #1565C0;}
.at-name{font-size:13px;font-weight:700;margin-bottom:6px;}
.at-wins{font-size:28px;font-weight:700;line-height:1;}
.at-lbl{font-size:10px;color:#888;margin-top:2px;}
.at-record{font-size:12px;color:#aaa;margin-top:4px;}
.at-earnings{font-size:11px;font-weight:600;color:#2e7d32;margin-top:5px;}
.at-wagered{font-size:10px;color:#aaa;margin-top:2px;}
.at-net{font-size:12px;font-weight:700;margin-top:3px;}
.at-pct{font-size:13px;font-weight:600;margin-top:4px;}
.sort-toggle{display:flex;gap:2px;background:#f5f5f3;border-radius:6px;padding:2px;width:fit-content;}
.sort-btn{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;border:none;background:transparent;color:#888;cursor:pointer;letter-spacing:.02em;}
.sort-btn.active{background:#1a1a1a;color:#fff;}
.alltime-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}

/* Year groups */
.year-group{margin-bottom:36px;}
.year-label{font-size:18px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #eee;scroll-margin-top:20px;}
.season-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;margin-bottom:16px;overflow:hidden;}
.season-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid #eee;flex-wrap:wrap;gap:8px;}
.season-name{font-size:16px;font-weight:700;}
.season-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.pot-pill{font-size:11px;background:#f5f5f3;border-radius:20px;padding:3px 10px;color:#666;}
.winner-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;color:#fff;}

/* Owner cards in grid */
.owners-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1px;background:#eee;}
.owner-card{background:#fff;padding:14px;}
.owner-card.won{background:#e8f2ff;}
.oc-header{font-size:12px;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid;}
.oc-score{font-size:22px;font-weight:700;margin-bottom:2px;color:#1a1a1a;}
.oc-rank{font-size:10px;color:#888;margin-bottom:8px;}
.oc-player{font-size:11px;padding:3px 0;display:flex;justify-content:space-between;color:#555;border-bottom:0.5px solid #f5f5f3;}
.oc-player.highlight{font-weight:600;color:#1a1a1a;}
.oc-pts{font-weight:600;flex-shrink:0;margin-left:4px;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.stats-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;}
@media(max-width:700px){.stats-grid,.stats-grid-3{grid-template-columns:1fr;}}
.stat-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:16px;}
.stat-card-title{font-size:13px;font-weight:700;margin-bottom:14px;color:#1a1a1a;}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #f0f0f0;}
.stat-row:last-child{border-bottom:none;}
.stat-row-name{font-size:13px;font-weight:500;width:80px;flex-shrink:0;}
.stat-row-val{font-size:13px;font-weight:700;}
.stat-bar-wrap{flex:1;margin:0 10px;height:6px;background:#f0f0f0;border-radius:3px;}
.stat-bar{height:6px;border-radius:3px;}
.h2h-table{width:100%;border-collapse:collapse;font-size:11px;}
.h2h-table th,.h2h-table td{padding:5px 7px;border:0.5px solid #eee;text-align:center;}
.h2h-table th{background:#f5f5f3;font-weight:700;font-size:10px;}
.h2h-win{background:#e8f5e9;font-weight:700;}
.h2h-loss{background:#fff0f0;}
.h2h-self{background:#f5f5f3;color:#ccc;}
.golfer-table{width:100%;border-collapse:collapse;font-size:12px;}
.golfer-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;padding:6px 8px;border-bottom:2px solid #eee;text-align:left;}
.golfer-table th.r{text-align:right;}
.golfer-table td{padding:6px 8px;border-bottom:0.5px solid #f5f5f3;}
.golfer-table td.r{text-align:right;font-weight:600;}
.golfer-table tr:last-child td{border-bottom:none;}
.trend-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid #f0f0f0;}
.trend-row:last-child{border-bottom:none;}
.trend-year{font-size:11px;color:#888;width:36px;flex-shrink:0;}
.trend-bar-wrap{flex:1;height:8px;background:#f0f0f0;border-radius:4px;}
.trend-bar{height:8px;border-radius:4px;}
.trend-val{font-size:11px;font-weight:700;width:60px;text-align:right;flex-shrink:0;}

/* ── Feedback modal ───────────────────────────────────────────── */
.fb-link{font-size:12px;color:#aaa;text-decoration:none;white-space:nowrap;border:0.5px solid #444;border-radius:5px;padding:4px 10px;transition:color .15s,border-color .15s;}
.fb-link:hover{color:#fff;border-color:#888;}
.fb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.fb-overlay.open{display:flex;}
.fb-modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:420px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.fb-modal h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.fb-modal p{font-size:13px;color:#888;margin-bottom:20px;line-height:1.4;}
.fb-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;color:#aaa;cursor:pointer;line-height:1;}
.fb-close:hover{color:#1a1a1a;}
.fb-field{margin-bottom:14px;}
.fb-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:5px;}
.fb-field input,.fb-field textarea,.fb-field select{width:100%;border:1px solid #ddd;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fff;transition:border-color .15s;}
.fb-field input:focus,.fb-field textarea:focus,.fb-field select:focus{outline:none;border-color:#1a1a1a;}
.fb-field textarea{height:100px;resize:vertical;}
.fb-submit{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;}
.fb-submit:hover{background:#333;}
.fb-submit:disabled{opacity:.5;cursor:not-allowed;}
.fb-success{display:none;text-align:center;padding:12px 0;}
.fb-success-icon{font-size:36px;margin-bottom:8px;}
.fb-success p{font-size:14px;color:#2e7d32;font-weight:600;}

/* ── Password gate ────────────────────────────────────────────── */
.pw-gate{display:none;position:fixed;inset:0;background:#1a1a1a;z-index:9999;align-items:center;justify-content:center;}
.pw-gate.show{display:flex;}
.pw-box{text-align:center;padding:40px 20px;max-width:340px;width:100%;}
.pw-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:6px;}
.pw-sub{font-size:14px;color:#666;margin-bottom:32px;}
.pw-input{width:100%;background:#2a2a2a;border:1px solid #333;border-radius:10px;padding:13px 16px;font-size:16px;color:#fff;font-family:inherit;text-align:center;letter-spacing:.08em;transition:border-color .15s;}
.pw-input:focus{outline:none;border-color:#555;}
.pw-input::placeholder{color:#555;letter-spacing:0;}
.pw-btn{margin-top:12px;width:100%;background:#fff;color:#1a1a1a;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;}
.pw-btn:hover{background:#ddd;}
.pw-error{font-size:12px;color:#e53935;margin-top:10px;min-height:16px;}

.draft-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:#f0f0f0;color:#888;margin-top:4px;}
</style>
</head>

<!-- Password gate -->
<div class="pw-gate" id="pw-gate">

    <input class="pw-input" id="pw-input" type="password" placeholder="password" onkeydown="if(event.key==='Enter')pwCheck()">

    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

      <a href="index.html">← Home</a>

    </div>
    <a class="fb-link" href="#" onclick="event.preventDefault();openFeedback()">💡 Suggest</a>
  </div>
</div>
<div class="main">
  <div class="page-title">NBA Playoff Points</div>
  <div class="page-sub" id="page-sub">Loading...</div>

    <button class="tab-btn active" onclick="showTab('results')">Results</button>

  </div>

  <div id="tab-results">

    </div>
    <div class="section-label">All-time standings</div>
    <div class="alltime-header">

    </div>
    <div class="alltime" id="alltime"></div>
    <div id="seasons-container"></div>
  </div>

  <div id="tab-stats" style="display:none;">
    <div id="stats-content"></div>
  </div>
</div>

// ── Utility ───────────────────────────────────────────────────────────────────
function pts(n){ return n!=null ? n.toLocaleString() : '—'; }

// ── Tab control ───────────────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('tab-results').style.display = tab === 'results' ? '' : 'none';
  document.getElementById('tab-stats').style.display   = tab === 'stats'   ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick') === `showTab('${tab}')`);
  });
}

// ── All-time standings ────────────────────────────────────────────────────────
const BUY_IN = 50; // per year, winner take all

// Pre-compute once
const _atData = (()=>{
  const wins={}, apps={}, earnings={}, wagered={};
  SEASONS.forEach(s => {
    const participants = Object.keys(s.owners).length;
    const pot = participants * BUY_IN;
    Object.keys(s.owners).forEach(o => {
      const key = o === 'Triplets' ? 'Throuple' : o;
      apps[key] = (apps[key]||0) + 1;
      wagered[key] = (wagered[key]||0) + BUY_IN;
    });
    const w = s.winner === 'Triplets' ? 'Throuple' : s.winner;
    wins[w] = (wins[w]||0) + 1;
    earnings[w] = (earnings[w]||0) + pot;
  });
  return Object.keys(apps).map(p => ({
    p, w:wins[p]||0, a:apps[p],
    earned:earnings[p]||0, spent:wagered[p]||0,
    net:(earnings[p]||0)-(wagered[p]||0)
  }));
})();

function renderAllTime(sortBy) {
  const sorted = _atData.slice().sort(sortBy==='net'
    ? (a,b)=>b.net-a.net||b.w-a.w
    : (a,b)=>b.w-a.w||b.a-a.a);
  const maxW = Math.max(...sorted.map(x=>x.w), 1);
  document.getElementById('alltime').innerHTML = sorted.map(({p,w,a,earned,spent,net})=>`
    <div class="at-card ${w>=maxW&&w>0?'top':''}">
      <div class="at-name" style="color:${COLORS[p]||'#555'}">${p}</div>
      <div class="at-wins">${w}</div>
      <div class="at-lbl">win${w!==1?'s':''}</div>
      <div class="at-record">${w}/${a} · ${a>0?Math.round(w/a*100):0}%</div>
      <div class="at-earnings">Won: $${earned.toLocaleString()}</div>
      <div class="at-wagered">Spent: $${spent.toLocaleString()}</div>
      <div class="at-net" style="color:${net>=0?'#2e7d32':'#c62828'}">Net: ${net>=0?'+':''}$${net.toLocaleString()}</div>
    </div>`).join('');
}

function sortAllTime(by) {
  document.getElementById('at-sort-wins').classList.toggle('active', by==='wins');
  document.getElementById('at-sort-net').classList.toggle('active', by==='net');
  renderAllTime(by);
}

function buildAllTime() {
  renderAllTime('wins');
  document.getElementById('page-sub').textContent = `${SEASONS.length} seasons · 2018–2025`;
}

  document.getElementById('jump-years').innerHTML = SEASONS.slice().reverse().map(s =>

  ).join('');

// ── Results ───────────────────────────────────────────────────────────────────
function buildSeasons() {
  const sorted = SEASONS.slice().sort((a,b)=>b.year-a.year);
  document.getElementById('seasons-container').innerHTML = sorted.map(s => {
    const owners = Object.entries(s.owners).map(([name,data]) => ({
      name, ...data,
      displayName: name === 'Triplets' ? 'Throuple' : name
    })).sort((a,b)=>b.score-a.score);
    const winnerName = s.winner === 'Triplets' ? 'Throuple' : s.winner;

    const cards = owners.map((o,idx)=>{
      const isWinner = o.displayName === winnerName;
      const topPlayers = o.players.slice().sort((a,b)=>b.pts-a.pts);
      const playerRows = topPlayers.map(p=>
        `<div class="oc-player"><span>${p.name}</span><span class="oc-pts">${p.pts}</span></div>`
      ).join('');
      const draftPick = (NBA_DRAFT[s.year]||{})[o.displayName] || (NBA_DRAFT[s.year]||{})[o.name];
      const draftBadge = draftPick ? `<span class="draft-badge" style="margin:0;float:right;margin-top:1px">Pick #${draftPick}</span>` : '';
      return `<div class="owner-card ${isWinner?'won':''}">
        <div class="oc-header" style="color:${COLORS[o.displayName]||'#555'};border-color:${COLORS[o.displayName]||'#eee'};display:flex;align-items:center;justify-content:space-between">${isWinner?'🏆 ':''}${o.displayName}${draftBadge}</div>
        <div class="oc-score">${o.score.toLocaleString()}</div>
        <div class="oc-rank">${isWinner?'Winner':'#'+(idx+1)}</div>
        ${playerRows}
      </div>`;
    }).join('');

    const winnerBadge = `<span class="winner-badge" style="background:${COLORS[winnerName]||'#1a1a1a'}">🏆 ${winnerName}</span>`;

    return `<div class="year-group" id="year-${s.year}">
      <div class="year-label">${s.year}</div>
      <div class="season-card">
        <div class="season-header">
          <div class="season-name">${s.year} NBA Playoffs</div>
          <div class="season-meta">${winnerBadge}</div>
        </div>
        <div class="owners-grid">${cards}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function buildStats() {
  // Normalize owner names
  const normalize = name => name === 'Triplets' ? 'Throuple' : name;

  // Collect all owners
  const ownerSet = new Set();
  SEASONS.forEach(s => Object.keys(s.owners).forEach(o => ownerSet.add(normalize(o))));
  const owners = [...ownerSet];

  // Per-season scores per owner
  const scoresByOwner = {};
  owners.forEach(o => scoresByOwner[o] = []);
  SEASONS.forEach(s => {
    owners.forEach(o => {
      const raw = Object.entries(s.owners).find(([k]) => normalize(k) === o);
      if (raw) scoresByOwner[o].push({ year: s.year, score: raw[1].score, winner: normalize(s.winner) === o });
    });
  });

  // Win counts
  const wins = {};
  SEASONS.forEach(s => {
    const w = normalize(s.winner);
    wins[w] = (wins[w]||0) + 1;
  });

  // Avg score when playing
  const avgScores = {};
  owners.forEach(o => {
    const scores = scoresByOwner[o].map(d=>d.score);
    avgScores[o] = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  });

  // Best season
  const bestSeasons = {};
  owners.forEach(o => {
    const best = scoresByOwner[o].reduce((a,b)=>b.score>a.score?b:a, {score:0,year:null});
    bestSeasons[o] = best;
  });

  // Win rate
  const winRates = {};
  owners.forEach(o => {
    const a = scoresByOwner[o].length;
    winRates[o] = a > 0 ? ((wins[o]||0)/a) : 0;
  });

  // Tendencies card
  const sortedByWins = owners.slice().sort((a,b)=>(wins[b]||0)-(wins[a]||0)||winRates[b]-winRates[a]);
  const maxAvg = Math.max(...owners.map(o=>avgScores[o]));
  const tendenciesHtml = `<div class="stat-card">
    <div class="stat-card-title">Win rate</div>
    ${sortedByWins.map(o=>{
      const wr = winRates[o];
      return `<div class="stat-row">
        <div class="stat-row-name" style="color:${COLORS[o]||'#555'};font-weight:600">${o}</div>
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round(wr*100)}%;background:${COLORS[o]||'#aaa'}"></div></div>
        <div class="stat-row-val">${Math.round(wr*100)}%</div>
      </div>`;
    }).join('')}
  </div>
  <div class="stat-card">
    <div class="stat-card-title">Avg score per season</div>
    ${owners.slice().sort((a,b)=>avgScores[b]-avgScores[a]).map(o=>{
      return `<div class="stat-row">
        <div class="stat-row-name" style="color:${COLORS[o]||'#555'};font-weight:600">${o}</div>
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round((avgScores[o]/maxAvg)*100)}%;background:${COLORS[o]||'#aaa'}"></div></div>
        <div class="stat-row-val">${avgScores[o].toLocaleString()}</div>
      </div>`;
    }).join('')}
  </div>`;

  // Year-by-year performance table
  const years = SEASONS.map(s=>s.year).sort((a,b)=>b-a);
  const yearPerfRows = sortedByWins.map(o => {
    const cells = years.map(y => {
      const entry = scoresByOwner[o].find(d=>d.year===y);
      if (!entry) return `<td class="r" style="color:#ddd">—</td>`;
      const col = entry.winner ? '#1565C0' : entry.score > 2000 ? '#2e7d32' : entry.score < 1200 ? '#c62828' : '#666';
      return `<td class="r" style="color:${col};font-weight:${entry.winner?'700':'400'}">${entry.winner?'🏆':entry.score.toLocaleString()}</td>`;
    }).join('');
    return `<tr><td><span style="color:${COLORS[o]||'#555'};font-weight:700">${o}</span></td>${cells}</tr>`;
  }).join('');

  const yearPerfHtml = `<table class="golfer-table">
    <thead><tr><th>Owner</th>${years.map(y=>`<th class="r">${y}</th>`).join('')}</tr></thead>
    <tbody>${yearPerfRows}</tbody>
  </table>`;

  // Best seasons list
  const bestSeasonHtml = sortedByWins.map(o => {
    const b = bestSeasons[o];
    return b.year ? `<div class="stat-row">
      <div class="stat-row-name" style="color:${COLORS[o]||'#555'};font-weight:600">${o}</div>
      <div style="font-size:11px;color:#aaa;width:36px;text-align:center;flex-shrink:0">${b.year}</div>
      <div class="stat-row-val">${b.score.toLocaleString()}</div>
    </div>` : '';
  }).join('');

  // Worst overall picks: drafted high (low draft slot) but scored poorly
  // draft slot = index in players array (0 = first pick)
  const allPicks = [];
  SEASONS.forEach(s => {
    Object.entries(s.owners).forEach(([owner, data]) => {
      data.players.forEach((p, idx) => {
        allPicks.push({
          player: p.name,
          pts: p.pts,
          draftSlot: idx + 1, // 1-based
          year: s.year,
          owner: normalize(owner)
        });
      });
    });
  });
  // Score = draft slot inverse * low points. "Bust" = picked in top 3 but scored very low.
  // We rank by: expected (draftSlot being low = high expectation) vs actual pts
  // Use a disappointment score: (max_slot - draftSlot + 1) * disappointment
  // Simpler: filter top-3 picks, sort by pts asc
  const bustPicks = allPicks
    .filter(p => p.draftSlot <= 3)
    .sort((a, b) => a.pts - b.pts)
    .slice(0, 15);

  const worstPicksHtml = `<table class="golfer-table">
    <thead><tr><th>Player</th><th class="r">Pick #</th><th class="r">Year</th><th class="r">Owner</th><th class="r">PTS</th></tr></thead>
    <tbody>${bustPicks.map(p=>`<tr>
      <td>${p.player}</td>
      <td class="r" style="color:#c62828;font-weight:700">#${p.draftSlot}</td>
      <td class="r" style="color:#888">${p.year}</td>
      <td class="r" style="color:${COLORS[p.owner]||'#555'};font-weight:700">${p.owner}</td>
      <td class="r" style="color:#c62828">${p.pts}</td>
    </tr>`).join('')}
    </tbody>
  </table>`;

  // H2H
  const h2hData = {};
  owners.forEach(a => {
    h2hData[a] = {};
    owners.forEach(b => { if(a!==b) h2hData[a][b]={w:0,l:0}; });
  });
  SEASONS.forEach(s => {
    const entries = Object.entries(s.owners).map(([k,v])=>({name:normalize(k),score:v.score}));
    entries.forEach(a => {
      entries.forEach(b => {
        if(a.name===b.name) return;
        if(a.score > b.score) h2hData[a.name][b.name].w++;
        else h2hData[a.name][b.name].l++;
      });
    });
  });

  const h2hHtml = `<table class="h2h-table">
    <thead><tr><th></th>${sortedByWins.map(o=>`<th style="color:${COLORS[o]||'#555'}">${o.slice(0,4)}</th>`).join('')}</tr></thead>
    <tbody>${sortedByWins.map(a=>`<tr>
      <th style="color:${COLORS[a]||'#555'}">${a.slice(0,4)}</th>
      ${sortedByWins.map(b=>{
        if(a===b) return `<td class="h2h-self">—</td>`;
        const r=h2hData[a]?.[b];
        if(!r||r.w+r.l===0) return `<td>—</td>`;
        const pct=Math.round(r.w/(r.w+r.l)*100);
        return `<td class="${pct>=50?'h2h-win':'h2h-loss'}">${r.w}-${r.l}</td>`;
      }).join('')}
    </tr>`).join('')}
    </tbody>
  </table>`;

  // Most pts in a season (top players overall)
  const allPlayerScores = [];
  SEASONS.forEach(s => {
    Object.entries(s.owners).forEach(([owner, data]) => {
      data.players.forEach(p => {
        allPlayerScores.push({player: p.name, pts: p.pts, year: s.year, owner: normalize(owner)});
      });
    });
  });
  const topPlayerScores = allPlayerScores.slice().sort((a,b)=>b.pts-a.pts).slice(0,15);
  const topPlayersHtml = `<table class="golfer-table">
    <thead><tr><th>Player</th><th class="r">Year</th><th class="r">Owner</th><th class="r">PTS</th></tr></thead>
    <tbody>${topPlayerScores.map(p=>`<tr>
      <td>${p.player}</td>
      <td class="r">${p.year}</td>
      <td class="r" style="color:${COLORS[p.owner]||'#555'};font-weight:700">${p.owner}</td>
      <td class="r">${p.pts}</td>
    </tr>`).join('')}
    </tbody>
  </table>`;

  // Most drafted players
  const playerDraftCounts = {};
  SEASONS.forEach(s => {
    Object.values(s.owners).forEach(data => {
      data.players.forEach(p => {
        playerDraftCounts[p.name] = (playerDraftCounts[p.name]||0) + 1;
      });
    });
  });
  const mostDrafted = Object.entries(playerDraftCounts).filter(([,c])=>c>=3).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const mostDraftedHtml = `<table class="golfer-table">
    <thead><tr><th>Player</th><th class="r">Times Drafted</th></tr></thead>
    <tbody>${mostDrafted.map(([p,c])=>`<tr><td>${p}</td><td class="r">${c}</td></tr>`).join('')}
    </tbody>
  </table>`;

  // ── Draft order stats ─────────────────────────────────────────
  const draftPositions = {};
  const draftFinishes = [];
  SEASONS.forEach(s => {
    const draft = NBA_DRAFT[s.year] || {};
    const owners_ranked = Object.entries(s.owners)
      .map(([k,v]) => ({ name: normalize(k), score: v.score }))
      .sort((a,b) => b.score - a.score);
    Object.entries(draft).forEach(([rawName, pick]) => {
      const name = normalize(rawName);
      if (!draftPositions[name]) draftPositions[name] = [];
      draftPositions[name].push(pick);
      const finishIdx = owners_ranked.findIndex(o => o.name === name);
      if (finishIdx >= 0) {
        draftFinishes.push({ owner: name, year: s.year, pick, finish: finishIdx + 1, won: normalize(s.winner) === name });
      }
    });
  });

  // Most common draft slot
  const mostCommonSlot = {};
  Object.entries(draftPositions).forEach(([owner, picks]) => {
    const freq = {};
    picks.forEach(p => freq[p] = (freq[p]||0) + 1);
    const sorted = Object.entries(freq).sort((a,b) => b[1]-a[1] || a[0]-b[0]);
    mostCommonSlot[owner] = { pick: +sorted[0][0], count: sorted[0][1], total: picks.length };
  });

  const slotRows = sortedByWins.filter(o => mostCommonSlot[o]).map(o => {
    const {pick, count, total} = mostCommonSlot[o];
    return '<div class="stat-row" style="gap:8px">' +
      '<div style="width:70px;flex-shrink:0;color:' + (COLORS[o]||'#555') + ';font-weight:600;font-size:13px">' + o + '</div>' +
      '<div class="draft-badge" style="margin:0;flex-shrink:0">Pick #' + pick + '</div>' +
      '<div style="font-size:11px;color:#aaa;margin-left:auto">' + count + '/' + total + ' yrs</div>' +
      '</div>';
  }).join('');
  const slotHtml = '<div class="stat-card"><div class="stat-card-title">Most common draft slot</div>' + slotRows + '</div>';

  // Times picked first
  const pick1Counts = {};
  draftFinishes.forEach(({owner, pick}) => { if (pick === 1) pick1Counts[owner] = (pick1Counts[owner]||0) + 1; });
  const pick1Rows = Object.entries(pick1Counts).sort((a,b) => b[1]-a[1]).map(([o, count]) => {
    const total = (draftPositions[o]||[]).length;
    const pct = Math.round(count/total*100);
    return '<div class="stat-row" style="gap:8px">' +
      '<div style="width:70px;flex-shrink:0;color:' + (COLORS[o]||'#555') + ';font-weight:600;font-size:13px">' + o + '</div>' +
      '<div class="stat-bar-wrap"><div class="stat-bar" style="width:' + pct + '%;background:' + (COLORS[o]||'#aaa') + '"></div></div>' +
      '<div class="stat-row-val" style="flex-shrink:0">' + count + 'x <span style="font-size:10px;color:#aaa">(' + pct + '%)</span></div>' +
      '</div>';
  }).join('');
  const pick1Html = '<div class="stat-card"><div class="stat-card-title">Times drafting first overall</div>' + pick1Rows + '</div>';

  // Win rate by pick
  const byPickWins = {}, byPickTotal = {};
  draftFinishes.forEach(({pick, won}) => {
    byPickWins[pick] = (byPickWins[pick]||0) + (won?1:0);
    byPickTotal[pick] = (byPickTotal[pick]||0) + 1;
  });
  const pickNums = Object.keys(byPickTotal).map(Number).sort((a,b)=>a-b);
  const pickRows = pickNums.map(pick => {
    const w = byPickWins[pick]||0;
    const total = byPickTotal[pick];
    const pct = Math.round(w/total*100);
    return '<div class="stat-row" style="gap:8px">' +
      '<div class="draft-badge" style="margin:0;width:52px;text-align:center;flex-shrink:0">Pick #' + pick + '</div>' +
      '<div class="stat-bar-wrap"><div class="stat-bar" style="width:' + pct + '%;background:#1565C0"></div></div>' +
      '<div class="stat-row-val" style="flex-shrink:0">' + pct + '% <span style="font-size:10px;color:#aaa">(' + w + '/' + total + ')</span></div>' +
      '</div>';
  }).join('');
  const winRateByPickHtml = '<div class="stat-card"><div class="stat-card-title">Win rate by draft position</div>' + pickRows + '</div>';

  // Steals & busts
  const steals = draftFinishes.map(d => ({...d, diff: d.finish - d.pick})).filter(d => d.diff !== 0);
  const biggestSteals = steals.slice().sort((a,b) => a.diff - b.diff).slice(0, 5);
  const biggestBusts  = steals.slice().sort((a,b) => b.diff - a.diff).slice(0, 5);
  function stealRow(d) {
    const sign = d.diff < 0 ? '↑' : '↓';
    const color = d.diff < 0 ? '#2e7d32' : '#c62828';
    return '<div class="stat-row" style="gap:8px">' +
      '<div style="width:70px;flex-shrink:0;color:' + (COLORS[d.owner]||'#555') + ';font-weight:600;font-size:13px">' + d.owner + '</div>' +
      '<div style="font-size:11px;color:#aaa;flex:1">Pick #' + d.pick + ' → #' + d.finish + ' (' + d.year + ')</div>' +
      '<div style="font-weight:700;color:' + color + ';flex-shrink:0">' + sign + Math.abs(d.diff) + '</div>' +
      '</div>';
  }
  const stealBustHtml =
    '<div class="stat-card"><div class="stat-card-title">🏆 Biggest steals</div>' + biggestSteals.map(stealRow).join('') +
    '<div style="height:1px;background:#f0f0f0;margin:12px 0"></div>' +
    '<div class="stat-card-title" style="margin-bottom:10px">💀 Biggest busts</div>' + biggestBusts.map(stealRow).join('') + '</div>';

  document.getElementById('stats-content').innerHTML =
    '<div class="section-label">Win rate & scoring</div>' +
    '<div class="stats-grid">' + tendenciesHtml + '</div>' +
    '<div class="section-label">Best single season</div>' +
    '<div class="stat-card" style="margin-bottom:24px">' + bestSeasonHtml + '</div>' +
    '<div class="section-label">Year-by-year results (🏆 = won, pts = score)</div>' +
    '<div class="stat-card" style="margin-bottom:24px;overflow-x:auto">' + yearPerfHtml + '</div>' +
    '<div class="section-label">Head-to-head records (when both playing)</div>' +
    '<div class="stat-card" style="margin-bottom:24px;overflow-x:auto"><div style="font-size:11px;color:#888;margin-bottom:10px">W-L record against each opponent</div>' + h2hHtml + '</div>' +
    '<div class="section-label">Top individual player seasons (all-time)</div>' +
    '<div class="stat-card" style="margin-bottom:24px;overflow-x:auto">' + topPlayersHtml + '</div>' +
    '<div class="section-label">Most drafted players (3+ times)</div>' +
    '<div class="stat-card" style="margin-bottom:24px;overflow-x:auto">' + mostDraftedHtml + '</div>' +
    '<div class="section-label">Draft order analysis</div>' +
    '<div class="stats-grid">' + winRateByPickHtml + slotHtml + '</div>' +
    '<div class="stats-grid">' + pick1Html + stealBustHtml + '</div>';
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildAllTime();
buildJumpNav();
buildSeasons();
buildStats();
</script>

<script>
// ── Feedback modal ─────────────────────────────────────────────
// 👉 Replace mnjlwlgy with your Formspree form ID (e.g. xpwzabcd)
const FORMSPREE_ID = "mnjlwlgy";

function openFeedback() {
  document.getElementById("fb-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeFeedback() {
  document.getElementById("fb-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
function fbClose(e) {
  if (e.target === document.getElementById("fb-overlay")) closeFeedback();
}
async function fbSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById("fb-submit-btn");
  btn.disabled = true; btn.textContent = "Sending…";
  const data = new FormData(e.target);
  try {
    const res = await fetch("https://formspree.io/f/" + FORMSPREE_ID, {
      method: "POST", body: data, headers: { Accept: "application/json" }
    });
    if (res.ok) {
      document.getElementById("fb-form-wrap").style.display = "none";
      document.getElementById("fb-success").style.display = "block";
      setTimeout(() => {
        closeFeedback();
        document.getElementById("fb-form-wrap").style.display = "";
        document.getElementById("fb-success").style.display = "none";
        e.target.reset(); btn.disabled = false; btn.textContent = "Send request →";
      }, 2500);
    } else { throw new Error(); }
  } catch {
    btn.disabled = false; btn.textContent = "Send request →";
    alert("Something went wrong — try again.");
  }
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeFeedback(); });
</script>
<script>
// ── Password gate ──────────────────────────────────────────────
const PW_KEY = 'srb_auth';
const PW_CORRECT = 'rudygobert'; // 👈 change this to set the password

(function() {
  if (sessionStorage.getItem(PW_KEY) !== 'ok') {
    document.getElementById('pw-gate').classList.add('show');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('pw-input').focus(), 50);
  }
})();

function pwCheck() {
  const val = document.getElementById('pw-input').value.trim().toLowerCase();
  if (val === PW_CORRECT.toLowerCase()) {
    sessionStorage.setItem(PW_KEY, 'ok');
    document.getElementById('pw-gate').classList.remove('show');
    document.body.style.overflow = '';
  } else {
    const err = document.getElementById('pw-error');
    const input = document.getElementById('pw-input');
    err.textContent = 'Wrong password — try again.';
    input.value = '';
    input.focus();
    input.style.borderColor = '#e53935';
    setTimeout(() => { err.textContent = ''; input.style.borderColor = ''; }, 2000);
  }
}
</script>
