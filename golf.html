<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>Golf Bet History</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;}
.topbar{background:#1a1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:16px;font-weight:600;}
.topbar-nav{display:flex;gap:16px;}
.topbar-nav a{color:#aaa;font-size:13px;text-decoration:none;}
.topbar-nav a:hover{color:#fff;}
.topbar-nav a.active{color:#fff;}
.main{max-width:1200px;margin:0 auto;padding:28px 20px;}
.page-title{font-size:28px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:14px;color:#888;margin-bottom:20px;}

/* Tab toggle */
.tab-row{display:flex;gap:4px;margin-bottom:24px;background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;padding:4px;width:fit-content;}
.tab-btn{font-size:13px;font-weight:600;padding:7px 18px;border-radius:7px;border:none;background:transparent;color:#888;cursor:pointer;}
.tab-btn.active{background:#1a1a1a;color:#fff;}

/* Jump nav */
.jump-nav{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:14px 18px;margin-bottom:28px;}
.jump-nav-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:10px;}
.jump-years{display:flex;flex-wrap:wrap;gap:6px;}
.jump-year{font-size:13px;font-weight:600;padding:4px 12px;background:#f5f5f3;border-radius:20px;color:#1a1a1a;text-decoration:none;border:0.5px solid #e0e0e0;}
.jump-year:hover{background:#eee;}

/* All-time */
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:12px;margin-top:28px;}
.section-label:first-of-type{margin-top:0;}
.alltime{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:8px;}
.at-card{background:#fff;border-radius:10px;border:0.5px solid #e0e0e0;padding:14px;text-align:center;}
.at-card.top{border:2px solid #2e7d32;}
.at-name{font-size:13px;font-weight:700;margin-bottom:6px;}
.at-wins{font-size:28px;font-weight:700;line-height:1;}
.at-lbl{font-size:10px;color:#888;margin-top:2px;}
.at-earnings{font-size:13px;font-weight:600;color:#2e7d32;margin-top:6px;}
.at-breakdown{font-size:10px;color:#aaa;margin-top:3px;}
.sort-toggle{display:flex;gap:2px;background:#f5f5f3;border-radius:6px;padding:2px;width:fit-content;}
.sort-btn{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;border:none;background:transparent;color:#888;cursor:pointer;letter-spacing:.02em;}
.sort-btn.active{background:#1a1a1a;color:#fff;}
.alltime-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}

/* Results */
.year-group{margin-bottom:36px;}
.year-label{font-size:18px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #eee;scroll-margin-top:20px;}
.major-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;margin-bottom:16px;overflow:hidden;}
.major-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid #eee;flex-wrap:wrap;gap:8px;}
.major-name{font-size:16px;font-weight:700;}
.major-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.pot-pill{font-size:11px;background:#f5f5f3;border-radius:20px;padding:3px 10px;color:#666;}
.winner-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;color:#fff;}
.tie-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;background:#888;color:#fff;}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:1px;background:#eee;}
.result-card{background:#fff;padding:12px;}
.result-card.won{background:#f0faf0;}
.result-card.out{opacity:0.55;}
.rc-header{font-size:12px;font-weight:700;margin-bottom:6px;padding-bottom:6px;border-bottom:2px solid;}
.rc-score{font-size:20px;font-weight:700;margin-bottom:2px;}
.rc-score.under{color:#2e7d32;}
.rc-score.over{color:#c62828;}
.rc-score.out-txt{color:#aaa;font-size:14px;}
.rc-rank{font-size:10px;color:#888;margin-bottom:8px;}
.rc-player{font-size:11px;padding:2px 0;display:flex;justify-content:space-between;color:#555;border-bottom:0.5px solid #f5f5f3;}
.rc-player.cut{color:#bbb;text-decoration:line-through;}
.rc-player.sub{font-style:italic;color:#1565c0;}
.rc-player.alt{border-top:1.5px solid #eee;margin-top:3px;padding-top:3px;}
.alt-lbl{font-size:9px;font-weight:700;color:#856404;margin-right:2px;}
.rc-score-val{font-weight:600;flex-shrink:0;margin-left:4px;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.stats-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;}
@media(max-width:700px){.stats-grid,.stats-grid-3{grid-template-columns:1fr;}}
.stat-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:16px;}
.stat-card-title{font-size:13px;font-weight:700;margin-bottom:14px;color:#1a1a1a;}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #f0f0f0;}
.stat-row:last-child{border-bottom:none;}
.stat-row-name{font-size:13px;font-weight:500;}
.stat-row-val{font-size:13px;font-weight:700;color:#1a1a1a;}
.stat-row-sub{font-size:11px;color:#aaa;margin-top:1px;}
.stat-bar-wrap{flex:1;margin:0 10px;height:6px;background:#f0f0f0;border-radius:3px;}
.stat-bar{height:6px;border-radius:3px;}
.golfer-table{width:100%;border-collapse:collapse;font-size:12px;}
.golfer-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;padding:6px 8px;border-bottom:2px solid #eee;text-align:left;}
.golfer-table th.r{text-align:right;}
.golfer-table td{padding:6px 8px;border-bottom:0.5px solid #f5f5f3;}
.golfer-table td.r{text-align:right;font-weight:600;}
.golfer-table tr:last-child td{border-bottom:none;}
.owner-pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff;margin-left:4px;}
.trend-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid #f0f0f0;}
.trend-row:last-child{border-bottom:none;}
.trend-year{font-size:11px;color:#888;width:36px;flex-shrink:0;}
.trend-bar-wrap{flex:1;height:8px;background:#f0f0f0;border-radius:4px;}
.trend-bar{height:8px;border-radius:4px;}
.trend-val{font-size:11px;font-weight:700;width:40px;text-align:right;flex-shrink:0;}
.h2h-table{width:100%;border-collapse:collapse;font-size:11px;}
.h2h-table th,.h2h-table td{padding:5px 7px;border:0.5px solid #eee;text-align:center;}
.h2h-table th{background:#f5f5f3;font-weight:700;font-size:10px;}
.h2h-win{background:#e8f5e9;font-weight:700;}
.h2h-loss{background:#fff0f0;}
.h2h-self{background:#f5f5f3;color:#ccc;}

/* ── Feedback modal ───────────────────────────────────────────── */
.fb-link{font-size:12px;color:#aaa;text-decoration:none;white-space:nowrap;border:0.5px solid #444;border-radius:5px;padding:4px 10px;transition:color .15s,border-color .15s;}
.fb-link:hover{color:#fff;border-color:#888;}
.fb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.fb-overlay.open{display:flex;}
.fb-modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:420px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.fb-modal h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.fb-modal p{font-size:13px;color:#888;margin-bottom:20px;line-height:1.4;}
.fb-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;color:#aaa;cursor:pointer;line-height:1;}
.fb-close:hover{color:#1a1a1a;}
.fb-field{margin-bottom:14px;}
.fb-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:5px;}
.fb-field input,.fb-field textarea,.fb-field select{width:100%;border:1px solid #ddd;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fff;transition:border-color .15s;}
.fb-field input:focus,.fb-field textarea:focus,.fb-field select:focus{outline:none;border-color:#1a1a1a;}
.fb-field textarea{height:100px;resize:vertical;}
.fb-submit{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;}
.fb-submit:hover{background:#333;}
.fb-submit:disabled{opacity:.5;cursor:not-allowed;}
.fb-success{display:none;text-align:center;padding:12px 0;}
.fb-success-icon{font-size:36px;margin-bottom:8px;}
.fb-success p{font-size:14px;color:#2e7d32;font-weight:600;}

/* ── Password gate ────────────────────────────────────────────── */
.pw-gate{display:none;position:fixed;inset:0;background:#1a1a1a;z-index:9999;align-items:center;justify-content:center;}
.pw-gate.show{display:flex;}
.pw-box{text-align:center;padding:40px 20px;max-width:340px;width:100%;}
.pw-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:6px;}
.pw-sub{font-size:14px;color:#666;margin-bottom:32px;}
.pw-input{width:100%;background:#2a2a2a;border:1px solid #333;border-radius:10px;padding:13px 16px;font-size:16px;color:#fff;font-family:inherit;text-align:center;letter-spacing:.08em;transition:border-color .15s;}
.pw-input:focus{outline:none;border-color:#555;}
.pw-input::placeholder{color:#555;letter-spacing:0;}
.pw-btn{margin-top:12px;width:100%;background:#fff;color:#1a1a1a;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;}
.pw-btn:hover{background:#ddd;}
.pw-error{font-size:12px;color:#e53935;margin-top:10px;min-height:16px;}

.draft-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:#f0f0f0;color:#888;margin-top:4px;}
</style>
</head>

<!-- Password gate -->
<div class="pw-gate" id="pw-gate">
  <div class="pw-box">
    <div class="pw-title">Giesener...<br>Are you In?</div>
    <div class="pw-sub">Enter the password to continue</div>
    <input class="pw-input" id="pw-input" type="password" placeholder="password" onkeydown="if(event.key==='Enter')pwCheck()">
    <button class="pw-btn" onclick="pwCheck()">Enter →</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>
<div class="topbar">
  <div class="topbar-title">Giesener, Are You In?</div>
  <div style="display:flex;align-items:center;gap:16px;">
    <a href="index.html" style="color:#aaa;font-size:13px;text-decoration:none;">← Home</a>
    <a class="fb-link" href="#" onclick="event.preventDefault();openFeedback()">💡 Suggest</a>
  </div>
</div>
<div class="main">
  <div class="page-title">Major History</div>
  <div class="page-sub" id="page-sub">Loading...</div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="showTab('results')">Results</button>
    <button class="tab-btn" onclick="showTab('stats')">Stats</button>
  </div>

  <!-- Results tab -->
  <div id="tab-results">
    <div class="jump-nav">
      <div class="jump-nav-title">Jump to year</div>
      <div class="jump-years" id="jump-years"></div>
    </div>
    <div class="section-label">All-time standings</div>
    <div class="alltime-header">
      <div></div>
      <div class="sort-toggle">
        <button class="sort-btn active" id="at-sort-wins" onclick="sortAllTime('wins')">Wins</button>
        <button class="sort-btn" id="at-sort-net" onclick="sortAllTime('net')">Net $</button>
      </div>
    </div>
    <div class="alltime" id="alltime"></div>
    <div id="majors-container"></div>
  </div>

  <!-- Stats tab -->
  <div id="tab-stats" style="display:none;">
    <div id="stats-content"></div>
  </div>
</div>

function scoreDisplay(score, isUsOpen) {
  if(score==='OUT') return {txt:'OUT',cls:'out-txt'};
  if(score===null||score===undefined) return {txt:'—',cls:''};
  if(typeof score==='string') return {txt:score,cls:'out-txt'};
  if(score===0) return {txt:'E',cls:''};
  if(isUsOpen) return {txt:score>0?'+'+score:''+score,cls:score>0?'over':'under'};
  return {txt:score>0?'+'+score:''+score,cls:score<0?'under':'over'};
}

// ── STATS ENGINE ──────────────────────────────────────────────────
function computeStats() {
  const owners = ALL_OWNERS;

  // Per-owner finish tallies
  const finishes = {}; // owner -> {1,2,3,last,out,total,scores:[]}
  owners.forEach(o => finishes[o] = {1:0,2:0,3:0,last:0,out:0,total:0,scores:[],byYear:{}});

  // Golfer draft counts
  const golferDrafts = {}; // name -> {count, scores:[], owners:[]}
  const golferOwners = {}; // name -> Set of owners who drafted them

  // Head-to-head: h2h[a][b] = times a beat b (both active, not OUT)
  const h2h = {};
  owners.forEach(a => { h2h[a]={}; owners.forEach(b => h2h[a][b]=0); });

  MAJORS.forEach(m => {
    const isUsOpen = m.name.includes('US Open');
    const ownerNames = Object.keys(m.owners);

    // Rank active owners by score
    const active = ownerNames.filter(o => {
      const s = m.owners[o].score;
      return typeof s === 'number';
    }).sort((a,b) => m.owners[a].score - m.owners[b].score);
    const out = ownerNames.filter(o => m.owners[o].score === 'OUT' || m.owners[o].score === null);
    const ranked = [...active, ...out];

    ranked.forEach((owner, idx) => {
      if(!finishes[owner]) return;
      finishes[owner].total++;
      const s = m.owners[owner].score;
      const isOut = s === 'OUT' || s === null;
      if(isOut) {
        finishes[owner].out++;
      } else {
        finishes[owner].scores.push(s);
        if(!finishes[owner].byYear[m.year]) finishes[owner].byYear[m.year] = [];
        finishes[owner].byYear[m.year].push(s);
        const pos = active.indexOf(owner)+1;
        if(pos===1) finishes[owner][1]++;
        if(pos===2) finishes[owner][2]++;
        if(pos===3) finishes[owner][3]++;
        if(pos===active.length && active.length > 1) finishes[owner].last++;
      }
    });

    // H2H: compare each pair of active owners
    for(let i=0;i<active.length;i++) {
      for(let j=i+1;j<active.length;j++) {
        const a=active[i], b=active[j];
        if(h2h[a]&&h2h[a][b]!==undefined) h2h[a][b]++;
        if(h2h[b]&&h2h[b][a]!==undefined) {}
      }
    }

    // Golfer stats
    ownerNames.forEach(owner => {
      const data = m.owners[owner];
      [...data.golfers, ...(data.alternate?[data.alternate]:[])].forEach(p => {
        if(!p||!p.name) return;
        const key = p.name;
        if(!golferDrafts[key]) golferDrafts[key] = {count:0, scores:[], owners:new Set()};
        golferDrafts[key].count++;
        golferDrafts[key].owners.add(owner);
        if(typeof p.score === 'number') golferDrafts[key].scores.push(p.score);
      });
    });
  });

  return {finishes, golferDrafts, h2h};
}

// ── Sortable tendencies state ─────────────────────────────────────
let tendencySortCol = '1', tendencySortDir = -1;

function buildStats() {
  const {finishes, golferDrafts, h2h} = computeStats();
  const owners = ALL_OWNERS.filter(o => finishes[o].total > 0);

  // ── Favorite golfers per owner ────────────────────────────────────
  // For each owner, find golfers they've drafted most often
  const ownerFavorites = {};
  owners.forEach(o => {
    const counts = {};
    MAJORS.forEach(m => {
      if(!m.owners[o]) return;
      [...m.owners[o].golfers, ...(m.owners[o].alternate ? [m.owners[o].alternate] : [])].forEach(p => {
        if(!p||!p.name) return;
        counts[p.name] = (counts[p.name]||0) + 1;
      });
    });
    ownerFavorites[o] = Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,3)
      .map(([name,count]) => ({name, count}));
  });

  const favoritesHtml = `
    <div class="stat-card" style="grid-column:1/-1;overflow-x:auto;">
      <div class="stat-card-title">Each owner's most-drafted golfers</div>
      <table class="golfer-table">
        <thead><tr>
          <th>Owner</th><th>#1 Pick</th><th>#2 Pick</th><th>#3 Pick</th>
        </tr></thead>
        <tbody>
          ${owners.map(o => {
            const favs = ownerFavorites[o] || [];
            return `<tr>
              <td><span style="color:${COLORS[o]||'#555'};font-weight:700">${o}</span></td>
              ${[0,1,2].map(i => favs[i]
                ? `<td><span style="font-weight:500">${favs[i].name}</span> <span style="color:#aaa;font-size:11px">(×${favs[i].count})</span></td>`
                : `<td style="color:#ddd">—</td>`
              ).join('')}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;

  renderStats(finishes, golferDrafts, h2h, owners, favoritesHtml);
}

function renderTendenciesTable(finishes, owners) {
  const cols = {
    'owner': (a,b) => a.o.localeCompare(b.o),
    'total': (a,b) => b.f.total - a.f.total,
    '1':     (a,b) => b.f[1] - a.f[1],
    '2':     (a,b) => b.f[2] - a.f[2],
    '3':     (a,b) => b.f[3] - a.f[3],
    'last':  (a,b) => b.f.last - a.f.last,
    'out':   (a,b) => b.f.out - a.f.out,
    'avg':   (a,b) => parseFloat(a.avg||99) - parseFloat(b.avg||99),
    'winpct':(a,b) => parseFloat(b.winRate) - parseFloat(a.winRate),
  };

  const rows = owners.map(o => {
    const f = finishes[o];
    const avg = f.scores.length ? (f.scores.reduce((a,b)=>a+b,0)/f.scores.length).toFixed(1) : '99';
    const winRate = f.total ? ((f[1]/f.total)*100).toFixed(0) : '0';
    return {o, f, avg, winRate};
  }).sort((a,b) => tendencySortDir * (cols[tendencySortCol]||cols['1'])(a,b));

  const arrow = col => tendencySortCol===col ? (tendencySortDir===-1?'↓':'↑') : '';
  const th = (col, label, cls='r') =>
    `<th class="${cls}" style="cursor:pointer;user-select:none;" onclick="sortTendencies('${col}')">${label} ${arrow(col)}</th>`;

  return `
    <div class="stat-card" style="grid-column:1/-1;">
      <div class="stat-card-title">Owner Tendencies — all ${MAJORS.length} majors <span style="font-size:11px;color:#aaa;font-weight:400">(click columns to sort)</span></div>
      <table class="golfer-table" id="tendencies-table">
        <thead><tr>
          ${th('owner','Owner','')}
          ${th('total','Entries')}
          ${th('1','🏆 Wins')}
          ${th('2','2nd')}
          ${th('3','3rd')}
          ${th('last','Last')}
          ${th('out','OUT')}
          ${th('avg','Avg Score')}
          ${th('winpct','Win %')}
        </tr></thead>
        <tbody>
          ${rows.map(({o,f,avg,winRate}) => `<tr>
            <td><span style="color:${COLORS[o]||'#555'};font-weight:700;">${o}</span></td>
            <td class="r">${f.total}</td>
            <td class="r" style="color:#2e7d32;font-weight:600">${f[1]}</td>
            <td class="r">${f[2]}</td>
            <td class="r">${f[3]}</td>
            <td class="r" style="color:${f.last>3?'#c62828':'#666'}">${f.last}</td>
            <td class="r" style="color:${f.out>4?'#c62828':'#666'}">${f.out}</td>
            <td class="r" style="color:${parseFloat(avg)<0?'#2e7d32':'#c62828'}">${avg==='99'?'—':avg}</td>
            <td class="r" style="color:#2e7d32;font-weight:700">${winRate}%</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function sortTendencies(col) {
  if(tendencySortCol === col) tendencySortDir *= -1;
  else { tendencySortCol = col; tendencySortDir = -1; }
  // Re-render just the table
  const {finishes} = computeStats();
  const owners = ALL_OWNERS.filter(o => finishes[o].total > 0);
  const wrap = document.querySelector('#tendencies-table').closest('.stat-card');
  wrap.outerHTML = renderTendenciesTable(finishes, owners);
}

function renderStats(finishes, golferDrafts, h2h, owners, favoritesHtml) {

  // ── Recent form — last 8 absolute majors ──────────────────────────
  const last8 = MAJORS.slice(0, 8); // majors are newest-first, so first 8 = most recent
  const recentFormHtml = owners.map(o => {
    const dots = last8.map(m => {
      if(!m.owners[o]) {
        // Did not participate
        return `<span title="${m.name}" style="display:inline-block;width:22px;height:22px;border-radius:50%;background:#f0f0f0;border:1px dashed #ccc;font-size:9px;line-height:22px;text-align:center;color:#ccc;">—</span>`;
      }
      const s = m.owners[o].score;
      const isOut = s==='OUT'||s===null;
      if(isOut) return `<span title="${m.name} — OUT" style="display:inline-block;width:22px;height:22px;border-radius:50%;background:#eee;border:1px solid #ccc;font-size:9px;line-height:22px;text-align:center;color:#999;">X</span>`;
      const active = Object.keys(m.owners).filter(x=>typeof m.owners[x].score==='number')
        .sort((a,b)=>m.owners[a].score-m.owners[b].score);
      const pos = active.indexOf(o)+1;
      const bg = pos===1?COLORS[o]||'#2e7d32':pos===2?'#a5d6a7':pos===3?'#c8e6c9':'#eee';
      const color = pos<=2?'#fff':pos===3?'#2e7d32':'#888';
      const label = pos===1?'W':String(pos);
      return `<span title="${m.name} — #${pos}" style="display:inline-block;width:22px;height:22px;border-radius:50%;background:${bg};font-size:9px;line-height:22px;text-align:center;color:${color};font-weight:${pos<=3?'700':'400'}">${label}</span>`;
    }).join(' ');
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <span style="display:inline-block;width:64px;font-weight:700;font-size:12px;color:${COLORS[o]||'#555'};flex-shrink:0">${o}</span>
      <div style="display:flex;gap:4px;">${dots}</div>
    </div>`;
  }).join('');

  // Recent form column headers
  const recentLabels = last8.map(m => {
    const short = m.name.replace(/\d{4} /,'').replace('The Open Championship','Open').replace('PGA Championship','PGA').replace('Masters','Masters').replace('US Open','USO').replace('Charles Schwab Challenge','CS');
    return `<span style="display:inline-block;width:22px;font-size:8px;color:#aaa;text-align:center;overflow:hidden;white-space:nowrap;">${short.slice(0,3)}</span>`;
  }).join(' ');

  // ── Most drafted golfers ──────────────────────────────────────────
  const topGolfers = Object.entries(golferDrafts)
    .filter(([,d]) => d.count >= 3)
    .sort((a,b) => b[1].count-a[1].count)
    .slice(0,20);

  const golferTableHtml = `<table class="golfer-table">
    <thead><tr>
      <th>Golfer</th><th class="r">Times Drafted</th><th class="r">Avg Score</th><th class="r">Cut Rate</th><th>Drafted By</th>
    </tr></thead>
    <tbody>
      ${topGolfers.map(([name,d]) => {
        const avg = d.scores.length ? (d.scores.reduce((a,b)=>a+b,0)/d.scores.length).toFixed(1) : '—';
        const cutRate = d.count > 0 ? (((d.count-d.scores.length)/d.count)*100).toFixed(0)+'%' : '—';
        const ownerPills = [...d.owners].map(o => `<span class="owner-pill" style="background:${COLORS[o]||'#555'}">${o[0]}</span>`).join('');
        return `<tr>
          <td style="font-weight:500">${name}</td>
          <td class="r">${d.count}</td>
          <td class="r" style="color:${d.scores.length&&d.scores.reduce((a,b)=>a+b,0)/d.scores.length<0?'#2e7d32':'#c62828'}">${avg}</td>
          <td class="r">${cutRate}</td>
          <td>${ownerPills}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  // ── Head-to-head ─────────────────────────────────────────────────
  const h2hOwners = owners.filter(o => finishes[o].total >= 5);
  const h2hHtml = `<table class="h2h-table">
    <thead><tr><th></th>${h2hOwners.map(o=>`<th style="color:${COLORS[o]||'#555'}">${o}</th>`).join('')}</tr></thead>
    <tbody>
      ${h2hOwners.map(a=>`<tr>
        <th style="color:${COLORS[a]||'#555'};text-align:left">${a}</th>
        ${h2hOwners.map(b=>{
          if(a===b) return `<td class="h2h-self">—</td>`;
          const w=h2h[a][b]||0, l=h2h[b][a]||0, t=w+l;
          if(!t) return `<td>—</td>`;
          return `<td class="${w/t>=0.5?'h2h-win':'h2h-loss'}">${w}-${l}</td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody>
  </table>`;

  // ── Performance by year ───────────────────────────────────────────
  const years = [...new Set(MAJORS.map(m=>m.year))].sort();
  const yearPerf = owners.map(o => {
    const byYear = {};
    years.forEach(y => {
      const ms = MAJORS.filter(m=>m.year===y&&m.owners[o]);
      if(!ms.length) return;
      const scores = ms.map(m=>m.owners[o].score).filter(s=>typeof s==='number');
      const wins = ms.filter(m=>m.winner===o||(m.winner&&m.winner.includes(o))).length;
      byYear[y] = {avg:scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:null, wins};
    });
    return {o, byYear};
  });

  const yearPerfHtml = `<table class="golfer-table">
    <thead><tr><th>Owner</th>${years.map(y=>`<th class="r">${y}</th>`).join('')}</tr></thead>
    <tbody>
      ${yearPerf.map(({o,byYear})=>`<tr>
        <td><span style="color:${COLORS[o]||'#555'};font-weight:700">${o}</span></td>
        ${years.map(y=>{
          const d=byYear[y];
          if(!d) return `<td class="r" style="color:#ddd">—</td>`;
          const avg=d.avg!==null?d.avg.toFixed(1):'OUT';
          const col=d.wins>0?'#2e7d32':d.avg!==null&&d.avg<0?'#558b2f':d.avg!==null&&d.avg>5?'#c62828':'#666';
          return `<td class="r" style="color:${col};font-weight:${d.wins?'700':'400'}">${d.wins?'🏆':avg}</td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody>
  </table>`;


  // ── Golf draft order stats ────────────────────────────────────
  const golfDraftPositions = {};
  const golfDraftFinishes = [];
  MAJORS.forEach(m => {
    const draft = GOLF_DRAFT[m.slug] || {};
    if (!Object.keys(draft).length) return;
    const isUsOpen = m.name.includes('US Open');
    const ranked = Object.keys(m.owners).filter(o => m.owners[o].score !== null).sort((a,b) => {
      const sa = m.owners[a].score, sb = m.owners[b].score;
      if (sa === 'OUT' || sa === null) return 1;
      if (sb === 'OUT' || sb === null) return -1;
      return typeof sa === 'number' && typeof sb === 'number' ? (isUsOpen ? sb-sa : sa-sb) : 0;
    });
    Object.entries(draft).forEach(([owner, pick]) => {
      if (!golfDraftPositions[owner]) golfDraftPositions[owner] = [];
      golfDraftPositions[owner].push(pick);
      const finishIdx = ranked.indexOf(owner);
      if (finishIdx >= 0) {
        golfDraftFinishes.push({ owner, year: m.year, name: m.name, pick, finish: finishIdx+1, won: m.winner===owner || (m.winner&&m.winner.includes(owner)) });
      }
    });
  });
  const golfMostCommonSlot = {};
  Object.entries(golfDraftPositions).forEach(([owner, picks]) => {
    const freq = {};
    picks.forEach(p => freq[p] = (freq[p]||0) + 1);
    const sorted = Object.entries(freq).sort((a,b) => b[1]-a[1] || a[0]-b[0]);
    golfMostCommonSlot[owner] = { pick: +sorted[0][0], count: sorted[0][1], total: picks.length };
  });
  const activeOwners = ALL_OWNERS.filter(o => finishes[o] && finishes[o].total > 0);
  const golfSlotRows = activeOwners.filter(o => golfMostCommonSlot[o]).map(o => {
    const {pick, count, total} = golfMostCommonSlot[o];
    return '<div class="stat-row" style="gap:8px">' +
      '<div style="width:60px;flex-shrink:0;color:' + (COLORS[o]||'#555') + ';font-weight:600;font-size:13px">' + o + '</div>' +
      '<div class="draft-badge" style="margin:0;flex-shrink:0">Pick #' + pick + '</div>' +
      '<div style="font-size:11px;color:#aaa;margin-left:auto">' + count + '/' + total + ' majors</div>' +
      '</div>';
  }).join('');
  const golfSlotHtml = '<div class="stat-card"><div class="stat-card-title">Most common draft slot</div>' + golfSlotRows + '</div>';

  // Times picked first
  const gPick1Counts = {};
  golfDraftFinishes.forEach(({owner, pick}) => { if (pick === 1) gPick1Counts[owner] = (gPick1Counts[owner]||0) + 1; });
  const gPick1Rows = Object.entries(gPick1Counts).sort((a,b) => b[1]-a[1]).map(([o, count]) => {
    const total = (golfDraftPositions[o]||[]).length;
    const pct = Math.round(count/total*100);
    return '<div class="stat-row" style="gap:8px">' +
      '<div style="width:60px;flex-shrink:0;color:' + (COLORS[o]||'#555') + ';font-weight:600;font-size:13px">' + o + '</div>' +
      '<div class="stat-bar-wrap"><div class="stat-bar" style="width:' + pct + '%;background:' + (COLORS[o]||'#aaa') + '"></div></div>' +
      '<div class="stat-row-val" style="flex-shrink:0">' + count + 'x <span style="font-size:10px;color:#aaa">(' + pct + '%)</span></div>' +
      '</div>';
  }).join('');
  const golfPick1Html = '<div class="stat-card"><div class="stat-card-title">Times drafting first overall</div>' + gPick1Rows + '</div>';

  const gByPickWins = {}, gByPickTotal = {};
  golfDraftFinishes.forEach(({pick, won}) => {
    gByPickWins[pick] = (gByPickWins[pick]||0) + (won?1:0);
    gByPickTotal[pick] = (gByPickTotal[pick]||0) + 1;
  });
  const gPickNums = Object.keys(gByPickTotal).map(Number).sort((a,b)=>a-b);
  const golfPickRows = gPickNums.map(pick => {
    const w = gByPickWins[pick]||0, total = gByPickTotal[pick];
    const pct = Math.round(w/total*100);
    return '<div class="stat-row" style="gap:8px">' +
      '<div class="draft-badge" style="margin:0;width:52px;text-align:center;flex-shrink:0">Pick #' + pick + '</div>' +
      '<div class="stat-bar-wrap"><div class="stat-bar" style="width:' + pct + '%;background:#2E7D32"></div></div>' +
      '<div class="stat-row-val" style="flex-shrink:0">' + pct + '% <span style="font-size:10px;color:#aaa">(' + w + '/' + total + ')</span></div>' +
      '</div>';
  }).join('');
  const golfWinRateByPickHtml = '<div class="stat-card"><div class="stat-card-title">Win rate by draft position</div>' + golfPickRows + '</div>';

  const gSteals = golfDraftFinishes.map(d => ({...d, diff: d.finish-d.pick})).filter(d => d.diff !== 0);
  const gBiggestSteals = gSteals.slice().sort((a,b) => a.diff-b.diff).slice(0,5);
  const gBiggestBusts  = gSteals.slice().sort((a,b) => b.diff-a.diff).slice(0,5);
  function gStealRow(d) {
    const sign = d.diff < 0 ? '↑' : '↓';
    const color = d.diff < 0 ? '#2e7d32' : '#c62828';
    return '<div class="stat-row" style="gap:8px">' +
      '<div style="width:60px;flex-shrink:0;color:' + (COLORS[d.owner]||'#555') + ';font-weight:600;font-size:13px">' + d.owner + '</div>' +
      '<div style="font-size:11px;color:#aaa;flex:1">Pick #' + d.pick + ' → #' + d.finish + ' (' + d.name + ')</div>' +
      '<div style="font-weight:700;color:' + color + ';flex-shrink:0">' + sign + Math.abs(d.diff) + '</div>' +
      '</div>';
  }
  const golfStealBustHtml =
    '<div class="stat-card"><div class="stat-card-title">🏆 Biggest steals</div>' + gBiggestSteals.map(gStealRow).join('') +
    '<div style="height:1px;background:#f0f0f0;margin:12px 0"></div>' +
    '<div class="stat-card-title" style="margin-bottom:10px">💀 Biggest busts</div>' + gBiggestBusts.map(gStealRow).join('') + '</div>';

    document.getElementById('stats-content').innerHTML = `
    <div class="section-label">Owner tendencies</div>
    <div class="stats-grid">${renderTendenciesTable(finishes, owners)}</div>

    <div class="section-label">Each owner's favorite golfers (most times drafted)</div>
    <div class="stats-grid">${favoritesHtml}</div>

    <div class="section-label">Recent form — last 8 majors, newest left (— = didn't play)</div>
    <div class="stat-card" style="margin-bottom:24px;">
      <div style="display:flex;gap:10px;margin-bottom:8px;padding-left:74px;">
        <div style="display:flex;gap:4px;">${recentLabels}</div>
      </div>
      ${recentFormHtml}
    </div>

    <div class="section-label">Performance by year (avg score or 🏆)</div>
    <div class="stat-card" style="margin-bottom:24px;overflow-x:auto">${yearPerfHtml}</div>

    <div class="section-label">Head-to-head records (when both active)</div>
    <div class="stat-card" style="margin-bottom:24px;overflow-x:auto">
      <div style="font-size:11px;color:#888;margin-bottom:10px;">W-L when facing each opponent in the same major</div>
      ${h2hHtml}
    </div>

    <div class="section-label">Most drafted golfers (3+ times)</div>
    <div class="stat-card" style="margin-bottom:24px;overflow-x:auto">${golferTableHtml}</div>

    <div class="section-label">Draft order analysis</div>
    <div class="stats-grid">${golfWinRateByPickHtml}${golfSlotHtml}</div>
    <div class="stats-grid">${golfPick1Html}${golfStealBustHtml}</div>
  `;
}

// ── Results engine ────────────────────────────────────────────────
function buildJumpNav(years) {
  document.getElementById('jump-years').innerHTML = years.map(y =>
    `<a class="jump-year" href="#year-${y}">${y}</a>`).join('');
}

function buildAllTime() {
  const wins={},earnings={},wagered={},byT={};
  ALL_OWNERS.forEach(o=>{wins[o]=0;earnings[o]=0;wagered[o]=0;byT[o]={M:0,O:0,U:0,P:0,X:0};});
  MAJORS.forEach(m=>{
    const w=m.winner; if(!w) return;
    const participants = Object.keys(m.owners).length;
    const entryFee = m.pot ? Math.round(m.pot / participants) : 25;
    Object.keys(m.owners).forEach(o => {
      if(wagered[o]!==undefined) wagered[o] += entryFee;
    });
    const handle=(name,share)=>{
      if(wins[name]===undefined) return;
      wins[name]+=share; earnings[name]=(earnings[name]||0)+Math.round((m.pot||0)*share);
      const n=m.name;
      if(n.includes('Masters')) byT[name].M+=share;
      else if(n.includes('Open Championship')||n.includes('British')) byT[name].O+=share;
      else if(n.includes('US Open')) byT[name].U+=share;
      else if(n.includes('PGA')) byT[name].P+=share;
      else byT[name].X+=share;
    };
    if(w.startsWith('TIE:')) w.replace('TIE:','').split(':').forEach(n=>handle(n,1/w.replace('TIE:','').split(':').length));
    else handle(w,1);
  });
  window._golfAtData = ALL_OWNERS.filter(o => wagered[o] > 0).map(o=>({
    o, w:wins[o], net:earnings[o]-wagered[o], earned:earnings[o], wag:wagered[o], bt:byT[o]
  }));
  renderAllTime('wins');
  document.getElementById('page-sub').textContent=MAJORS.length+' Majors · 2017–2026';
}

function renderAllTime(sortBy) {
  const data = window._golfAtData;
  if (!data) return;
  const sorted = data.slice().sort(sortBy==='net'
    ? (a,b)=>b.net-a.net||b.w-a.w
    : (a,b)=>b.w-a.w||b.net-a.net);
  const maxW = Math.max(...sorted.map(x=>x.w), 0.1);
  document.getElementById('alltime').innerHTML=sorted.map(({o,w,net,earned,wag,bt})=>{
    const parts=[];
    if(bt.M) parts.push(Math.round(bt.M*10)/10+'M');
    if(bt.O) parts.push(Math.round(bt.O*10)/10+'O');
    if(bt.U) parts.push(Math.round(bt.U*10)/10+'U');
    if(bt.P) parts.push(Math.round(bt.P*10)/10+'P');
    if(bt.X) parts.push(Math.round(bt.X*10)/10+'X');
    return `<div class="at-card ${w>=maxW&&w>0?'top':''}">
      <div class="at-name" style="color:${COLORS[o]||'#555'}">${o}</div>
      <div class="at-wins">${w%1===0?w:w.toFixed(1)}</div>
      <div class="at-lbl">major${w!==1?'s':''} won</div>
      <div class="at-earnings">Won: $${earned.toLocaleString()}</div>
      <div style="font-size:11px;color:#888;margin-top:2px;">Wagered: $${wag.toLocaleString()}</div>
      <div style="font-size:12px;font-weight:700;margin-top:3px;color:${net>=0?'#2e7d32':'#c62828'}">Net: ${net>=0?'+':''}$${net.toLocaleString()}</div>
      ${parts.length?`<div class="at-breakdown">${parts.join(' · ')}</div>`:''}
    </div>`;
  }).join('');
}

function sortAllTime(by) {
  document.getElementById('at-sort-wins').classList.toggle('active', by==='wins');
  document.getElementById('at-sort-net').classList.toggle('active', by==='net');
  renderAllTime(by);
}

function buildMajors() {
  const byYear={};
  MAJORS.forEach(m=>{if(!byYear[m.year])byYear[m.year]=[];byYear[m.year].push(m);});
  const years=Object.keys(byYear).sort((a,b)=>b-a);
  buildJumpNav(years);
  document.getElementById('majors-container').innerHTML=years.map(year=>`
    <div class="year-group" id="year-${year}">
      <div class="year-label">${year}</div>
      ${byYear[year].map(buildMajorCard).join('')}
    </div>`).join('');
}

function buildMajorCard(m) {
  const isUsOpen=m.name.includes('US Open');
  const isTie=m.winner&&m.winner.startsWith('TIE:');
  const winners=isTie?m.winner.replace('TIE:','').split(':'):[m.winner];
  const ranked=Object.keys(m.owners).sort((a,b)=>{
    const sa=m.owners[a].score,sb=m.owners[b].score;
    if(sa==='OUT'||sa===null) return 1;
    if(sb==='OUT'||sb===null) return -1;
    return typeof sa==='number'&&typeof sb==='number'?sa-sb:0;
  });
  const cards=ranked.map((owner,idx)=>{
    const data=m.owners[owner];
    const isOut=data.score==='OUT';
    const isWinner=winners.includes(owner);
    const sd=scoreDisplay(data.score,isUsOpen);
    const players=data.golfers.map(p=>{
      const ps=typeof p.score==='number'?(p.score===0?'E':p.score>0?'+'+p.score:''+p.score):(p.score||'—');
      return `<div class="rc-player ${p.cut?'cut':''} ${p.sub?'sub':''}"><span>${p.name}</span><span class="rc-score-val">${ps}</span></div>`;
    }).join('');
    let alt = '';
    if (data.alternate) {
      const altObj = data.alternate;
      const wasSubbed = altObj.benchedOut || altObj.subOut;
      if (wasSubbed) {
        const benchedScore = typeof altObj.score === 'number' ? (altObj.score === 0 ? 'E' : altObj.score > 0 ? '+' + altObj.score : '' + altObj.score) : (altObj.score || '—');
        alt = `<div class="rc-player alt sub"><span><span class="alt-lbl" style="color:#c62828">OUT</span>${altObj.name}</span><span class="rc-score-val">${benchedScore}</span></div>`;
      } else {
        const altScore = typeof altObj.score === 'number' ? (altObj.score === 0 ? 'E' : altObj.score > 0 ? '+' + altObj.score : '' + altObj.score) : (altObj.score || '—');
        alt = `<div class="rc-player alt ${altObj.cut ? 'cut' : ''}"><span><span class="alt-lbl">A</span>${altObj.name}</span><span class="rc-score-val">${altScore}</span></div>`;
      }
    }
    const draftMap = m.pickOrder || GOLF_DRAFT[m.slug] || {};
    const draftPick = draftMap[owner] || null;
    const draftBadge = draftPick ? `<span class="draft-badge" style="margin:0;float:right;margin-top:1px">Pick #${draftPick}</span>` : '';
    return `<div class="result-card ${isWinner?'won':''} ${isOut?'out':''}">
      <div class="rc-header" style="color:${COLORS[owner]||'#555'};border-color:${COLORS[owner]||'#eee'};display:flex;align-items:center;justify-content:space-between">${isWinner?'🏆 ':''}${owner}${draftBadge}</div>
      <div class="rc-score ${sd.cls}">${sd.txt}</div>
      <div class="rc-rank">${isOut?'Eliminated':isWinner?'Winner':'#'+(idx+1)}</div>
      ${players}${alt}
    </div>`;
  }).join('');
  const liveBadge = m.live ? `<span style="font-size:11px;background:#c62828;color:#fff;border-radius:20px;padding:3px 10px;font-weight:700;">🔴 Live</span>` : '';
  const winnerBadge=isTie
    ?`<span class="tie-badge">🤝 Tie: ${winners.join(' & ')}</span>`
    :`<span class="winner-badge" style="background:${COLORS[m.winner]||'#1a1a1a'}">${m.winner?'🏆 '+m.winner+(m.pot?' $'+m.pot:''):''}</span>`;
  return `<div class="major-card">
    <div class="major-header">
      <div class="major-name">${m.name}</div>
      <div class="major-meta">${liveBadge}${m.pot?`<span class="pot-pill">Pot: $${m.pot}</span>`:''} ${m.winner?winnerBadge:''}</div>
    </div>
    <div class="results-grid">${cards}</div>
  </div>`;
}

function showTab(tab) {
  document.getElementById('tab-results').style.display = tab === 'results' ? '' : 'none';
  document.getElementById('tab-stats').style.display = tab === 'stats' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => {
    if (btn.getAttribute('onclick') === `showTab('${tab}')`) btn.classList.add('active');
  });
}

// Initial render with legacy data only — Firebase will update when it loads
MAJORS = MAJORS_LEGACY.slice();
buildAllTime();
buildMajors();
buildStats();
</script>

<script>
// ── Feedback modal ─────────────────────────────────────────────
// 👉 Replace mnjlwlgy with your Formspree form ID (e.g. xpwzabcd)
const FORMSPREE_ID = "mnjlwlgy";

function openFeedback() {
  document.getElementById("fb-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeFeedback() {
  document.getElementById("fb-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
function fbClose(e) {
  if (e.target === document.getElementById("fb-overlay")) closeFeedback();
}
async function fbSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById("fb-submit-btn");
  btn.disabled = true; btn.textContent = "Sending…";
  const data = new FormData(e.target);
  try {
    const res = await fetch("https://formspree.io/f/" + FORMSPREE_ID, {
      method: "POST", body: data, headers: { Accept: "application/json" }
    });
    if (res.ok) {
      document.getElementById("fb-form-wrap").style.display = "none";
      document.getElementById("fb-success").style.display = "block";
      setTimeout(() => {
        closeFeedback();
        document.getElementById("fb-form-wrap").style.display = "";
        document.getElementById("fb-success").style.display = "none";
        e.target.reset(); btn.disabled = false; btn.textContent = "Send request →";
      }, 2500);
    } else { throw new Error(); }
  } catch {
    btn.disabled = false; btn.textContent = "Send request →";
    alert("Something went wrong — try again.");
  }
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeFeedback(); });
</script>
